<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUP Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #f5f5f5;
      --bg-panel: rgba(255, 255, 255, 0.92);
      --bg-elevated: rgba(255, 255, 255, 0.98);
      --bg-mup-body: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: rgba(0, 0, 0, 0.5);
      --text-tertiary: rgba(0, 0, 0, 0.22);
      --border: rgba(0, 0, 0, 0.08);
      --border-strong: rgba(0, 0, 0, 0.12);
      --green: #22c55e;
      --radius-lg: 16px;
      --shadow-card: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.04);
      --shadow-card-hover: 0 4px 16px rgba(0,0,0,0.1), 0 0 0 0.5px rgba(0,0,0,0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== Header ===== */
    header {
      padding: 10px 12px;
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
    }
    .header-logo {
      width: 22px; height: 22px;
      background: var(--text-primary); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: white;
    }
    .header-title { font-size: 13px; font-weight: 600; flex: 1; }
    .header-count { font-size: 10px; color: var(--text-tertiary); font-weight: 500; }
    .add-btn {
      width: 24px; height: 24px;
      background: transparent; border: 1.5px solid var(--border-strong);
      border-radius: 50%; color: var(--text-secondary);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 300; transition: all 0.15s;
    }
    .add-btn:hover { background: rgba(0,0,0,0.04); border-color: var(--text-secondary); }
    #fileInput { position: absolute; left: -9999px; }

    /* ===== Grid — explicit positioning via GridManager ===== */
    #grid {
      flex: 1;
      display: grid;
      /* Fixed 4-col grid, same as PoC. JS sets px sizes for square cells. */
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 10px;
      padding: 10px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* ===== Empty cell (matches PoC) ===== */
    .grid-cell-empty {
      background: rgba(0,0,0,0.035);
      border: 1.5px dashed rgba(0,0,0,0.1);
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s;
    }
    .grid-cell-empty:hover { background: rgba(0,0,0,0.055); }
    .grid-cell-empty::after {
      content: '+'; font-size: 20px; font-weight: 300; color: rgba(0,0,0,0.15);
    }

    /* ===== MUP Card (matches PoC mup-container) ===== */
    .mup-card {
      display: flex; flex-direction: column;
      background: var(--bg-panel);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg);
      overflow: visible;
      box-shadow: var(--shadow-card);
      transition: box-shadow 0.25s;
      animation: mupIn 0.3s ease-out;
      position: relative;
    }
    @keyframes mupIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
    .mup-card:hover { box-shadow: var(--shadow-card-hover); }
    .mup-card.dragging { opacity: 0.35; z-index: 100; pointer-events: none; }

    /* Drag-over target highlight */
    .mup-card.drag-over, .grid-cell-empty.drag-over {
      outline: 2.5px dashed rgba(0,120,255,0.3);
      outline-offset: -2px;
      background: rgba(0,120,255,0.04);
    }

    /* ===== Card header (matches PoC .mup-header) ===== */
    .mup-card-header {
      padding: 8px 12px 8px 14px;
      font-size: 12px; font-weight: 600;
      color: var(--text-primary);
      background: rgba(0,0,0,0.03);
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.3px; text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
      cursor: default; user-select: none; flex-shrink: 0;
    }
    .mup-card-header::before {
      content: ''; width: 8px; height: 8px;
      border-radius: 50%; background: var(--green); flex-shrink: 0;
    }
    .mup-card-header .mup-name {
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Close button (matches PoC) */
    .mup-close-btn {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; cursor: pointer;
      color: var(--text-primary); border: none; background: none;
      transition: background 0.15s, color 0.15s;
    }
    .mup-close-btn:hover { background: rgba(239,68,68,0.1); color: #ef4444; }

    /* Drag handle (matches PoC) */
    .mup-drag-handle {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; cursor: grab;
      color: var(--text-primary); transition: background 0.15s;
    }
    .mup-drag-handle:hover { background: rgba(0,0,0,0.06); }
    .mup-drag-handle:active { cursor: grabbing; }

    /* ===== Card body (matches PoC .mup-body) ===== */
    .mup-card-body {
      flex: 1; position: relative; overflow: hidden;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      background: var(--bg-mup-body);
      min-height: 0;
    }
    .mup-card-body iframe {
      width: 100%; height: 100%; border: none; display: block;
    }

    /* ===== Resize handle (matches PoC .mup-resize-handle) ===== */
    .mup-resize-handle {
      position: absolute;
      bottom: -4px; right: -4px;
      width: 16px; height: 16px;
      cursor: nwse-resize;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .mup-card:hover .mup-resize-handle { opacity: 1; }
    .mup-resize-handle::before {
      content: '';
      position: absolute;
      bottom: 4px; right: 4px;
      width: 8px; height: 8px;
      border-right: 2px solid var(--text-primary);
      border-bottom: 2px solid var(--text-primary);
      border-radius: 0 0 3px 0;
    }

    /* ===== Preview ghost during drag/resize (matches PoC) ===== */
    .mup-preview {
      background: rgba(0, 120, 255, 0.08);
      border: 2.5px dashed rgba(0, 120, 255, 0.3);
      border-radius: var(--radius-lg);
      pointer-events: none;
      z-index: 200;
      transition: grid-column 0.1s ease, grid-row 0.1s ease;
      aspect-ratio: auto;
    }

    /* ===== Scrollbar (matches PoC) ===== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.07); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.13); }
  </style>
</head>
<body>

<header>
  <div class="header-logo">M</div>
  <span class="header-title">MUP</span>
  <span class="header-count" id="mupCount"></span>
  <label class="add-btn" for="fileInput" title="Load MUP file">+</label>
</header>

<input type="file" id="fileInput" accept=".html,.htm" multiple>

<div id="grid"></div>

<script src="panel.js"></script>
</body>
</html>
