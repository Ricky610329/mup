<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUP Panel (MCP)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='white'/%3E%3Crect x='5' y='5' width='9' height='22' rx='2' fill='%231a1a1a'/%3E%3Crect x='17' y='5' width='10' height='12' rx='2' fill='%231a1a1a'/%3E%3Crect x='17' y='20' width='10' height='7' rx='2' fill='%231a1a1a'/%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/gridstack@11/dist/gridstack.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/gridstack@11/dist/gridstack-extra.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/gridstack@11/dist/gridstack-all.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<div class="header">
  <div class="header-logo">M</div>
  <span class="header-title" id="headerTitle" title="Click to rename workspace">MUP Panel</span>
  <div class="header-spacer"></div>
  <span class="save-indicator" id="saveIndicator">saved</span>
  <button class="workspace-btn" id="flushSaveBtn" title="Save now">Save</button>
  <button class="workspace-btn" id="themeToggleBtn" title="Toggle dark mode">
    <svg id="themeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  </button>
  <div class="status-dot connecting" id="statusDot"></div>
</div>

<div class="dashboard" id="dashboard">
  <div class="grid-stack" id="grid"></div>
</div>

<div class="event-badges" id="eventBadges"></div>

<script src="/mup-sdk.js"></script>
<script src="/app.js"></script>
<script src="/manager.js"></script>
<script src="/chat.js"></script>
<script>
  // Initialize after all modules loaded
  window.addEventListener('load', () => {
    setTimeout(() => {
      initGrid();
      renderManagerCard();
      renderChatCard();
      for (const p of pendingMups) loadMup(p.mupId, p.html, p.manifest);
      pendingMups.length = 0;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "ready" }));
      }
    }, 100);
  });
  connect();
</script>
</body>
</html>
