<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUP Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #f5f5f5;
      --bg-panel: rgba(255, 255, 255, 0.92);
      --bg-mup-body: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: rgba(0, 0, 0, 0.5);
      --text-tertiary: rgba(0, 0, 0, 0.25);
      --border: rgba(0, 0, 0, 0.08);
      --border-light: rgba(0, 0, 0, 0.04);
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== Header ===== */
    header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-logo {
      width: 28px; height: 28px;
      background: var(--text-primary);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: white;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--text-tertiary);
      letter-spacing: 0.5px;
    }

    .header-spacer { flex: 1; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--green); }
    .status-dot.disconnected { background: var(--red); }
    .status-dot.connecting { background: var(--amber); animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .status-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* ===== Grid ===== */
    #grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: minmax(180px, auto);
      gap: 10px;
      padding: 0 16px 16px;
      overflow-y: auto;
      overflow-x: hidden;
      align-content: start;
    }

    /* ===== MUP Card ===== */
    .mup-card {
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.04);
      animation: cardIn 0.3s ease-out;
      z-index: 1;
      min-height: 0;
    }
    @keyframes cardIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
    .mup-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1), 0 0 0 0.5px rgba(0,0,0,0.06); }

    .mup-card-header {
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      background: rgba(0, 0, 0, 0.03);
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.3px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    .mup-card-header::before {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .mup-card-header .mup-name { flex: 1; }

    .mup-card-body {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg-mup-body);
    }

    .mup-card-body iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ===== Empty state ===== */
    .empty-state {
      grid-column: 1 / -1;
      grid-row: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-tertiary);
    }
    .empty-state-title { font-size: 18px; font-weight: 600; }
    .empty-state-text { font-size: 13px; }

    /* ===== Log panel (bottom, collapsed by default) ===== */
    #log {
      flex-shrink: 0;
      max-height: 64px;
      overflow-y: auto;
      padding: 6px 20px;
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.6);
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .log-entry { line-height: 1.4; }
    .log-entry .log-time { color: var(--text-tertiary); margin-right: 6px; }
    .log-entry .log-mup { font-weight: 600; color: var(--text-primary); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.07); border-radius: 10px; }
  </style>
</head>
<body>

<header>
  <div class="header-logo">M</div>
  <span class="header-title">MUP Panel</span>
  <span class="header-subtitle">MCP Bridge</span>
  <div class="header-spacer"></div>
  <div class="status-dot connecting" id="statusDot"></div>
  <span class="status-text" id="statusText">Connecting...</span>
</header>

<div id="grid"></div>
<div id="log"></div>

<script>
// ---- MUP SDK source (injected into each iframe) ----
const MUP_SDK_SOURCE = `
class MupSDK {
  constructor() {
    this._port = null; this._functions = new Map(); this._readyCallback = null;
    this._pendingRequests = new Map(); this._nextId = 1; this._initialized = false;
    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "mup:init" && event.ports[0]) {
        this._port = event.ports[0];
        this._port.onmessage = (msg) => this._handleMessage(msg.data);
      }
    });
  }
  registerFunction(name, handler) { this._functions.set(name, handler); }
  onReady(callback) { this._readyCallback = callback; if (this._initialized && this._initParams) callback(this._initParams); }
  updateState(summary, data) { this._notify("notifications/state/update", { summary, data }); }
  notifyInteraction(action, summary, data) { this._notify("notifications/interaction", { action, summary, data }); }
  system(action, params) { return this._request("system/request", { action, params }); }
  _handleMessage(data) {
    if (!data || data.jsonrpc !== "2.0") return;
    if ("id" in data && !("method" in data)) {
      const p = this._pendingRequests.get(data.id);
      if (p) { this._pendingRequests.delete(data.id); data.error ? p.reject(new Error(data.error.message)) : p.resolve(data.result); }
      return;
    }
    if ("id" in data && "method" in data) { this._handleRequest(data); return; }
    if ("method" in data) { this._handleNotification(data); return; }
  }
  _handleNotification(msg) {
    if (msg.method === "notifications/shutdown") {
      this._notify("notifications/shutdown/complete", {});
    }
  }
  async _handleRequest(msg) {
    const { id, method, params } = msg;
    if (method === "initialize") {
      this._initParams = params; this._initialized = true;
      this._sendResponse(id, { protocolVersion: "mup/2026-03-17", mupInfo: { name: document.title || "MUP", version: "1.0.0" } });
      if (this._readyCallback) this._readyCallback(params);
      return;
    }
    if (method === "functions/call") {
      const handler = this._functions.get(params.name);
      if (!handler) { this._sendError(id, -32603, "Function not registered: " + params.name); return; }
      try { this._sendResponse(id, await handler(params.arguments, params.source)); }
      catch (e) { this._sendError(id, -32603, e.message || "Internal error"); }
      return;
    }
    this._sendError(id, -32601, "Method not found: " + method);
  }
  _sendResponse(id, result) { if (this._port) this._port.postMessage({ jsonrpc: "2.0", id, result }); }
  _sendError(id, code, message) { if (this._port) this._port.postMessage({ jsonrpc: "2.0", id, error: { code, message } }); }
  _notify(method, params) { if (this._port) this._port.postMessage({ jsonrpc: "2.0", method, params }); }
  _request(method, params) {
    if (!this._port) return Promise.reject(new Error("Not connected"));
    const id = this._nextId++;
    return new Promise((resolve, reject) => { this._pendingRequests.set(id, { resolve, reject }); this._port.postMessage({ jsonrpc: "2.0", id, method, params }); });
  }
}
const mup = new MupSDK();
`;

// ---- Panel state ----
const mups = new Map(); // mupId -> { iframe, port, manifest, container }
const initResolvers = new Map(); // jsonrpc id -> mupId
const callMap = new Map(); // jsonrpc id -> callId (from server)
let nextMsgId = 1;
let ws = null;

const grid = document.getElementById("grid");
const logEl = document.getElementById("log");
const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");

function log(text, mupName) {
  const entry = document.createElement("div");
  entry.className = "log-entry";
  const time = new Date().toLocaleTimeString();
  entry.innerHTML = `<span class="log-time">${time}</span>` +
    (mupName ? `<span class="log-mup">[${mupName}]</span> ` : "") + text;
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
  // Keep max 100 entries
  while (logEl.children.length > 100) logEl.removeChild(logEl.firstChild);
}

function setStatus(state, text) {
  statusDot.className = "status-dot " + state;
  statusText.textContent = text;
}

// ---- WebSocket ----
function connect() {
  const wsUrl = `ws://${location.hostname}:__WS_PORT__`;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    setStatus("connected", "Connected to MCP server");
    log("Connected to MCP server");
    ws.send(JSON.stringify({ type: "ready" }));
  };

  ws.onclose = () => {
    setStatus("disconnected", "Disconnected");
    log("Disconnected — reconnecting in 3s...");
    setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    setStatus("disconnected", "Connection error");
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleServerMessage(msg);
    } catch (err) {
      console.error("Invalid message:", err);
    }
  };
}

function handleServerMessage(msg) {
  switch (msg.type) {
    case "load-mup":
      loadMup(msg.mupId, msg.html, msg.manifest);
      break;
    case "call":
      callMupFunction(msg.callId, msg.mupId, msg.fn, msg.args);
      break;
  }
}

// ---- MUP Loading ----
function loadMup(mupId, html, manifest) {
  // Remove empty cells to make room
  clearEmptyCells();

  // Create card
  const card = document.createElement("div");
  card.className = "mup-card";
  card.dataset.mupId = mupId;

  // Grid placement
  const w = Math.min(manifest.grid?.preferredWidth || manifest.grid?.minWidth || 1, 4);
  const h = manifest.grid?.preferredHeight || manifest.grid?.minHeight || 1;
  card.style.gridColumn = `span ${w}`;
  card.style.gridRow = `span ${h}`;

  // Header
  const header = document.createElement("div");
  header.className = "mup-card-header";
  const nameSpan = document.createElement("span");
  nameSpan.className = "mup-name";
  nameSpan.textContent = manifest.name;
  header.appendChild(nameSpan);
  card.appendChild(header);

  // Body + iframe
  const body = document.createElement("div");
  body.className = "mup-card-body";
  const iframe = document.createElement("iframe");
  iframe.sandbox = "allow-scripts allow-same-origin";
  const perms = (manifest.permissions || []).map(p => `${p} 'src'`).join("; ");
  iframe.allow = perms;
  body.appendChild(iframe);
  card.appendChild(body);

  grid.appendChild(card);

  // Inject SDK
  const sdkScript = `<script>${MUP_SDK_SOURCE}<\/script>`;
  let injected = html;
  if (injected.includes("</head>")) {
    injected = injected.replace("</head>", sdkScript + "\n</head>");
  } else if (injected.includes("<body")) {
    injected = injected.replace(/<body([^>]*)>/, `<body$1>\n${sdkScript}`);
  } else {
    injected = sdkScript + "\n" + injected;
  }
  injected = injected.replace(/<script[^>]*src="[^"]*mup-sdk\.js"[^>]*><\/script>/g, "");

  const blob = new Blob([injected], { type: "text/html" });
  const blobUrl = URL.createObjectURL(blob);

  // MessageChannel for iframe communication
  const channel = new MessageChannel();
  const port = channel.port1;

  port.onmessage = (e) => handleMupMessage(mupId, manifest.name, e.data);

  iframe.onload = () => {
    URL.revokeObjectURL(blobUrl);
    // Transfer port2 to iframe
    iframe.contentWindow.postMessage({ type: "mup:init" }, "*", [channel.port2]);

    // Send initialize
    const initId = nextMsgId++;
    initResolvers.set(initId, mupId);
    port.postMessage({
      jsonrpc: "2.0",
      id: initId,
      method: "initialize",
      params: {
        protocolVersion: "mup/2026-03-17",
        hostInfo: { name: "MUP MCP Panel", version: "0.1.0" },
        gridAllocation: { width: w, height: h },
      },
    });
  };

  iframe.src = blobUrl;

  mups.set(mupId, { iframe, port, manifest, container: card });
  log(`Loading ${manifest.name}...`, manifest.name);

  fillEmptyCells();
}

function handleMupMessage(mupId, mupName, data) {
  if (!data || data.jsonrpc !== "2.0") return;

  // Response (to initialize or function call)
  if ("id" in data && !("method" in data)) {
    // Init response?
    if (initResolvers.has(data.id)) {
      initResolvers.delete(data.id);
      log("Initialized", mupName);
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "mup-loaded", mupId }));
      }
      return;
    }

    // Function call response?
    if (callMap.has(data.id)) {
      const callId = callMap.get(data.id);
      callMap.delete(data.id);
      const result = data.error
        ? { content: [{ type: "text", text: data.error.message || "Error" }], isError: true }
        : (data.result || { content: [{ type: "text", text: "No result" }], isError: false });
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "result", callId, result }));
      }
      log(`Function returned`, mupName);
      return;
    }
    return;
  }

  // Notification from MUP
  if ("method" in data && !("id" in data)) {
    if (data.method === "notifications/state/update") {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: "state",
          mupId,
          summary: data.params?.summary || "",
          data: data.params?.data,
        }));
      }
    } else if (data.method === "notifications/interaction") {
      log(`User: ${data.params?.summary || data.params?.action}`, mupName);
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: "interaction",
          mupId,
          action: data.params?.action || "",
          summary: data.params?.summary || "",
          data: data.params?.data,
        }));
      }
    }
    return;
  }

  // Request from MUP
  if ("id" in data && "method" in data) {
    const mup = mups.get(mupId);
    if (!mup) return;

    mup.port.postMessage({
      jsonrpc: "2.0",
      id: data.id,
      error: { code: -32601, message: "Method not found: " + data.method },
    });
  }
}

// ---- Function Calls (from MCP server via WS) ----
function callMupFunction(callId, mupId, fn, args) {
  const mup = mups.get(mupId);
  if (!mup) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        type: "result",
        callId,
        result: { content: [{ type: "text", text: `MUP not loaded: ${mupId}` }], isError: true },
      }));
    }
    return;
  }

  const msgId = nextMsgId++;
  callMap.set(msgId, callId);

  log(`Calling ${fn}(${JSON.stringify(args).slice(0, 80)})`, mup.manifest.name);

  mup.port.postMessage({
    jsonrpc: "2.0",
    id: msgId,
    method: "functions/call",
    params: { name: fn, arguments: args || {}, source: "llm" },
  });
}

// ---- Grid helpers ----
function clearEmptyCells() {
  grid.querySelectorAll(".grid-cell-empty").forEach(el => el.remove());
}

function fillEmptyCells() {
  // No empty cells needed when MUPs are loaded
}

// ---- Start ----
connect();
log("MUP Panel started — waiting for MCP server connection...");
</script>
</body>
</html>
