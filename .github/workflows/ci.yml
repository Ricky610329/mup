name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd mup-mcp-server && npm ci
      - run: cd mup-mcp-server && npm run build
      - run: cd mup-mcp-server && npm test
