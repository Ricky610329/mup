<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chart</title>
  <script type="application/mup-manifest">
  {
    "name": "Chart",
    "description": "Data visualization with Chart.js. Types: bar, line, pie, doughnut, radar, scatter, polarArea. Functions: renderChart, getData, setType, exportImage, clear.",
    "grid": { "minWidth": 1, "minHeight": 1 },
    "darkMode": true,
    "functions": [
      {
        "name": "renderChart",
        "description": "Render a chart with the given data.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "type": { "type": "string", "enum": ["bar", "line", "pie", "doughnut", "radar", "scatter", "polarArea"], "description": "Chart type" },
            "labels": { "type": "array", "items": { "type": "string" }, "description": "X-axis labels" },
            "datasets": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "label": { "type": "string" },
                  "data": { "type": "array", "items": { "type": "number" } },
                  "backgroundColor": { "type": "string", "description": "Color or array of colors" },
                  "borderColor": { "type": "string" }
                },
                "required": ["label", "data"]
              },
              "description": "One or more data series"
            },
            "title": { "type": "string", "description": "Chart title (optional)" }
          },
          "required": ["type", "labels", "datasets"]
        }
      },
      {
        "name": "getData",
        "description": "Get current chart configuration and data.",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "setType",
        "description": "Change chart type without changing data.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "type": { "type": "string", "enum": ["bar", "line", "pie", "doughnut", "radar", "scatter", "polarArea"] }
          },
          "required": ["type"]
        }
      },
      {
        "name": "exportImage",
        "description": "Export chart as base64 PNG image.",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "clear",
        "description": "Clear the chart.",
        "inputSchema": { "type": "object", "properties": {} }
      }
    ]
  }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --bg: #fff; --bg-toolbar: #f8f9fa; --text: #333; --text-sec: #666;
      --text-ter: #999; --border: #e0e0e0; --hover: rgba(0,0,0,0.04);
    }
    body.dark {
      --bg: #1e1e1e; --bg-toolbar: #2d2d2d; --text: #d4d4d4; --text-sec: #858585;
      --text-ter: #5a5a5a; --border: #404040; --hover: rgba(255,255,255,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh; display: flex; flex-direction: column;
      background: var(--bg); color: var(--text);
    }
    .toolbar {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-bottom: 1px solid var(--border);
      background: var(--bg-toolbar); flex-shrink: 0;
    }
    .toolbar-title { font-size: 11px; font-weight: 600; color: var(--text-sec); }
    .toolbar-spacer { flex: 1; }
    .toolbar-select {
      border: 1px solid var(--border); border-radius: 4px; font-size: 10px;
      padding: 2px 4px; background: var(--bg); color: var(--text);
      font-family: inherit; outline: none;
    }
    .toolbar-btn {
      background: none; border: 1px solid var(--border); cursor: pointer;
      color: var(--text-sec); font-size: 10px; padding: 3px 7px;
      border-radius: 4px; font-family: inherit;
    }
    .toolbar-btn:hover { background: var(--hover); color: var(--text); }
    .chart-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 12px; overflow: hidden;
    }
    .chart-area canvas { max-width: 100%; max-height: 100%; }
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; color: var(--text-ter);
      font-size: 13px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title">Chart</span>
    <span class="toolbar-spacer"></span>
    <select class="toolbar-select" id="typeSelect">
      <option value="bar">Bar</option>
      <option value="line">Line</option>
      <option value="pie">Pie</option>
      <option value="doughnut">Doughnut</option>
      <option value="radar">Radar</option>
      <option value="scatter">Scatter</option>
      <option value="polarArea">Polar Area</option>
    </select>
    <button class="toolbar-btn" id="downloadBtn">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      PNG
    </button>
    <button class="toolbar-btn" id="clearBtn">Clear</button>
  </div>
  <div class="chart-area" id="chartArea">
    <div class="empty-state" id="emptyState">
      <span>No chart data</span>
      <span style="font-size:11px">Use <b>renderChart</b> to create a chart</span>
    </div>
  </div>

  <script>
    const chartArea = document.getElementById('chartArea');
    const emptyState = document.getElementById('emptyState');
    const typeSelect = document.getElementById('typeSelect');

    let chart = null;
    let chartConfig = null;
    let stateTimer = null;
    let isDark = false;
    const STORAGE_KEY = 'mup-chart-data';

    const defaultColors = [
      '#3b82f6','#ef4444','#22c55e','#f59e0b','#8b5cf6',
      '#ec4899','#06b6d4','#f97316','#14b8a6','#6366f1'
    ];

    function assignColors(datasets, type) {
      const isPie = ['pie','doughnut','polarArea'].includes(type);
      datasets.forEach((ds, i) => {
        if (!ds.backgroundColor) {
          ds.backgroundColor = isPie ? defaultColors.slice(0, ds.data.length) : defaultColors[i % defaultColors.length] + '99';
        }
        if (!ds.borderColor) {
          ds.borderColor = isPie ? '#fff' : defaultColors[i % defaultColors.length];
        }
        if (!isPie) ds.borderWidth = 2;
      });
    }

    function createChart(config) {
      chartConfig = JSON.parse(JSON.stringify(config));
      assignColors(chartConfig.datasets, chartConfig.type);
      emptyState.style.display = 'none';

      let canvas = chartArea.querySelector('canvas');
      if (chart) { chart.destroy(); chart = null; }
      if (!canvas) {
        canvas = document.createElement('canvas');
        chartArea.appendChild(canvas);
      }

      const textColor = isDark ? '#d4d4d4' : '#333';
      const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)';

      chart = new Chart(canvas, {
        type: chartConfig.type,
        data: { labels: chartConfig.labels, datasets: chartConfig.datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            title: chartConfig.title ? { display: true, text: chartConfig.title, color: textColor, font: { size: 14, weight: '600' } } : { display: false },
            legend: { labels: { color: textColor, font: { size: 11 } } },
          },
          scales: ['pie','doughnut','polarArea','radar'].includes(chartConfig.type) ? {} : {
            x: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor } },
            y: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor } },
          },
        }
      });
      typeSelect.value = chartConfig.type;
    }

    // ---- Toolbar ----
    typeSelect.addEventListener('change', () => {
      if (!chartConfig) return;
      chartConfig.type = typeSelect.value;
      assignColors(chartConfig.datasets, chartConfig.type);
      createChart(chartConfig);
      debouncedSave();
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (chart) { chart.destroy(); chart = null; }
      chartConfig = null;
      chartArea.querySelector('canvas')?.remove();
      emptyState.style.display = 'flex';
      debouncedSave();
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      if (!chart) return;
      const a = document.createElement('a');
      a.href = chart.toBase64Image();
      a.download = `chart-${chartConfig?.type || 'chart'}.png`;
      a.click();
    });

    // ---- State ----
    function debouncedSave() { clearTimeout(stateTimer); stateTimer = setTimeout(save, 500); }
    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ _v: 1, config: chartConfig })); } catch {}
      const summary = chartConfig
        ? `Chart: ${chartConfig.type} — ${chartConfig.title || chartConfig.labels?.length + ' labels'}`
        : 'Chart: empty';
      mup.updateState(summary);
    }
    function loadState() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) { const d = JSON.parse(stored); if (d._v === 1) return d; }
      } catch {}
      return null;
    }

    // ---- Theme ----
    function applyTheme(t) {
      isDark = t === 'dark';
      document.body.classList.toggle('dark', isDark);
      if (chartConfig) createChart(chartConfig);
    }

    // ---- MUP functions ----
    mup.registerFunction('renderChart', ({ type, labels, datasets, title }) => {
      createChart({ type, labels, datasets, title });
      save();
      return { content: [{ type: 'text', text: `Rendered ${type} chart${title ? ': "' + title + '"' : ''} with ${datasets.length} dataset(s), ${labels.length} labels.` }], isError: false };
    });

    mup.registerFunction('getData', () => {
      if (!chartConfig) return { content: [{ type: 'text', text: 'No chart data.' }], isError: false };
      return { content: [
        { type: 'text', text: `Type: ${chartConfig.type}, Labels: ${chartConfig.labels?.join(', ')}, Datasets: ${chartConfig.datasets?.length}` },
        { type: 'data', data: chartConfig }
      ], isError: false };
    });

    mup.registerFunction('setType', ({ type }) => {
      if (!chartConfig) return { content: [{ type: 'text', text: 'No chart to change.' }], isError: true };
      chartConfig.type = type;
      createChart(chartConfig);
      save();
      return { content: [{ type: 'text', text: `Chart type changed to ${type}.` }], isError: false };
    });

    mup.registerFunction('exportImage', () => {
      if (!chart) return { content: [{ type: 'text', text: 'No chart to export.' }], isError: true };
      const dataUrl = chart.toBase64Image();
      const match = dataUrl.match(/^data:(image\/[^;]+);base64,(.+)$/);
      if (match) {
        return { content: [
          { type: 'text', text: `Chart exported as PNG (${chartConfig.type}).` },
          { type: 'image', data: match[2], mimeType: match[1] }
        ], isError: false };
      }
      return { content: [{ type: 'text', text: dataUrl }], isError: false };
    });

    mup.registerFunction('clear', () => {
      if (chart) { chart.destroy(); chart = null; }
      chartConfig = null;
      chartArea.querySelector('canvas')?.remove();
      emptyState.style.display = 'flex';
      save();
      return { content: [{ type: 'text', text: 'Chart cleared.' }], isError: false };
    });

    // ---- Init ----
    mup.onThemeChange(applyTheme);
    mup.onReady((params) => {
      if (params?.theme) applyTheme(params.theme);
      const state = loadState();
      if (state?.config) createChart(state.config);
      save();
    });
  </script>
</body>
</html>
