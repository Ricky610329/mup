<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Diagram</title>
  <script type="application/mup-manifest">
  {
    "name": "Diagram",
    "description": "Flowcharts and diagrams using Mermaid.js. Editor + live preview. Types: flowchart, sequence, class, state, ER, gantt. Functions: setDiagram, getDiagram, exportSVG, exportImage.",
    "grid": { "minWidth": 2, "minHeight": 2 },
    "darkMode": true,
    "functions": [
      {
        "name": "setDiagram",
        "description": "Set the diagram using Mermaid syntax.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "code": { "type": "string", "description": "Mermaid diagram code" }
          },
          "required": ["code"]
        }
      },
      {
        "name": "getDiagram",
        "description": "Get the current Mermaid diagram code.",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "exportSVG",
        "description": "Export the rendered diagram as SVG string.",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "exportImage",
        "description": "Export the rendered diagram as base64 PNG image.",
        "inputSchema": { "type": "object", "properties": {} }
      }
    ]
  }
  </script>
  <style>
    :root {
      --bg: #fff; --bg-toolbar: #f8f9fa; --bg-editor: #fff;
      --text: #333; --text-sec: #666; --text-ter: #999;
      --border: #e0e0e0; --hover: rgba(0,0,0,0.04);
      --accent: #0066cc;
    }
    body.dark {
      --bg: #1e1e1e; --bg-toolbar: #2d2d2d; --bg-editor: #1e1e1e;
      --text: #d4d4d4; --text-sec: #858585; --text-ter: #5a5a5a;
      --border: #404040; --hover: rgba(255,255,255,0.06);
      --accent: #569cd6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh; display: flex; flex-direction: column;
      background: var(--bg); color: var(--text);
    }
    .toolbar {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-bottom: 1px solid var(--border);
      background: var(--bg-toolbar); flex-shrink: 0;
    }
    .toolbar-title { font-size: 11px; font-weight: 600; color: var(--text-sec); }
    .toolbar-spacer { flex: 1; }
    .toolbar-select {
      border: 1px solid var(--border); border-radius: 4px; font-size: 10px;
      padding: 2px 4px; background: var(--bg); color: var(--text);
      font-family: inherit; outline: none;
    }
    .toolbar-btn {
      background: none; border: 1px solid var(--border); cursor: pointer;
      color: var(--text-sec); font-size: 10px; padding: 3px 7px;
      border-radius: 4px; font-family: inherit;
    }
    .toolbar-btn:hover { background: var(--hover); color: var(--text); }
    .toolbar-error { font-size: 10px; color: #e53935; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .main { flex: 1; display: flex; overflow: hidden; }
    .editor-pane {
      width: 40%; flex-shrink: 0; border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .editor-pane textarea {
      flex: 1; width: 100%; border: none; outline: none; resize: none;
      padding: 10px 12px; font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 12px; line-height: 1.6; tab-size: 2;
      background: var(--bg-editor); color: var(--text);
    }
    .preview-pane {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 16px; overflow: auto; background: var(--bg);
    }
    .preview-pane svg { max-width: 100%; max-height: 100%; }
    .empty-state {
      color: var(--text-ter); font-size: 12px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title">Diagram</span>
    <span class="toolbar-spacer"></span>
    <select class="toolbar-select" id="templateSelect">
      <option value="">Template...</option>
      <option value="flowchart">Flowchart</option>
      <option value="sequence">Sequence</option>
      <option value="class">Class</option>
      <option value="state">State</option>
      <option value="er">ER</option>
      <option value="gantt">Gantt</option>
    </select>
    <button class="toolbar-btn" id="svgBtn">SVG</button>
    <button class="toolbar-btn" id="pngBtn">PNG</button>
    <span class="toolbar-error" id="errorEl"></span>
  </div>
  <div class="main">
    <div class="editor-pane">
      <textarea id="editor" placeholder="Enter Mermaid diagram code..." spellcheck="false"></textarea>
    </div>
    <div class="preview-pane" id="preview">
      <span class="empty-state">Enter diagram code on the left</span>
    </div>
  </div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const errorEl = document.getElementById('errorEl');
    let stateTimer = null;
    let renderTimer = null;
    let isDark = false;
    const STORAGE_KEY = 'mup-diagram-data';

    const templates = {
      flowchart: 'flowchart TD\n    A[Start] --> B{Decision}\n    B -->|Yes| C[Action 1]\n    B -->|No| D[Action 2]\n    C --> E[End]\n    D --> E',
      sequence: 'sequenceDiagram\n    participant A as Client\n    participant B as Server\n    participant C as Database\n    A->>B: Request\n    B->>C: Query\n    C-->>B: Result\n    B-->>A: Response',
      class: 'classDiagram\n    class Animal {\n        +String name\n        +int age\n        +makeSound()\n    }\n    class Dog {\n        +fetch()\n    }\n    class Cat {\n        +purr()\n    }\n    Animal <|-- Dog\n    Animal <|-- Cat',
      state: 'stateDiagram-v2\n    [*] --> Idle\n    Idle --> Processing: Start\n    Processing --> Success: Done\n    Processing --> Error: Fail\n    Success --> [*]\n    Error --> Idle: Retry',
      er: 'erDiagram\n    USER ||--o{ ORDER : places\n    ORDER ||--|{ LINE_ITEM : contains\n    PRODUCT ||--o{ LINE_ITEM : "is in"\n    USER {\n        int id PK\n        string name\n        string email\n    }',
      gantt: 'gantt\n    title Project Plan\n    dateFormat YYYY-MM-DD\n    section Phase 1\n    Research    :a1, 2024-01-01, 14d\n    Design      :a2, after a1, 10d\n    section Phase 2\n    Development :a3, after a2, 21d\n    Testing     :a4, after a3, 7d',
    };

    function initMermaid() {
      mermaid.initialize({
        startOnLoad: false,
        theme: isDark ? 'dark' : 'default',
        securityLevel: 'loose',
      });
    }
    initMermaid();

    async function renderDiagram() {
      const code = editor.value.trim();
      errorEl.textContent = '';
      if (!code) {
        preview.innerHTML = '<span class="empty-state">Enter diagram code on the left</span>';
        return;
      }
      try {
        const { svg } = await mermaid.render('mermaid-output', code);
        preview.innerHTML = svg;
      } catch (err) {
        errorEl.textContent = (err.message || 'Syntax error').slice(0, 60);
        // Don't clear preview on error — keep last valid render
      }
    }

    function debouncedRender() {
      clearTimeout(renderTimer);
      renderTimer = setTimeout(() => { renderDiagram(); debouncedSave(); }, 400);
    }

    editor.addEventListener('input', debouncedRender);

    // ---- Templates ----
    document.getElementById('templateSelect').addEventListener('change', (e) => {
      const t = e.target.value;
      if (t && templates[t]) {
        editor.value = templates[t];
        renderDiagram();
        debouncedSave();
      }
      e.target.value = '';
    });

    // ---- Export SVG ----
    document.getElementById('svgBtn').addEventListener('click', () => {
      const svg = preview.querySelector('svg');
      if (!svg) return;
      const blob = new Blob([svg.outerHTML], { type: 'image/svg+xml' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'diagram.svg';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // ---- Export PNG ----
    document.getElementById('pngBtn').addEventListener('click', async () => {
      const dataUrl = await svgToDataUrl();
      if (!dataUrl) return;
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = 'diagram.png';
      a.click();
    });

    async function svgToDataUrl() {
      const svg = preview.querySelector('svg');
      if (!svg) return null;
      const svgData = new XMLSerializer().serializeToString(svg);
      const canvas = document.createElement('canvas');
      const bbox = svg.getBoundingClientRect();
      canvas.width = bbox.width * 2;
      canvas.height = bbox.height * 2;
      const ctx = canvas.getContext('2d');
      ctx.scale(2, 2);
      const img = new Image();
      return new Promise((resolve) => {
        img.onload = () => {
          ctx.drawImage(img, 0, 0);
          resolve(canvas.toDataURL('image/png'));
        };
        img.onerror = () => resolve(null);
        img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgData);
      });
    }

    // ---- State ----
    function debouncedSave() { clearTimeout(stateTimer); stateTimer = setTimeout(save, 500); }
    function save() {
      const code = editor.value;
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ code })); } catch {}
      const firstLine = code.split('\n')[0] || '';
      const summary = code ? `Diagram: ${firstLine.slice(0, 40)}` : 'Diagram: empty';
      mup.updateState(summary);
    }
    function loadState() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) return JSON.parse(stored);
      } catch {}
      return null;
    }

    // ---- Theme ----
    function applyTheme(t) {
      isDark = t === 'dark';
      document.body.classList.toggle('dark', isDark);
      initMermaid();
      if (editor.value.trim()) renderDiagram();
    }

    // ---- MUP functions ----
    mup.registerFunction('setDiagram', ({ code }) => {
      editor.value = code;
      renderDiagram();
      save();
      return { content: [{ type: 'text', text: `Diagram set (${code.split('\n').length} lines).` }], isError: false };
    });

    mup.registerFunction('getDiagram', () => {
      const code = editor.value;
      if (!code.trim()) return { content: [{ type: 'text', text: 'No diagram.' }], isError: false };
      return { content: [{ type: 'text', text: code }], isError: false };
    });

    mup.registerFunction('exportSVG', () => {
      const svg = preview.querySelector('svg');
      if (!svg) return { content: [{ type: 'text', text: 'No diagram to export.' }], isError: true };
      return { content: [{ type: 'text', text: svg.outerHTML }], isError: false };
    });

    mup.registerFunction('exportImage', async () => {
      const dataUrl = await svgToDataUrl();
      if (!dataUrl) return { content: [{ type: 'text', text: 'No diagram to export.' }], isError: true };
      const match = dataUrl.match(/^data:(image\/[^;]+);base64,(.+)$/);
      if (match) {
        return { content: [
          { type: 'text', text: 'Diagram exported as PNG.' },
          { type: 'image', data: match[2], mimeType: match[1] }
        ], isError: false };
      }
      return { content: [{ type: 'text', text: 'Export failed.' }], isError: true };
    });

    // ---- Init ----
    mup.onThemeChange(applyTheme);
    mup.onReady((params) => {
      if (params?.theme) applyTheme(params.theme);
      const state = loadState();
      if (state?.code) {
        editor.value = state.code;
        renderDiagram();
      }
      save();
    });
  </script>
</body>
</html>
