<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Table</title>
  <script type="application/mup-manifest">
  {
    "name": "Table",
    "description": "Table editor for structured data. Inline cell editing, add/remove rows and columns, sort. Export as HTML, CSV, or Markdown. Functions: setTable, getTable, addRow, addColumn, exportHTML, exportCSV.",
    "grid": { "minWidth": 1, "minHeight": 1 },
    "darkMode": true,
    "functions": [
      {
        "name": "setTable",
        "description": "Set the entire table data.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "headers": { "type": "array", "items": { "type": "string" }, "description": "Column headers" },
            "rows": { "type": "array", "items": { "type": "array", "items": { "type": "string" } }, "description": "2D array of cell values" }
          },
          "required": ["headers", "rows"]
        }
      },
      {
        "name": "getTable",
        "description": "Get the current table data.",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "addRow",
        "description": "Add a row to the table.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "data": { "type": "array", "items": { "type": "string" }, "description": "Cell values for the new row" }
          },
          "required": ["data"]
        }
      },
      {
        "name": "addColumn",
        "description": "Add a column to the table.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "header": { "type": "string", "description": "Column header" }
          },
          "required": ["header"]
        }
      },
      {
        "name": "exportHTML",
        "description": "Export table as styled HTML string.",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "exportCSV",
        "description": "Export table as CSV string.",
        "inputSchema": { "type": "object", "properties": {} }
      }
    ]
  }
  </script>
  <style>
    :root {
      --bg: #fff; --bg-toolbar: #f8f9fa; --bg-header: #f1f3f5;
      --text: #333; --text-sec: #666; --text-ter: #999;
      --border: #e0e0e0; --hover: rgba(0,0,0,0.04);
      --accent: #0066cc; --cell-focus: #dbeafe;
    }
    body.dark {
      --bg: #1e1e1e; --bg-toolbar: #2d2d2d; --bg-header: #333;
      --text: #d4d4d4; --text-sec: #858585; --text-ter: #5a5a5a;
      --border: #404040; --hover: rgba(255,255,255,0.06);
      --accent: #569cd6; --cell-focus: #1e3a5f;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh; display: flex; flex-direction: column;
      background: var(--bg); color: var(--text);
    }
    .toolbar {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-bottom: 1px solid var(--border);
      background: var(--bg-toolbar); flex-shrink: 0;
    }
    .toolbar-title { font-size: 11px; font-weight: 600; color: var(--text-sec); }
    .toolbar-spacer { flex: 1; }
    .toolbar-info { font-size: 10px; color: var(--text-ter); }
    .toolbar-btn {
      background: none; border: 1px solid var(--border); cursor: pointer;
      color: var(--text-sec); font-size: 10px; padding: 3px 7px;
      border-radius: 4px; font-family: inherit;
    }
    .toolbar-btn:hover { background: var(--hover); color: var(--text); }
    .table-wrap {
      flex: 1; overflow: auto; padding: 8px;
    }
    table {
      border-collapse: collapse; width: 100%; font-size: 12px;
    }
    th {
      background: var(--bg-header); font-weight: 600; text-align: left;
      padding: 6px 10px; border: 1px solid var(--border);
      position: sticky; top: 0; cursor: pointer; user-select: none;
      white-space: nowrap;
    }
    th:hover { background: var(--hover); }
    th .sort-arrow { font-size: 9px; color: var(--text-ter); margin-left: 3px; }
    td {
      padding: 4px 8px; border: 1px solid var(--border);
      min-width: 60px; cursor: text;
    }
    td:focus {
      outline: 2px solid var(--accent); outline-offset: -2px;
      background: var(--cell-focus);
    }
    th .col-delete {
      float: right; background: none; border: none; cursor: pointer;
      color: var(--text-ter); font-size: 11px; margin-left: 6px; opacity: 0;
    }
    th:hover .col-delete { opacity: 1; }
    th .col-delete:hover { color: #e53935; }
    tr .row-delete {
      background: none; border: none; cursor: pointer;
      color: var(--text-ter); font-size: 11px; opacity: 0;
    }
    tr:hover .row-delete { opacity: 1; }
    tr .row-delete:hover { color: #e53935; }
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; color: var(--text-ter);
      font-size: 13px; text-align: center; flex: 1; padding: 40px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title">Table</span>
    <span class="toolbar-info" id="infoEl"></span>
    <span class="toolbar-spacer"></span>
    <button class="toolbar-btn" id="addRowBtn">+ Row</button>
    <button class="toolbar-btn" id="addColBtn">+ Col</button>
    <button class="toolbar-btn" id="csvBtn">CSV</button>
    <button class="toolbar-btn" id="htmlBtn">HTML</button>
    <button class="toolbar-btn" id="mdBtn">MD</button>
  </div>
  <div class="table-wrap" id="tableWrap">
    <div class="empty-state" id="emptyState">
      <span>No table data</span>
      <span style="font-size:11px">Use <b>setTable</b> or click <b>+ Row</b></span>
    </div>
  </div>

  <script>
    const tableWrap = document.getElementById('tableWrap');
    const emptyState = document.getElementById('emptyState');
    const infoEl = document.getElementById('infoEl');

    let headers = [];
    let rows = [];
    let sortCol = -1;
    let sortAsc = true;
    let stateTimer = null;
    const STORAGE_KEY = 'mup-table-data';

    function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // ---- Render ----
    function render() {
      infoEl.textContent = headers.length > 0 ? `${rows.length} rows x ${headers.length} cols` : '';
      if (headers.length === 0) {
        emptyState.style.display = 'flex';
        const tbl = tableWrap.querySelector('table');
        if (tbl) tbl.remove();
        return;
      }
      emptyState.style.display = 'none';

      let tbl = tableWrap.querySelector('table');
      if (!tbl) {
        tbl = document.createElement('table');
        tableWrap.appendChild(tbl);
      }

      // Sort
      let displayRows = rows.map((r, i) => ({ data: r, idx: i }));
      if (sortCol >= 0 && sortCol < headers.length) {
        displayRows.sort((a, b) => {
          const va = a.data[sortCol] || '', vb = b.data[sortCol] || '';
          const na = parseFloat(va), nb = parseFloat(vb);
          if (!isNaN(na) && !isNaN(nb)) return sortAsc ? na - nb : nb - na;
          return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        });
      }

      let html = '<thead><tr>';
      headers.forEach((h, ci) => {
        const arrow = sortCol === ci ? (sortAsc ? ' <span class="sort-arrow">&#9650;</span>' : ' <span class="sort-arrow">&#9660;</span>') : '';
        html += `<th data-col="${ci}">${esc(h)}${arrow}<button class="col-delete" data-col="${ci}">&times;</button></th>`;
      });
      html += '<th style="width:24px;background:transparent;border:none;"></th></tr></thead><tbody>';

      displayRows.forEach(({ data, idx }) => {
        html += `<tr data-row="${idx}">`;
        headers.forEach((_, ci) => {
          html += `<td contenteditable="true" data-row="${idx}" data-col="${ci}">${esc(data[ci] || '')}</td>`;
        });
        html += `<td style="border:none;padding:2px;"><button class="row-delete" data-row="${idx}">&times;</button></td></tr>`;
      });
      html += '</tbody>';
      tbl.innerHTML = html;

      // Events
      tbl.querySelectorAll('th[data-col]').forEach(th => {
        th.addEventListener('click', (e) => {
          if (e.target.classList.contains('col-delete')) return;
          const ci = parseInt(th.dataset.col);
          if (sortCol === ci) sortAsc = !sortAsc;
          else { sortCol = ci; sortAsc = true; }
          render();
        });
      });
      tbl.querySelectorAll('.col-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const ci = parseInt(btn.dataset.col);
          headers.splice(ci, 1);
          rows.forEach(r => r.splice(ci, 1));
          if (sortCol === ci) sortCol = -1;
          else if (sortCol > ci) sortCol--;
          render(); debouncedSave();
        });
      });
      tbl.querySelectorAll('.row-delete').forEach(btn => {
        btn.addEventListener('click', () => {
          const ri = parseInt(btn.dataset.row);
          rows.splice(ri, 1);
          render(); debouncedSave();
        });
      });
      tbl.querySelectorAll('td[contenteditable]').forEach(td => {
        td.addEventListener('blur', () => {
          const ri = parseInt(td.dataset.row), ci = parseInt(td.dataset.col);
          rows[ri][ci] = td.textContent;
          debouncedSave();
        });
        td.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); td.blur(); }
          if (e.key === 'Tab') {
            e.preventDefault();
            const next = e.shiftKey ? td.previousElementSibling : td.nextElementSibling;
            if (next?.contentEditable === 'true') next.focus();
          }
        });
      });
    }

    // ---- Toolbar ----
    document.getElementById('addRowBtn').addEventListener('click', () => {
      if (headers.length === 0) headers = ['Column 1'];
      rows.push(new Array(headers.length).fill(''));
      render(); debouncedSave();
    });
    document.getElementById('addColBtn').addEventListener('click', () => {
      const name = `Column ${headers.length + 1}`;
      headers.push(name);
      rows.forEach(r => r.push(''));
      render(); debouncedSave();
    });
    document.getElementById('csvBtn').addEventListener('click', () => {
      const csv = toCSV();
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'table.csv';
      a.click();
      URL.revokeObjectURL(a.href);
    });
    document.getElementById('htmlBtn').addEventListener('click', () => {
      const html = toHTML();
      const blob = new Blob([html], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'table.html';
      a.click();
      URL.revokeObjectURL(a.href);
    });
    document.getElementById('mdBtn').addEventListener('click', () => {
      const md = toMarkdown();
      const blob = new Blob([md], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'table.md';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // ---- Export helpers ----
    function toCSV() {
      const csvEsc = v => `"${(v||'').replace(/"/g,'""')}"`;
      return [headers.map(csvEsc).join(','), ...rows.map(r => r.map(csvEsc).join(','))].join('\n');
    }
    function toHTML() {
      let h = '<table border="1" cellpadding="6" cellspacing="0" style="border-collapse:collapse;font-family:sans-serif;font-size:14px;">';
      h += '<thead><tr>' + headers.map(v => `<th style="background:#f5f5f5;text-align:left;">${esc(v)}</th>`).join('') + '</tr></thead><tbody>';
      rows.forEach(r => { h += '<tr>' + r.map(v => `<td>${esc(v)}</td>`).join('') + '</tr>'; });
      h += '</tbody></table>';
      return h;
    }
    function toMarkdown() {
      const pad = (s, w) => (s||'').padEnd(w);
      const widths = headers.map((h, ci) => Math.max(h.length, ...rows.map(r => (r[ci]||'').length), 3));
      const hLine = '| ' + headers.map((h, i) => pad(h, widths[i])).join(' | ') + ' |';
      const sep = '| ' + widths.map(w => '-'.repeat(w)).join(' | ') + ' |';
      const bodyLines = rows.map(r => '| ' + r.map((v, i) => pad(v, widths[i])).join(' | ') + ' |');
      return [hLine, sep, ...bodyLines].join('\n');
    }

    // ---- State ----
    function debouncedSave() { clearTimeout(stateTimer); stateTimer = setTimeout(save, 500); }
    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ _v: 1, headers, rows })); } catch {}
      const summary = headers.length === 0
        ? 'Table: empty'
        : `Table: ${rows.length} rows x ${headers.length} cols — ${headers.join(', ')}`;
      mup.updateState(summary);
    }
    function loadState() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) { const d = JSON.parse(stored); if (d._v === 1) return d; }
      } catch {}
      return null;
    }

    // ---- Theme ----
    function applyTheme(t) { document.body.classList.toggle('dark', t === 'dark'); }

    // ---- MUP functions ----
    mup.registerFunction('setTable', ({ headers: h, rows: r }) => {
      headers = h;
      rows = r.map(row => [...row]);
      sortCol = -1;
      render(); save();
      return { content: [{ type: 'text', text: `Table set: ${rows.length} rows x ${headers.length} cols.` }], isError: false };
    });

    mup.registerFunction('getTable', () => {
      if (headers.length === 0) return { content: [{ type: 'text', text: 'Table is empty.' }], isError: false };
      const md = toMarkdown();
      return { content: [
        { type: 'text', text: md },
        { type: 'data', data: { headers, rows } }
      ], isError: false };
    });

    mup.registerFunction('addRow', ({ data }) => {
      if (headers.length === 0) return { content: [{ type: 'text', text: 'Set headers first with setTable.' }], isError: true };
      while (data.length < headers.length) data.push('');
      rows.push(data.slice(0, headers.length));
      render(); save();
      return { content: [{ type: 'text', text: `Added row ${rows.length}.` }], isError: false };
    });

    mup.registerFunction('addColumn', ({ header }) => {
      headers.push(header);
      rows.forEach(r => r.push(''));
      render(); save();
      return { content: [{ type: 'text', text: `Added column "${header}". Now ${headers.length} cols.` }], isError: false };
    });

    mup.registerFunction('exportHTML', () => {
      if (headers.length === 0) return { content: [{ type: 'text', text: 'Table is empty.' }], isError: true };
      return { content: [{ type: 'text', text: toHTML() }], isError: false };
    });

    mup.registerFunction('exportCSV', () => {
      if (headers.length === 0) return { content: [{ type: 'text', text: 'Table is empty.' }], isError: true };
      return { content: [{ type: 'text', text: toCSV() }], isError: false };
    });

    // ---- Init ----
    mup.onThemeChange(applyTheme);
    mup.onReady((params) => {
      if (params?.theme) applyTheme(params.theme);
      const state = loadState();
      if (state?.headers) { headers = state.headers; rows = state.rows || []; }
      render(); save();
    });
  </script>
</body>
</html>
