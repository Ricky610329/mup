<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Principles</title>

  <script type="application/mup-manifest">
  {
    "name": "Principles",
    "description": "Execution principles handbook for the agent. Read getPrinciples before starting any task. User edits principles in the UI; agent reads them via getPrinciples. Sections can be queried individually via getSection.",
    "grid": { "minWidth": 1, "minHeight": 2 },
    "darkMode": true,
    "functions": [
      {
        "name": "getPrinciples",
        "description": "Get all principles as structured text. Call this before starting any task.",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "getSection",
        "description": "Get a specific section by title.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "title": { "type": "string", "description": "Section title to retrieve" }
          },
          "required": ["title"]
        }
      },
      {
        "name": "setSections",
        "description": "Replace all sections. Use for bulk updates.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "sections": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "title": { "type": "string" },
                  "content": { "type": "string" }
                },
                "required": ["title", "content"]
              }
            }
          },
          "required": ["sections"]
        }
      },
      {
        "name": "addSection",
        "description": "Add a new section to the principles.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "title": { "type": "string", "description": "Section title" },
            "content": { "type": "string", "description": "Section content (markdown)" }
          },
          "required": ["title", "content"]
        }
      },
      {
        "name": "updateSection",
        "description": "Update an existing section's content by title.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "title": { "type": "string", "description": "Section title to update" },
            "content": { "type": "string", "description": "New content" }
          },
          "required": ["title", "content"]
        }
      },
      {
        "name": "removeSection",
        "description": "Remove a section by title.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "title": { "type": "string", "description": "Section title to remove" }
          },
          "required": ["title"]
        }
      }
    ]
  }
  </script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.min.css" id="mdLight">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-dark.min.css" id="mdDark" disabled>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg: #fff; --bg-toolbar: #f8f9fa; --bg-editor: #fff;
      --text: #333; --text-sec: #666; --text-ter: #999;
      --border: #e0e0e0; --hover: rgba(0,0,0,0.04);
      --accent: #0066cc; --accent-bg: #e3f2fd;
      --danger: #e53935;
    }
    body.dark {
      --bg: #1e1e1e; --bg-toolbar: #2d2d2d; --bg-editor: #1e1e1e;
      --text: #d4d4d4; --text-sec: #858585; --text-ter: #5a5a5a;
      --border: #404040; --hover: rgba(255,255,255,0.06);
      --accent: #569cd6; --accent-bg: #37373d;
      --danger: #f44336;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh; display: flex; flex-direction: column;
      background: var(--bg); color: var(--text);
    }

    .toolbar {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-bottom: 1px solid var(--border);
      background: var(--bg-toolbar); flex-shrink: 0;
    }
    .toolbar-title { font-size: 12px; font-weight: 600; color: var(--text-sec); flex: 1; }
    .mode-toggle { display: flex; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
    .mode-btn {
      padding: 3px 12px; font-size: 11px; border: none; cursor: pointer;
      background: var(--bg); color: var(--text-sec); font-family: inherit;
    }
    .mode-btn.active { background: var(--accent); color: #fff; }
    .add-btn {
      background: none; border: 1px solid var(--border); cursor: pointer;
      color: var(--text-sec); font-size: 11px; padding: 3px 8px;
      border-radius: 4px; font-family: inherit;
    }
    .add-btn:hover { background: var(--hover); color: var(--text); }

    .content { flex: 1; overflow-y: auto; padding: 8px; }

    /* Section cards */
    .section {
      border: 1px solid var(--border); border-radius: 8px;
      margin-bottom: 8px; overflow: hidden;
    }
    .section-header {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px; background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .section-header:hover { background: var(--hover); }
    .section-title {
      flex: 1; font-size: 13px; font-weight: 600; color: var(--text);
      border: none; background: none; outline: none; font-family: inherit;
      cursor: pointer;
    }
    .section-title:focus { cursor: text; color: var(--accent); }
    .section-toggle {
      font-size: 10px; color: var(--text-ter); transition: transform 0.15s;
    }
    .section.collapsed .section-toggle { transform: rotate(-90deg); }
    .section-actions {
      display: flex; gap: 2px; opacity: 0; transition: opacity 0.1s;
    }
    .section-header:hover .section-actions { opacity: 1; }
    .section-act-btn {
      background: none; border: none; cursor: pointer; color: var(--text-ter);
      font-size: 12px; padding: 2px 4px; border-radius: 3px;
    }
    .section-act-btn:hover { background: var(--hover); color: var(--text); }
    .section-act-btn.danger:hover { color: var(--danger); }
    .section-body { padding: 8px 10px; }
    .section.collapsed .section-body { display: none; }

    /* Edit mode */
    .section-editor {
      width: 100%; border: none; outline: none; resize: none;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 13px; line-height: 1.6; color: var(--text);
      background: var(--bg-editor); min-height: 60px;
    }
    /* View mode */
    .section-preview { font-size: 13px; }
    .section-preview .markdown-body { background: transparent; font-size: 13px; }
    .section-preview .markdown-body p { margin: 0 0 0.4em; }
    .section-preview .markdown-body p:last-child { margin: 0; }
    .section-preview .markdown-body ul,
    .section-preview .markdown-body ol { padding-left: 1.4em; margin: 0.3em 0; }
    .section-preview .markdown-body code { font-size: 12px; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; padding: 40px 16px;
      color: var(--text-ter); font-size: 13px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title">Principles</span>
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="edit">Edit</button>
      <button class="mode-btn" data-mode="view">View</button>
    </div>
    <button class="add-btn" id="addBtn">+ Add</button>
  </div>
  <div class="content" id="content"></div>

  <script>
    const contentEl = document.getElementById('content');
    let sections = [];
    let mode = 'edit';
    let stateTimer = null;

    // ---- Rendering ----
    function render() {
      if (sections.length === 0) {
        contentEl.innerHTML = '<div class="empty-state"><span>No principles defined yet</span><span style="font-size:11px">Click <b>+ Add</b> or let the agent use <b>addSection</b></span></div>';
        return;
      }
      contentEl.innerHTML = '';
      sections.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'section' + (s._collapsed ? ' collapsed' : '');
        div.innerHTML = `
          <div class="section-header">
            <span class="section-toggle">&#9660;</span>
            <input class="section-title" value="${esc(s.title)}" spellcheck="false">
            <div class="section-actions">
              <button class="section-act-btn" data-action="up" title="Move up">&#9650;</button>
              <button class="section-act-btn" data-action="down" title="Move down">&#9660;</button>
              <button class="section-act-btn danger" data-action="delete" title="Delete">&times;</button>
            </div>
          </div>
          <div class="section-body"></div>
        `;
        // Toggle collapse
        div.querySelector('.section-toggle').addEventListener('click', (e) => {
          e.stopPropagation();
          s._collapsed = !s._collapsed;
          div.classList.toggle('collapsed', s._collapsed);
        });
        // Title edit
        const titleInput = div.querySelector('.section-title');
        titleInput.addEventListener('change', () => {
          s.title = titleInput.value.trim() || s.title;
          debouncedSave();
        });
        titleInput.addEventListener('click', (e) => e.stopPropagation());
        // Actions
        div.querySelectorAll('.section-act-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const action = btn.dataset.action;
            if (action === 'up' && i > 0) { [sections[i-1], sections[i]] = [sections[i], sections[i-1]]; render(); debouncedSave(); }
            if (action === 'down' && i < sections.length-1) { [sections[i], sections[i+1]] = [sections[i+1], sections[i]]; render(); debouncedSave(); }
            if (action === 'delete') { sections.splice(i, 1); render(); debouncedSave(); }
          });
        });
        // Body
        const body = div.querySelector('.section-body');
        if (mode === 'edit') {
          const ta = document.createElement('textarea');
          ta.className = 'section-editor';
          ta.value = s.content;
          ta.addEventListener('input', () => {
            s.content = ta.value;
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
            debouncedSave();
          });
          body.appendChild(ta);
          // Auto-resize after append
          requestAnimationFrame(() => { ta.style.height = ta.scrollHeight + 'px'; });
        } else {
          const preview = document.createElement('div');
          preview.className = 'section-preview';
          try { preview.innerHTML = '<div class="markdown-body">' + marked.parse(s.content) + '</div>'; }
          catch { preview.textContent = s.content; }
          body.appendChild(preview);
        }
        contentEl.appendChild(div);
      });
    }

    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // ---- Mode toggle ----
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        mode = btn.dataset.mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
        render();
      });
    });

    // ---- Add section ----
    document.getElementById('addBtn').addEventListener('click', () => {
      sections.push({ title: 'New Section', content: '' });
      render();
      debouncedSave();
      // Focus the last title
      const titles = contentEl.querySelectorAll('.section-title');
      if (titles.length) { const last = titles[titles.length - 1]; last.focus(); last.select(); }
    });

    // ---- State (localStorage + summary to server) ----
    const STORAGE_KEY = 'mup-principles-data';
    function debouncedSave() { clearTimeout(stateTimer); stateTimer = setTimeout(save, 500); }

    function save() {
      const clean = sections.map(s => ({ title: s.title, content: s.content }));
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ _v: 1, sections: clean })); } catch {}
      const summary = sections.length === 0
        ? 'Principles: empty'
        : `Principles: ${sections.length} section(s) — ${sections.map(s => s.title).join(', ')}`;
      mup.updateState(summary);
    }

    function loadState() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) { const d = JSON.parse(stored); if (d._v === 1 && d.sections) return d.sections; }
      } catch {}
      return [];
    }

    // ---- Theme ----
    function applyTheme(t) {
      document.body.classList.toggle('dark', t === 'dark');
      document.getElementById('mdLight').disabled = t === 'dark';
      document.getElementById('mdDark').disabled = t !== 'dark';
    }

    // ---- MUP functions ----
    mup.registerFunction('getPrinciples', () => {
      if (sections.length === 0) return { content: [{ type: 'text', text: 'No principles defined.' }], isError: false };
      const text = sections.map(s => `## ${s.title}\n${s.content}`).join('\n\n');
      return { content: [{ type: 'text', text }], isError: false };
    });

    mup.registerFunction('getSection', ({ title }) => {
      const s = sections.find(s => s.title.toLowerCase() === title.toLowerCase());
      if (!s) return { content: [{ type: 'text', text: `Section "${title}" not found. Available: ${sections.map(s => s.title).join(', ')}` }], isError: true };
      return { content: [{ type: 'text', text: `## ${s.title}\n${s.content}` }], isError: false };
    });

    mup.registerFunction('setSections', ({ sections: newSections }) => {
      sections = newSections.map(s => ({ title: s.title, content: s.content }));
      render(); save();
      return { content: [{ type: 'text', text: `Set ${sections.length} section(s).` }], isError: false };
    });

    mup.registerFunction('addSection', ({ title, content }) => {
      sections.push({ title, content });
      render(); save();
      return { content: [{ type: 'text', text: `Added section "${title}".` }], isError: false };
    });

    mup.registerFunction('updateSection', ({ title, content }) => {
      const s = sections.find(s => s.title.toLowerCase() === title.toLowerCase());
      if (!s) return { content: [{ type: 'text', text: `Section "${title}" not found.` }], isError: true };
      s.content = content;
      render(); save();
      return { content: [{ type: 'text', text: `Updated section "${s.title}".` }], isError: false };
    });

    mup.registerFunction('removeSection', ({ title }) => {
      const idx = sections.findIndex(s => s.title.toLowerCase() === title.toLowerCase());
      if (idx === -1) return { content: [{ type: 'text', text: `Section "${title}" not found.` }], isError: true };
      const removed = sections.splice(idx, 1)[0];
      render(); save();
      return { content: [{ type: 'text', text: `Removed section "${removed.title}".` }], isError: false };
    });

    // ---- Init ----
    mup.onThemeChange(applyTheme);
    mup.onReady((params) => {
      if (params?.theme) applyTheme(params.theme);
      sections = loadState();
      render();
      save();
    });
  </script>
</body>
</html>
