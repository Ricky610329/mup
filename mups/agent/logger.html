<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logger</title>

  <script type="application/mup-manifest">
  {
    "name": "Logger",
    "description": "Execution log and audit trail. Color-coded entries with timestamps. Functions: log(level, message), getLogs(filter?), clear, exportLogs.",
    "grid": { "minWidth": 1, "minHeight": 2 },
    "darkMode": true,
    "functions": [
      {
        "name": "log",
        "description": "Add a log entry.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "level": { "type": "string", "enum": ["info", "success", "warning", "error"], "description": "Log level" },
            "message": { "type": "string", "description": "Log message" }
          },
          "required": ["level", "message"]
        }
      },
      {
        "name": "getLogs",
        "description": "Get recent log entries, optionally filtered by level.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "level": { "type": "string", "enum": ["info", "success", "warning", "error"], "description": "Filter by level (optional)" },
            "limit": { "type": "integer", "description": "Max entries to return (default 50)" }
          }
        }
      },
      {
        "name": "clear",
        "description": "Clear all log entries.",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "exportLogs",
        "description": "Get all logs as formatted text for export.",
        "inputSchema": { "type": "object", "properties": {} }
      }
    ]
  }
  </script>

  <style>
    :root {
      --bg: #fff; --bg-toolbar: #f8f9fa;
      --text: #333; --text-sec: #666; --text-ter: #999;
      --border: #e0e0e0; --hover: rgba(0,0,0,0.04);
      --info: #3b82f6; --info-bg: #eff6ff;
      --success: #22c55e; --success-bg: #f0fdf4;
      --warning: #f59e0b; --warning-bg: #fffbeb;
      --error: #ef4444; --error-bg: #fef2f2;
    }
    body.dark {
      --bg: #1e1e1e; --bg-toolbar: #2d2d2d;
      --text: #d4d4d4; --text-sec: #858585; --text-ter: #5a5a5a;
      --border: #404040; --hover: rgba(255,255,255,0.06);
      --info: #60a5fa; --info-bg: #1a2a3e;
      --success: #4ade80; --success-bg: #1a2e1a;
      --warning: #fbbf24; --warning-bg: #2e2a1a;
      --error: #f87171; --error-bg: #2e1a1a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      height: 100vh; display: flex; flex-direction: column;
      background: var(--bg); color: var(--text);
    }

    .toolbar {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-bottom: 1px solid var(--border);
      background: var(--bg-toolbar); flex-shrink: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .toolbar-title { font-size: 12px; font-weight: 600; color: var(--text-sec); }
    .toolbar-spacer { flex: 1; }
    .toolbar-count { font-size: 10px; color: var(--text-ter); }
    .filter-toggle {
      display: flex; gap: 2px;
    }
    .filter-btn {
      width: 8px; height: 8px; border-radius: 50%; border: none; cursor: pointer;
      opacity: 0.3; transition: opacity 0.1s;
    }
    .filter-btn.active { opacity: 1; }
    .filter-btn[data-level="info"] { background: var(--info); }
    .filter-btn[data-level="success"] { background: var(--success); }
    .filter-btn[data-level="warning"] { background: var(--warning); }
    .filter-btn[data-level="error"] { background: var(--error); }
    .toolbar-btn {
      background: none; border: 1px solid var(--border); cursor: pointer;
      color: var(--text-sec); font-size: 11px; padding: 3px 8px;
      border-radius: 4px; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .toolbar-btn:hover { background: var(--hover); color: var(--text); }

    .log-list {
      flex: 1; overflow-y: auto; padding: 4px 0;
      display: flex; flex-direction: column;
    }
    .log-entry {
      padding: 3px 12px; font-size: 11px; line-height: 1.5;
      display: flex; gap: 8px; align-items: baseline;
      border-left: 3px solid transparent;
    }
    .log-entry:hover { background: var(--hover); }
    .log-entry.info { border-left-color: var(--info); }
    .log-entry.success { border-left-color: var(--success); }
    .log-entry.warning { border-left-color: var(--warning); }
    .log-entry.error { border-left-color: var(--error); background: var(--error-bg); }
    .log-time { color: var(--text-ter); flex-shrink: 0; font-size: 10px; }
    .log-level {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      flex-shrink: 0; width: 42px;
    }
    .log-level.info { color: var(--info); }
    .log-level.success { color: var(--success); }
    .log-level.warning { color: var(--warning); }
    .log-level.error { color: var(--error); }
    .log-msg { flex: 1; word-wrap: break-word; overflow-wrap: anywhere; }

    .empty-state {
      display: flex; align-items: center; justify-content: center;
      flex: 1; color: var(--text-ter); font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title">Logger</span>
    <span class="toolbar-count" id="countEl">0</span>
    <span class="toolbar-spacer"></span>
    <div class="filter-toggle">
      <button class="filter-btn active" data-level="info" title="Info"></button>
      <button class="filter-btn active" data-level="success" title="Success"></button>
      <button class="filter-btn active" data-level="warning" title="Warning"></button>
      <button class="filter-btn active" data-level="error" title="Error"></button>
    </div>
    <button class="toolbar-btn" id="clearBtn">Clear</button>
    <button class="toolbar-btn" id="exportBtn" title="Download logs">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
  </div>
  <div class="log-list" id="logList"></div>

  <script>
    const logListEl = document.getElementById('logList');
    const countEl = document.getElementById('countEl');

    let logs = []; // [{ level, message, timestamp }]
    let filters = { info: true, success: true, warning: true, error: true };
    let stateTimer = null;
    let autoScroll = true;

    const STORAGE_KEY = 'mup-logger-data';
    const MAX_LOGS = 500;

    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ---- Rendering ----
    function render() {
      const filtered = logs.filter(l => filters[l.level]);
      countEl.textContent = `${filtered.length}/${logs.length}`;

      if (logs.length === 0) {
        logListEl.innerHTML = '<div class="empty-state">No log entries</div>';
        return;
      }

      logListEl.innerHTML = '';
      for (const l of filtered) {
        const div = document.createElement('div');
        div.className = `log-entry ${l.level}`;
        div.innerHTML = `<span class="log-time">${formatTime(l.timestamp)}</span><span class="log-level ${l.level}">${l.level}</span><span class="log-msg">${esc(l.message)}</span>`;
        logListEl.appendChild(div);
      }
      if (autoScroll) logListEl.scrollTop = logListEl.scrollHeight;
    }

    function appendEntry(l) {
      if (!filters[l.level]) return;
      // Remove empty state if present
      const empty = logListEl.querySelector('.empty-state');
      if (empty) empty.remove();

      const div = document.createElement('div');
      div.className = `log-entry ${l.level}`;
      div.innerHTML = `<span class="log-time">${formatTime(l.timestamp)}</span><span class="log-level ${l.level}">${l.level}</span><span class="log-msg">${esc(l.message)}</span>`;
      logListEl.appendChild(div);
      countEl.textContent = `${logListEl.querySelectorAll('.log-entry').length}/${logs.length}`;
      if (autoScroll) logListEl.scrollTop = logListEl.scrollHeight;
    }

    // ---- Filters ----
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const level = btn.dataset.level;
        filters[level] = !filters[level];
        btn.classList.toggle('active', filters[level]);
        render();
      });
    });

    // ---- Clear ----
    document.getElementById('clearBtn').addEventListener('click', () => {
      logs = [];
      render(); debouncedSave();
    });

    // ---- Export/Download ----
    document.getElementById('exportBtn').addEventListener('click', () => {
      const text = logs.map(l => `[${formatTime(l.timestamp)}] [${l.level.toUpperCase()}] ${l.message}`).join('\n');
      const blob = new Blob([text], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `mup-log-${new Date().toISOString().slice(0, 10)}.txt`;
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // ---- Auto-scroll detection ----
    logListEl.addEventListener('scroll', () => {
      autoScroll = logListEl.scrollTop + logListEl.clientHeight >= logListEl.scrollHeight - 20;
    });

    // ---- State (localStorage + summary to server) ----
    function debouncedSave() { clearTimeout(stateTimer); stateTimer = setTimeout(save, 1000); }

    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ _v: 1, logs })); } catch {}
      const summary = logs.length === 0
        ? 'Logger: empty'
        : `Logger: ${logs.length} entries, last: [${logs[logs.length - 1].level}] ${logs[logs.length - 1].message.slice(0, 60)}`;
      mup.updateState(summary);
    }

    function loadState() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) { const d = JSON.parse(stored); if (d._v === 1 && d.logs) return d.logs; }
      } catch {}
      return [];
    }

    // ---- Theme ----
    function applyTheme(t) { document.body.classList.toggle('dark', t === 'dark'); }

    // ---- MUP functions ----
    mup.registerFunction('log', ({ level, message }) => {
      const entry = { level, message, timestamp: Date.now() };
      logs.push(entry);
      if (logs.length > MAX_LOGS) logs.splice(0, logs.length - MAX_LOGS);
      appendEntry(entry);
      debouncedSave();
      return { content: [{ type: 'text', text: `Logged [${level}]: ${message.slice(0, 80)}` }], isError: false };
    });

    mup.registerFunction('getLogs', ({ level, limit }) => {
      let filtered = level ? logs.filter(l => l.level === level) : logs;
      const max = limit || 50;
      filtered = filtered.slice(-max);
      if (filtered.length === 0) return { content: [{ type: 'text', text: 'No log entries.' }], isError: false };
      const text = filtered.map(l => `[${formatTime(l.timestamp)}] [${l.level}] ${l.message}`).join('\n');
      return { content: [{ type: 'text', text }], isError: false };
    });

    mup.registerFunction('clear', () => {
      const count = logs.length;
      logs = [];
      render(); save();
      return { content: [{ type: 'text', text: `Cleared ${count} log entries.` }], isError: false };
    });

    mup.registerFunction('exportLogs', () => {
      if (logs.length === 0) return { content: [{ type: 'text', text: 'No logs to export.' }], isError: false };
      const text = logs.map(l => `[${formatTime(l.timestamp)}] [${l.level.toUpperCase()}] ${l.message}`).join('\n');
      return { content: [{ type: 'text', text }], isError: false };
    });

    // ---- Init ----
    mup.onThemeChange(applyTheme);
    mup.onReady((params) => {
      if (params?.theme) applyTheme(params.theme);
      logs = loadState();
      render(); save();
    });
  </script>
</body>
</html>
