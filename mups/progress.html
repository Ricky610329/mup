<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Progress</title>

  <script type="application/mup-manifest">
  {
    "name": "Progress",
    "description": "Task progress tracker. Displays multiple progress bars showing real-time status of background tasks.",
    "grid": { "minWidth": 2, "minHeight": 2, "preferredWidth": 3, "preferredHeight": 3 },
    "darkMode": true,
    "notifications": { "level": "silent", "overridable": true },
    "functions": [
      {
        "name": "addTask",
        "description": "Add a new task to the progress tracker",
        "inputSchema": {
          "type": "object",
          "properties": {
            "taskId": { "type": "string", "description": "Unique task identifier" },
            "name": { "type": "string", "description": "Display name for the task" },
            "progress": { "type": "number", "description": "Initial progress 0-100 (default 0)" },
            "status": { "type": "string", "enum": ["running", "completed", "waiting"], "description": "Task status (default: waiting)" }
          },
          "required": ["taskId", "name"]
        }
      },
      {
        "name": "updateTask",
        "description": "Update a task's progress or status",
        "inputSchema": {
          "type": "object",
          "properties": {
            "taskId": { "type": "string", "description": "Task identifier to update" },
            "name": { "type": "string", "description": "New display name" },
            "progress": { "type": "number", "description": "New progress value 0-100" },
            "status": { "type": "string", "enum": ["running", "completed", "waiting"], "description": "New status" }
          },
          "required": ["taskId"]
        }
      },
      {
        "name": "removeTask",
        "description": "Remove a task from the tracker",
        "inputSchema": {
          "type": "object",
          "properties": {
            "taskId": { "type": "string", "description": "Task identifier to remove" }
          },
          "required": ["taskId"]
        }
      },
      {
        "name": "clearAll",
        "description": "Remove all tasks from the tracker",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "getTasks",
        "description": "Get all current tasks and their progress",
        "inputSchema": { "type": "object", "properties": {} }
      }
    ]
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #FFFFFF;
      --bg-card: #F8FAFC;
      --bg-bar: #E2E8F0;
      --text: #1E293B;
      --text-secondary: #64748B;
      --text-muted: #94A3B8;
      --border: #E2E8F0;
      --blue: #3B82F6;
      --blue-light: #DBEAFE;
      --green: #10B981;
      --green-light: #D1FAE5;
      --gray: #9CA3AF;
      --gray-light: #F1F5F9;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
    }

    body.dark {
      --bg: #0F172A;
      --bg-card: #1E293B;
      --bg-bar: #334155;
      --text: #F1F5F9;
      --text-secondary: #94A3B8;
      --text-muted: #64748B;
      --border: #334155;
      --blue-light: #1E3A5F;
      --green-light: #1A3A2A;
      --gray-light: #1E293B;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px 8px;
      flex-shrink: 0;
    }

    .header-icon {
      width: 20px;
      height: 20px;
      color: var(--blue);
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }

    .badge {
      background: var(--blue);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      min-width: 20px;
      text-align: center;
    }

    .task-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 16px 8px;
    }

    .task-list::-webkit-scrollbar { width: 4px; }
    .task-list::-webkit-scrollbar-track { background: transparent; }
    .task-list::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }

    .task-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
      box-shadow: var(--shadow);
      animation: slideIn 0.3s ease-out;
      transition: opacity 0.3s, transform 0.3s;
      position: relative;
    }

    .task-delete {
      position: absolute;
      top: 6px;
      right: 6px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s;
      line-height: 1;
      padding: 2px 4px;
    }
    .task-item:hover .task-delete { opacity: 1; }
    .task-delete:hover { color: #EF4444; }

    .task-item.removing {
      opacity: 0;
      transform: translateX(20px);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .task-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .task-name {
      font-size: 12.5px;
      font-weight: 500;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 8px;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .task-percent {
      font-size: 12px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      min-width: 36px;
      text-align: right;
    }

    .status-tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .status-running { background: var(--blue-light); color: var(--blue); }
    .status-completed { background: var(--green-light); color: var(--green); }
    .status-waiting { background: var(--gray-light); color: var(--gray); }

    .bar-track {
      width: 100%;
      height: 6px;
      background: var(--bg-bar);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s;
      position: relative;
    }

    .bar-fill.running {
      background: var(--blue);
    }

    .bar-fill.running::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .bar-fill.completed { background: var(--green); }
    .bar-fill.waiting { background: var(--gray); }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      gap: 8px;
    }

    .empty-state svg { width: 32px; height: 32px; opacity: 0.5; }
    .empty-state span { font-size: 13px; }

    .footer {
      padding: 8px 16px 12px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .footer-label { font-size: 11px; color: var(--text-secondary); }
    .footer-percent { font-size: 12px; font-weight: 600; color: var(--blue); font-variant-numeric: tabular-nums; }

    .footer .bar-track { height: 4px; }
    .footer .bar-fill { background: var(--blue); }
  </style>
</head>
<body>
  <div class="header">
    <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    <h1>任務進度</h1>
    <div class="badge" id="taskCount">0</div>
  </div>

  <div class="task-list" id="taskList">
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <span>尚無任務</span>
    </div>
  </div>

  <div class="footer" id="footer" style="display:none">
    <div class="footer-row">
      <span class="footer-label">整體進度</span>
      <span class="footer-percent" id="overallPercent">0%</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="overallBar" style="width:0%"></div>
    </div>
  </div>

  <script>
    const STATUS_LABELS = { running: '執行中', completed: '已完成', waiting: '等待中' };
    let tasks = new Map();

    function save() {
      const data = Array.from(tasks.entries()).map(([id, t]) => ({ ...t, taskId: id }));
      localStorage.setItem('mup-progress-tasks', JSON.stringify(data));
    }

    function load() {
      try {
        const data = JSON.parse(localStorage.getItem('mup-progress-tasks') || '[]');
        tasks.clear();
        data.forEach(t => tasks.set(t.taskId, { name: t.name, progress: t.progress || 0, status: t.status || 'waiting' }));
      } catch(e) { tasks.clear(); }
    }

    function render() {
      const list = document.getElementById('taskList');
      const empty = document.getElementById('emptyState');
      const footer = document.getElementById('footer');
      const badge = document.getElementById('taskCount');

      badge.textContent = tasks.size;

      if (tasks.size === 0) {
        list.innerHTML = '';
        list.appendChild(empty);
        empty.style.display = 'flex';
        footer.style.display = 'none';
        return;
      }

      empty.style.display = 'none';
      footer.style.display = 'block';

      const existing = new Set();
      tasks.forEach((t, id) => {
        existing.add(id);
        let el = list.querySelector(`[data-id="${id}"]`);
        if (!el) {
          el = document.createElement('div');
          el.className = 'task-item';
          el.dataset.id = id;
          el.innerHTML = `
            <button class="task-delete" title="移除">&times;</button>
            <div class="task-top">
              <span class="task-name"></span>
              <div class="task-meta">
                <span class="status-tag"></span>
                <span class="task-percent"></span>
              </div>
            </div>
            <div class="bar-track">
              <div class="bar-fill" style="width:0%"></div>
            </div>`;
          el.querySelector('.task-delete').addEventListener('click', () => {
            tasks.delete(id);
            save(); render();
          });
          list.appendChild(el);
        }

        el.querySelector('.task-name').textContent = t.status === 'completed' ? `\u2713 ${t.name}` : t.name;
        el.querySelector('.task-percent').textContent = `${Math.round(t.progress)}%`;

        const tag = el.querySelector('.status-tag');
        tag.textContent = STATUS_LABELS[t.status] || t.status;
        tag.className = `status-tag status-${t.status}`;

        const fill = el.querySelector('.bar-fill');
        fill.style.width = `${t.progress}%`;
        fill.className = `bar-fill ${t.status}`;
      });

      list.querySelectorAll('.task-item').forEach(el => {
        if (!existing.has(el.dataset.id)) {
          el.classList.add('removing');
          setTimeout(() => el.remove(), 300);
        }
      });

      // Overall
      let total = 0, count = 0;
      tasks.forEach(t => { total += t.progress; count++; });
      const overall = count ? Math.round(total / count) : 0;
      document.getElementById('overallPercent').textContent = `${overall}%`;
      document.getElementById('overallBar').style.width = `${overall}%`;

      updateMupState();
    }

    function updateMupState() {
      const running = Array.from(tasks.values()).filter(t => t.status === 'running').length;
      const completed = Array.from(tasks.values()).filter(t => t.status === 'completed').length;
      const summary = `${tasks.size} 項任務 | ${running} 執行中 | ${completed} 已完成`;
      mup.updateState(summary, { total: tasks.size, running, completed });
    }

    // Register MUP functions
    mup.registerFunction('addTask', async (params) => {
      const { taskId, name, progress = 0, status = 'waiting' } = params;
      if (!taskId || !name) return { content: [{ type: 'text', text: 'taskId and name are required' }], isError: true };
      tasks.set(taskId, { name, progress: Math.min(100, Math.max(0, progress)), status });
      save(); render();
      return { content: [{ type: 'text', text: `Task "${name}" added (${status}, ${progress}%)` }], isError: false };
    });

    mup.registerFunction('updateTask', async (params) => {
      const { taskId, name, progress, status } = params;
      const task = tasks.get(taskId);
      if (!task) return { content: [{ type: 'text', text: `Task "${taskId}" not found` }], isError: true };
      if (name !== undefined) task.name = name;
      if (progress !== undefined) task.progress = Math.min(100, Math.max(0, progress));
      if (status !== undefined) task.status = status;
      if (status === 'completed') task.progress = 100;
      save(); render();
      return { content: [{ type: 'text', text: `Task "${task.name}" updated (${task.status}, ${task.progress}%)` }], isError: false };
    });

    mup.registerFunction('removeTask', async (params) => {
      const { taskId } = params;
      if (!tasks.has(taskId)) return { content: [{ type: 'text', text: `Task "${taskId}" not found` }], isError: true };
      const name = tasks.get(taskId).name;
      tasks.delete(taskId);
      save(); render();
      return { content: [{ type: 'text', text: `Task "${name}" removed` }], isError: false };
    });

    mup.registerFunction('clearAll', async () => {
      tasks.clear();
      save(); render();
      return { content: [{ type: 'text', text: 'All tasks cleared' }], isError: false };
    });

    mup.registerFunction('getTasks', async () => {
      const data = Array.from(tasks.entries()).map(([id, t]) => ({ taskId: id, ...t }));
      return {
        content: [
          { type: 'text', text: `${tasks.size} tasks tracked` },
          { type: 'data', data }
        ],
        isError: false
      };
    });

    mup.onReady(({ theme }) => {
      if (theme === 'dark') document.body.classList.add('dark');
      load();
      render();
    });

    mup.onThemeChange((theme) => {
      document.body.classList.toggle('dark', theme === 'dark');
    });
  </script>
</body>
</html>
