<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Reader</title>
  <script type="application/mup-manifest">
  {
    "name": "PDF Reader",
    "description": "PDF viewer with region selection for discussing documents with the LLM. User draws a selection box, LLM captures it as an image. Use loadPDF to open a file, captureSelection to see what the user selected, setSelection to highlight a region.",
    "grid": { "minWidth": 2, "minHeight": 2, "preferredWidth": 3, "preferredHeight": 3 },
    "darkMode": true,
    "notifications": { "level": "notify", "overridable": true },
    "functions": [
      { "name": "loadPDF", "description": "Load a PDF file into the reader.", "inputSchema": { "type": "object", "properties": { "path": { "type": "string" } }, "required": ["path"] } },
      { "name": "goToPage", "description": "Navigate to a specific page.", "inputSchema": { "type": "object", "properties": { "page": { "type": "integer" } }, "required": ["page"] } },
      { "name": "setSelection", "description": "Set the selection box position. Coordinates in PDF points (72dpi).", "inputSchema": { "type": "object", "properties": { "page": { "type": "integer" }, "x": { "type": "number" }, "y": { "type": "number" }, "w": { "type": "number" }, "h": { "type": "number" } }, "required": ["x", "y", "w", "h"] } },
      { "name": "clearSelection", "description": "Remove the selection box.", "inputSchema": { "type": "object", "properties": {} } },
      { "name": "captureSelection", "description": "Capture the selected region as a PNG image.", "inputSchema": { "type": "object", "properties": {} } },
      { "name": "getPageText", "description": "Extract text content from a page.", "inputSchema": { "type": "object", "properties": { "page": { "type": "integer" } } } },
      { "name": "getContext", "description": "Get current state.", "inputSchema": { "type": "object", "properties": {} } },
      { "name": "importFolder", "description": "Register a folder and scan for PDFs. Call with no args to rescan.", "inputSchema": { "type": "object", "properties": { "path": { "type": "string", "description": "Folder path to register (optional)" }, "description": { "type": "string" } } } }
    ]
  }
  </script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="topBar">
    <button id="sidebarToggle" class="icon-btn" title="Toggle sidebar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span id="pdfTitle">PDF Reader</span>
    <div class="top-spacer"></div>
    <div id="pageControls" style="display:none">
      <button id="selectToggle" class="icon-btn" title="Toggle selection tool">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" stroke-dasharray="4 2"/></svg>
      </button>
      <span class="separator"></span>
      <button id="prevPage" class="icon-btn" title="Previous page">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
      </button>
      <input type="number" id="pageInput" min="1" value="1">
      <span id="pageTotal">/ 0</span>
      <button id="nextPage" class="icon-btn" title="Next page">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,6 15,12 9,18"/></svg>
      </button>
      <span class="separator"></span>
      <button id="zoomOut" class="icon-btn" title="Zoom out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <span id="zoomLevel">100%</span>
      <button id="zoomIn" class="icon-btn" title="Zoom in">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
    </div>
  </div>
  <div id="mainLayout">
    <div id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">PDFs</span>
        <button id="uploadBtn" class="icon-btn" title="Upload PDF">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <input type="file" id="fileInput" accept=".pdf" style="display:none">
      </div>
      <div id="fileTree" class="file-tree"></div>
    </div>
    <div id="sidebarResizer"></div>
    <div id="content">
      <div id="emptyState">
        <div class="empty-icon">PDF</div>
        <div class="empty-text">Upload a PDF or ask the LLM to load one</div>
      </div>
      <div id="pdfScroller" style="display:none">
        <div id="pdfContainer"></div>
      </div>
    </div>
  </div>
  <div id="deleteModal" style="display:none">
    <div class="modal-title">Remove from library?</div>
    <p class="modal-desc">Remove <strong id="deleteFileName"></strong>. The original file will not be deleted.</p>
    <div class="modal-actions">
      <button id="deleteConfirm" class="btn-danger">Remove</button>
      <button id="deleteCancel">Cancel</button>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
