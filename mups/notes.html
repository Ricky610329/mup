<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Notes</title>

  <script type="application/mup-manifest">
  {
    "name": "Sticky Notes",
    "description": "A sticky note board organized by the LLM. Notes can be grouped into stacks (macOS Stack style). Drag notes to reorder or drop into groups. Expanded groups flow inline, pushing other notes. Persistent via localStorage.",
    "grid": { "minWidth": 2, "minHeight": 2, "preferredWidth": 3, "preferredHeight": 3 },
    "darkMode": true,
    "notifications": { "level": "notify", "overridable": true },
    "functions": [
      {
        "name": "addNote",
        "description": "Add a sticky note. If group doesn't exist, it's created automatically.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "text": { "type": "string", "description": "Note content" },
            "color": { "type": "string", "enum": ["yellow","pink","blue","green","purple","orange"] },
            "icon": { "type": "string", "description": "Prefix icon (idea/todo/question/star/warning or emoji)" },
            "group": { "type": "string", "description": "Group label" }
          },
          "required": ["text"]
        }
      },
      {
        "name": "editNote",
        "description": "Edit a note.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "id": { "type": "string" },
            "text": { "type": "string" },
            "color": { "type": "string", "enum": ["yellow","pink","blue","green","purple","orange"] },
            "icon": { "type": "string" }
          },
          "required": ["id"]
        }
      },
      {
        "name": "removeNote",
        "description": "Remove a note.",
        "inputSchema": { "type": "object", "properties": { "id": { "type": "string" } }, "required": ["id"] }
      },
      {
        "name": "setGroup",
        "description": "Group notes into a labeled stack.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "noteIds": { "type": "array", "items": { "type": "string" } },
            "label": { "type": "string" },
            "color": { "type": "string", "enum": ["yellow","pink","blue","green","purple","orange"] }
          },
          "required": ["noteIds", "label"]
        }
      },
      {
        "name": "ungroup",
        "description": "Dissolve a group.",
        "inputSchema": { "type": "object", "properties": { "group": { "type": "string" } }, "required": ["group"] }
      },
      {
        "name": "renameGroup",
        "description": "Rename a group.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "group": { "type": "string", "description": "Current group label" },
            "newLabel": { "type": "string", "description": "New label" },
            "color": { "type": "string", "enum": ["yellow","pink","blue","green","purple","orange"], "description": "Optionally change color too" }
          },
          "required": ["group", "newLabel"]
        }
      },
      {
        "name": "getGroup",
        "description": "Read all notes in a group.",
        "inputSchema": { "type": "object", "properties": { "group": { "type": "string" } }, "required": ["group"] }
      },
      {
        "name": "getNotes",
        "description": "Get all notes, optionally filtered by group.",
        "inputSchema": { "type": "object", "properties": { "group": { "type": "string" } } }
      },
      {
        "name": "setStyle",
        "description": "Change visual style.",
        "inputSchema": { "type": "object", "properties": { "bg": { "type": "string" }, "font": { "type": "string" } } }
      },
      {
        "name": "clearAll",
        "description": "Remove all notes and groups.",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "export",
        "description": "Export all as JSON.",
        "inputSchema": { "type": "object", "properties": {} }
      }
    ]
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F5F0E8;
      --text: #2D2A26;
      --text-dim: rgba(45,42,38,0.4);
      --note-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 3px 10px rgba(0,0,0,0.05);
      --note-hover: 0 4px 14px rgba(0,0,0,0.1);
      --yellow: #FFF9C4; --yellow-edge: #F0D800;
      --pink: #FCE4EC; --pink-edge: #F48FB1;
      --blue: #E3F2FD; --blue-edge: #64B5F6;
      --green: #E8F5E9; --green-edge: #81C784;
      --purple: #F3E5F5; --purple-edge: #CE93D8;
      --orange: #FFF3E0; --orange-edge: #FFB74D;
    }

    body.dark {
      --bg: #1A1816;
      --text: #F0EBE3;
      --text-dim: rgba(240,235,227,0.3);
      --note-shadow: 0 1px 4px rgba(0,0,0,0.25), 0 3px 10px rgba(0,0,0,0.15);
      --note-hover: 0 4px 14px rgba(0,0,0,0.3);
      --yellow: #4A4520; --yellow-edge: #BBA820;
      --pink: #4A2030; --pink-edge: #C06080;
      --blue: #1A3048; --blue-edge: #4090D0;
      --green: #1A3A20; --green-edge: #50A060;
      --purple: #3A1A48; --purple-edge: #A060C0;
      --orange: #4A3018; --orange-edge: #D09040;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.4s, color 0.3s;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 10px 14px 6px;
      gap: 8px;
      flex-shrink: 0;
    }

    .header h1 { font-size: 14px; font-weight: 600; flex: 1; opacity: 0.8; }
    .count-badge { font-size: 11px; font-weight: 600; color: var(--text-dim); }

    .hdr-btn {
      height: 26px; padding: 0 10px; border-radius: 6px;
      border: 1.5px solid var(--text-dim); background: transparent;
      color: var(--text); font-size: 11px; font-weight: 600;
      cursor: pointer; opacity: 0.5; transition: all 0.2s;
    }
    .hdr-btn:hover { opacity: 0.9; }

    .group-input-row {
      display: none;
      padding: 0 14px 6px;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }
    .group-input-row.active { display: flex; }
    .group-input {
      flex: 1; height: 28px; border-radius: 6px; border: 1.5px solid var(--text-dim);
      background: transparent; color: var(--text); font-size: 12px; padding: 0 8px;
      outline: none;
    }
    .group-input:focus { border-color: var(--blue-edge); }
    .group-input-ok, .group-input-cancel {
      height: 28px; padding: 0 10px; border-radius: 6px; border: none;
      font-size: 11px; font-weight: 600; cursor: pointer;
    }
    .group-input-ok { background: var(--blue-edge); color: white; }
    .group-input-cancel { background: transparent; color: var(--text); opacity: 0.5; }

    .board {
      flex: 1; overflow-y: auto; padding: 6px 12px 14px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      grid-auto-rows: min-content;
      gap: 8px;
      align-items: start;
    }
    .board::-webkit-scrollbar { width: 4px; }
    .board::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 2px; }

    /* Note */
    .note {
      min-height: 68px;
      overflow: hidden;
      border-radius: 5px;
      padding: 8px 10px;
      position: relative;
      box-shadow: var(--note-shadow);
      transition: box-shadow 0.2s, transform 0.15s, opacity 0.2s;
      cursor: grab;
      display: flex;
      flex-direction: column;
      animation: noteIn 0.2s ease-out;
      border-left: 3px solid transparent;
    }
    .note:hover { box-shadow: var(--note-hover); transform: translateY(-1px); }
    .note.dragging { opacity: 0.3; transform: scale(0.95); }
    .note.drop-before { box-shadow: -3px 0 0 0 var(--blue-edge), var(--note-shadow); }
    .note.drop-after { box-shadow: 3px 0 0 0 var(--blue-edge), var(--note-shadow); }

    @keyframes noteIn {
      from { opacity: 0; transform: scale(0.93); }
      to { opacity: 1; transform: scale(1); }
    }

    .note.yellow { background: var(--yellow); border-left-color: var(--yellow-edge); }
    .note.pink { background: var(--pink); border-left-color: var(--pink-edge); }
    .note.blue { background: var(--blue); border-left-color: var(--blue-edge); }
    .note.green { background: var(--green); border-left-color: var(--green-edge); }
    .note.purple { background: var(--purple); border-left-color: var(--purple-edge); }
    .note.orange { background: var(--orange); border-left-color: var(--orange-edge); }

    .note-icon { font-size: 12px; margin-bottom: 3px; }
    .note-text {
      font-size: 12px; line-height: 1.5; flex: 1; outline: none;
      word-break: break-word; white-space: pre-wrap; overflow-wrap: break-word;
      min-height: 1.4em; cursor: text;
    }
    .note-text:focus { background: rgba(255,255,255,0.15); border-radius: 3px; padding: 2px 4px; margin: -2px -4px; }
    .note-id { font-size: 8px; opacity: 0.25; position: absolute; bottom: 3px; right: 5px; }
    .note-delete {
      position: absolute; top: 3px; right: 5px; background: none; border: none;
      color: var(--text); opacity: 0; cursor: pointer; font-size: 13px; line-height: 1; transition: opacity 0.15s;
    }
    .note:hover .note-delete { opacity: 0.3; }
    .note-delete:hover { opacity: 0.8 !important; }

    /* Stack collapsed */
    .stack {
      position: relative;
      cursor: pointer;
      min-height: 68px;
      max-height: 120px;
      overflow: hidden;
      transition: all 0.2s;
    }
    .stack.dragging { opacity: 0.3; transform: scale(0.95); }
    .stack.drop-over { outline: 2px dashed var(--blue-edge); outline-offset: 2px; border-radius: 7px; }
    .stack.drop-before { border-left: 3px solid var(--blue-edge); }
    .stack.drop-after { border-right: 3px solid var(--blue-edge); }

    .stack-behind {
      position: absolute; top: 0; left: 0; right: 0; height: 100%;
      border-radius: 5px; border-left: 3px solid transparent; box-shadow: var(--note-shadow);
    }
    .stack-behind:nth-child(1) { transform: translate(3px, 3px) rotate(0.8deg); opacity: 0.35; z-index: 0; }
    .stack-behind:nth-child(2) { transform: translate(1.5px, 1.5px) rotate(-0.4deg); opacity: 0.55; z-index: 1; }

    .stack-front {
      position: relative; z-index: 2; border-radius: 5px; padding: 8px 10px;
      min-height: 68px; box-shadow: var(--note-shadow); border-left: 3px solid transparent;
      display: flex; flex-direction: column; overflow: hidden;
    }

    .stack-front.yellow, .stack-behind.yellow { background: var(--yellow); border-left-color: var(--yellow-edge); }
    .stack-front.pink, .stack-behind.pink { background: var(--pink); border-left-color: var(--pink-edge); }
    .stack-front.blue, .stack-behind.blue { background: var(--blue); border-left-color: var(--blue-edge); }
    .stack-front.green, .stack-behind.green { background: var(--green); border-left-color: var(--green-edge); }
    .stack-front.purple, .stack-behind.purple { background: var(--purple); border-left-color: var(--purple-edge); }
    .stack-front.orange, .stack-behind.orange { background: var(--orange); border-left-color: var(--orange-edge); }

    .stack-label {
      font-size: 9px; font-weight: 700; opacity: 0.5;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;
    }
    .stack-label .cnt { font-weight: 500; opacity: 0.7; }
    .stack-preview {
      font-size: 12px; line-height: 1.4; opacity: 0.85;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }

    /* Expanded group — full width container with own grid */
    .group-expanded {
      grid-column: 1 / -1;
      border: 1px solid var(--text-dim);
      border-radius: 7px;
      padding: 6px;
      transition: border-color 0.2s;
    }
    .group-expanded.drop-over { border-color: var(--blue-edge); }

    .group-exp-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 4px 6px;
      cursor: pointer;
    }
    .group-exp-label {
      font-size: 10px; font-weight: 700; opacity: 0.45;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .group-exp-line { flex: 1; height: 1px; background: var(--text-dim); opacity: 0.3; }
    .group-exp-close, .group-exp-del {
      font-size: 11px; opacity: 0.3; border: none; background: none;
      color: var(--text); cursor: pointer; padding: 0 4px;
    }
    .group-exp-close:hover { opacity: 0.7; }
    .group-exp-del:hover { opacity: 0.7; color: #E74C3C; }

    .group-exp-notes {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      grid-auto-rows: min-content;
      gap: 6px;
      align-items: start;
    }
    .group-exp-notes .note { min-height: 68px; animation: noteIn 0.15s ease-out; }

    .empty {
      grid-column: 1 / -1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
      opacity: 0.25; padding: 40px 0;
    }
    .empty-icon { font-size: 28px; }
    .empty-text { font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Notes</h1>
    <span class="count-badge" id="countBadge">0</span>
    <button class="hdr-btn" id="btnGroup">+ Group</button>
    <button class="hdr-btn" id="btnAdd">+ Note</button>
  </div>
  <div class="group-input-row" id="groupInputRow">
    <input class="group-input" id="groupInput" placeholder="Group name..." />
    <button class="group-input-ok" id="groupInputOk">OK</button>
    <button class="group-input-cancel" id="groupInputCancel">Cancel</button>
  </div>
  <div class="board" id="board"></div>

  <script>
    const ICONS = { idea:'\u{1F4A1}', todo:'\u2705', question:'\u2753', important:'\u{1F525}', star:'\u2B50', warning:'\u26A0\uFE0F' };
    const COLORS = ['yellow','pink','blue','green','purple','orange'];
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const ic = s => s ? (ICONS[s]||s) : '';

    let S = {
      notes: {},       // { n1: { text, color, icon, group } }
      groups: {},      // { g1: { label, color } }
      expanded: {},    // { g1: true }
      order: [],       // ['n1', 'g1', 'n5', ...] — board-level order (ungrouped notes + groups)
      groupOrder: {},  // { g1: ['n2','n3'] } — note order within each group
      nextId: 1,
      nextGroupId: 1
    };

    let styleLock = { bg: false };
    let dragNoteId = null;   // dragging a note
    let dragGroupId = null;  // dragging a group stack

    // ---- Persistence ----
    function save() {
      try { localStorage.setItem('mup-notes-state', JSON.stringify(S)); } catch {}
      const nc = Object.keys(S.notes).length, gc = Object.keys(S.groups).length;
      mup.updateState(`${nc} notes, ${gc} groups`, { notes: nc, groups: gc });
    }
    function load() {
      try {
        const r = JSON.parse(localStorage.getItem('mup-notes-state'));
        if (r && r.notes) S = { ...S, ...r };
        // Migrate: ensure order/groupOrder exist
        if (!S.order) S.order = [];
        if (!S.groupOrder) S.groupOrder = {};
        if (!S.expanded) S.expanded = {};
        rebuildOrder();
      } catch {}
    }

    // Ensure all notes/groups are in order arrays
    function rebuildOrder() {
      const inOrder = new Set(S.order);
      const inGroupOrder = new Set();
      for (const arr of Object.values(S.groupOrder)) arr.forEach(id => inGroupOrder.add(id));

      // Add missing groups
      for (const gid of Object.keys(S.groups)) {
        if (!inOrder.has(gid)) S.order.push(gid);
        if (!S.groupOrder[gid]) S.groupOrder[gid] = [];
      }
      // Add missing ungrouped notes
      for (const [nid, note] of Object.entries(S.notes)) {
        if (note.group) {
          const ge = findGroupEntry(note.group);
          if (ge) {
            const gid = ge[0];
            if (!S.groupOrder[gid]) S.groupOrder[gid] = [];
            if (!S.groupOrder[gid].includes(nid)) S.groupOrder[gid].push(nid);
          }
        } else {
          if (!inOrder.has(nid) && !inGroupOrder.has(nid)) S.order.push(nid);
        }
      }
      // Remove stale entries
      S.order = S.order.filter(id => S.notes[id] || S.groups[id]);
      for (const gid of Object.keys(S.groupOrder)) {
        S.groupOrder[gid] = S.groupOrder[gid].filter(nid => S.notes[nid]);
      }
    }

    // ---- Helpers ----
    function findGroupEntry(label) {
      return Object.entries(S.groups).find(([,g]) => g.label === label);
    }
    function ensureGroup(label, color) {
      let e = findGroupEntry(label);
      if (!e) {
        const gid = 'g' + S.nextGroupId++;
        S.groups[gid] = { label, color: color || 'yellow' };
        S.groupOrder[gid] = [];
        if (!S.order.includes(gid)) S.order.push(gid);
        e = [gid, S.groups[gid]];
      }
      return e;
    }
    function addNoteToGroup(nid, groupLabel) {
      const [gid] = ensureGroup(groupLabel);
      S.notes[nid].group = groupLabel;
      // Remove from board order
      S.order = S.order.filter(id => id !== nid);
      // Add to group order if not there
      if (!S.groupOrder[gid]) S.groupOrder[gid] = [];
      if (!S.groupOrder[gid].includes(nid)) S.groupOrder[gid].push(nid);
    }
    function removeNoteFromGroup(nid) {
      const note = S.notes[nid];
      if (!note || !note.group) return;
      const ge = findGroupEntry(note.group);
      if (ge) {
        const gid = ge[0];
        S.groupOrder[gid] = (S.groupOrder[gid] || []).filter(id => id !== nid);
      }
      note.group = null;
      if (!S.order.includes(nid)) S.order.push(nid);
    }
    function cleanGroups(keepEmpty) {
      if (keepEmpty) return;
      for (const [gid, g] of Object.entries(S.groups)) {
        if ((S.groupOrder[gid] || []).length === 0 && !S.expanded[gid]) {
          delete S.groups[gid];
          delete S.groupOrder[gid];
          delete S.expanded[gid];
          S.order = S.order.filter(id => id !== gid);
        }
      }
    }
    function notesInGroup(label) {
      const ge = findGroupEntry(label);
      if (!ge) return [];
      return (S.groupOrder[ge[0]] || []).map(id => ({ id, ...S.notes[id] })).filter(n => n.text !== undefined);
    }

    // ---- Render ----
    function render() {
      const board = document.getElementById('board');
      const badge = document.getElementById('countBadge');
      if (!board || !badge) return;

      const nc = Object.keys(S.notes).length;
      badge.textContent = nc;
      board.innerHTML = '';

      const hasExpandedEmpty = Object.entries(S.groups).some(([gid]) => S.expanded[gid]);
      if (nc === 0 && !hasExpandedEmpty) {
        board.innerHTML = '<div class="empty"><div class="empty-icon">&#128196;</div><div class="empty-text">No notes yet</div></div>';
        save(); return;
      }

      for (const id of S.order) {
        if (S.groups[id]) {
          const gid = id;
          const group = S.groups[gid];
          const notes = (S.groupOrder[gid] || []).map(nid => ({ id: nid, ...S.notes[nid] })).filter(n => n.text !== undefined);

          if (S.expanded[gid]) {
            board.appendChild(buildExpandedGroup(gid, group, notes));
          } else if (notes.length > 0) {
            board.appendChild(buildStack(gid, group, notes));
          }
        } else if (S.notes[id]) {
          // Ungrouped note
          board.appendChild(buildNote(id, S.notes[id]));
        }
      }
      save();
    }

    function buildNote(id, note) {
      const el = document.createElement('div');
      el.className = `note ${note.color || 'yellow'}`;
      el.draggable = true;
      el.dataset.noteId = id;

      const i = ic(note.icon);
      el.innerHTML = `
        ${i ? `<div class="note-icon">${i}</div>` : ''}
        <div class="note-text" contenteditable="true">${esc(note.text)}</div>
        <span class="note-id">${id}</span>
        <button class="note-delete">&times;</button>`;

      const textEl = el.querySelector('.note-text');
      textEl.addEventListener('blur', () => {
        const t = textEl.textContent.trim();
        if (t !== note.text && S.notes[id]) { S.notes[id].text = t; save(); }
      });
      textEl.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); textEl.blur(); }
      });
      textEl.addEventListener('paste', e => {
        e.preventDefault();
        document.execCommand('insertText', false, (e.clipboardData||window.clipboardData).getData('text/plain'));
      });
      textEl.addEventListener('focus', () => { el.draggable = false; });
      textEl.addEventListener('blur', () => { el.draggable = true; });

      el.querySelector('.note-delete').addEventListener('click', e => {
        e.stopPropagation();
        const note = S.notes[id];
        if (note && note.group) {
          const ge = findGroupEntry(note.group);
          if (ge) S.groupOrder[ge[0]] = (S.groupOrder[ge[0]]||[]).filter(x => x !== id);
        }
        S.order = S.order.filter(x => x !== id);
        delete S.notes[id];
        cleanGroups();
        render();
      });

      // Drag
      el.addEventListener('dragstart', e => {
        dragNoteId = id;
        el.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', id);
      });
      el.addEventListener('dragend', () => { el.classList.remove('dragging'); dragNoteId = null; clearDropIndicators(); });

      // Drop target for reorder
      el.addEventListener('dragover', e => {
        e.preventDefault();
        el.classList.remove('drop-before', 'drop-after');
        const rect = el.getBoundingClientRect();
        // Determine insert position based on cursor relative to center
        const inLeft = e.clientX < rect.left + rect.width / 2;
        el.classList.add(inLeft ? 'drop-before' : 'drop-after');
      });
      el.addEventListener('dragleave', () => { el.classList.remove('drop-before', 'drop-after'); });
      el.addEventListener('drop', e => {
        e.preventDefault(); e.stopPropagation();
        const rect = el.getBoundingClientRect();
        const before = e.clientX < rect.left + rect.width / 2;
        clearDropIndicators();
        if (dragNoteId && dragNoteId !== id) {
          reorderNote(dragNoteId, id, before);
        } else if (dragGroupId && !S.notes[id]?.group) {
          reorderBoardItem(dragGroupId, id, before);
        }
      });

      return el;
    }

    function buildStack(gid, group, notes) {
      const el = document.createElement('div');
      el.className = 'stack';
      el.draggable = true;
      el.dataset.groupId = gid;
      el.dataset.orderId = gid;
      const color = group.color || notes[0]?.color || 'yellow';
      const top = notes[0];

      let html = '';
      if (notes.length > 2) html += `<div class="stack-behind ${color}"></div>`;
      if (notes.length > 1) html += `<div class="stack-behind ${color}"></div>`;
      html += `<div class="stack-front ${color}">
        <div class="stack-label">${esc(group.label)} <span class="cnt">&middot; ${notes.length}</span></div>
        <div class="stack-preview">${top ? esc(top.text) : 'Empty'}</div>
      </div>`;
      el.innerHTML = html;

      el.addEventListener('click', (e) => {
        if (el.classList.contains('dragging')) return;
        S.expanded[gid] = true; render();
      });

      // Drag this stack
      el.addEventListener('dragstart', e => {
        dragGroupId = gid;
        el.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', gid);
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        dragGroupId = null;
        clearDropIndicators();
      });

      // Drop: note into group, or reorder
      el.addEventListener('dragover', e => {
        e.preventDefault();
        clearDropIndicators();
        if (dragNoteId) {
          // Note being dragged onto stack = add to group
          el.classList.add('drop-over');
        } else if (dragGroupId && dragGroupId !== gid) {
          // Another stack being reordered
          const rect = el.getBoundingClientRect();
          const mid = rect.left + rect.width / 2;
          el.classList.add(e.clientX < mid ? 'drop-before' : 'drop-after');
        }
      });
      el.addEventListener('dragleave', () => { el.classList.remove('drop-over', 'drop-before', 'drop-after'); });
      el.addEventListener('drop', e => {
        e.preventDefault(); e.stopPropagation();
        clearDropIndicators();
        if (dragNoteId && S.notes[dragNoteId]) {
          addNoteToGroup(dragNoteId, group.label);
          render();
        } else if (dragGroupId && dragGroupId !== gid) {
          reorderBoardItem(dragGroupId, gid, e.clientX < el.getBoundingClientRect().left + el.getBoundingClientRect().width / 2);
        }
      });

      return el;
    }

    function buildExpandedGroup(gid, group, notes) {
      const el = document.createElement('div');
      el.className = 'group-expanded';
      el.dataset.groupId = gid;

      // Header
      const header = document.createElement('div');
      header.className = 'group-exp-header';
      header.innerHTML = `
        <span class="group-exp-label">${esc(group.label)} &middot; ${notes.length}</span>
        <div class="group-exp-line"></div>
        <button class="group-exp-del" title="Delete group">&#10005;</button>
        <button class="group-exp-close" title="Collapse">&#9650;</button>`;
      header.querySelector('.group-exp-close').addEventListener('click', (e) => { e.stopPropagation(); S.expanded[gid] = false; render(); });
      header.querySelector('.group-exp-del').addEventListener('click', (e) => {
        e.stopPropagation();
        const nids = [...(S.groupOrder[gid]||[])];
        nids.forEach(nid => removeNoteFromGroup(nid));
        delete S.groups[gid]; delete S.groupOrder[gid]; delete S.expanded[gid];
        S.order = S.order.filter(x => x !== gid);
        render();
      });
      el.appendChild(header);

      // Notes grid
      const grid = document.createElement('div');
      grid.className = 'group-exp-notes';
      if (notes.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;opacity:0.3;font-size:11px;padding:12px 0;">Drag notes here</div>';
      } else {
        notes.forEach(n => grid.appendChild(buildNote(n.id, n)));
      }
      el.appendChild(grid);

      // Drop target — drag note into this group
      el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drop-over'); });
      el.addEventListener('dragleave', e => {
        if (!el.contains(e.relatedTarget)) el.classList.remove('drop-over');
      });
      el.addEventListener('drop', e => {
        if (e.target.closest('.note')) return; // let note handle its own drop
        e.preventDefault(); e.stopPropagation();
        el.classList.remove('drop-over');
        if (dragNoteId && S.notes[dragNoteId]) { addNoteToGroup(dragNoteId, group.label); render(); }
      });

      return el;
    }

    function clearDropIndicators() {
      document.querySelectorAll('.drop-before,.drop-after,.drop-over').forEach(el => {
        el.classList.remove('drop-before', 'drop-after', 'drop-over');
      });
    }

    // Reorder any board-level item (ungrouped note or group) relative to another
    function reorderBoardItem(dragId, targetId, before) {
      S.order = S.order.filter(x => x !== dragId);
      const idx = S.order.indexOf(targetId);
      if (idx >= 0) {
        S.order.splice(before ? idx : idx + 1, 0, dragId);
      } else {
        S.order.push(dragId);
      }
      render();
    }

    function reorderNote(dragId, targetId, before) {
      const dragNote = S.notes[dragId];
      const targetNote = S.notes[targetId];
      if (!dragNote || !targetNote) return;

      // 1. Remove dragNote from its current location
      if (dragNote.group) {
        const ge = findGroupEntry(dragNote.group);
        if (ge) S.groupOrder[ge[0]] = (S.groupOrder[ge[0]]||[]).filter(x => x !== dragId);
      }
      S.order = S.order.filter(x => x !== dragId);
      dragNote.group = null;

      // 2. Insert at target position
      if (targetNote.group) {
        // Target is in a group — insert into same group at correct position
        const ge = findGroupEntry(targetNote.group);
        if (ge) {
          const gid = ge[0];
          dragNote.group = targetNote.group;
          if (!S.groupOrder[gid]) S.groupOrder[gid] = [];
          const arr = S.groupOrder[gid];
          const idx = arr.indexOf(targetId);
          if (idx >= 0) {
            arr.splice(before ? idx : idx + 1, 0, dragId);
          } else {
            arr.push(dragId);
          }
        }
      } else {
        // Target is ungrouped — insert in board order
        const idx = S.order.indexOf(targetId);
        if (idx >= 0) {
          S.order.splice(before ? idx : idx + 1, 0, dragId);
        } else {
          S.order.push(dragId);
        }
      }

      cleanGroups();
      render();
    }

    // ---- UI Buttons ----
    document.getElementById('btnAdd').addEventListener('click', () => {
      const id = 'n' + S.nextId++;
      S.notes[id] = { text: '', color: COLORS[Math.floor(Math.random() * COLORS.length)], icon: '', group: null };
      S.order.push(id);
      render();
      setTimeout(() => {
        const el = document.querySelector(`.note[data-note-id="${id}"] .note-text`);
        if (el) el.focus();
      }, 60);
    });

    document.getElementById('btnGroup').addEventListener('click', () => {
      const row = document.getElementById('groupInputRow');
      const input = document.getElementById('groupInput');
      row.classList.add('active');
      input.value = '';
      input.focus();
    });

    function submitGroup() {
      const row = document.getElementById('groupInputRow');
      const input = document.getElementById('groupInput');
      const label = input.value.trim();
      row.classList.remove('active');
      if (!label) return;
      const [gid] = ensureGroup(label);
      S.expanded[gid] = true;
      render();
    }

    document.getElementById('groupInputOk').addEventListener('click', submitGroup);
    document.getElementById('groupInputCancel').addEventListener('click', () => {
      document.getElementById('groupInputRow').classList.remove('active');
    });
    document.getElementById('groupInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.isComposing) submitGroup();
      if (e.key === 'Escape') document.getElementById('groupInputRow').classList.remove('active');
    });

    // Drop on board background = ungroup note or do nothing for group
    document.getElementById('board').addEventListener('dragover', e => e.preventDefault());
    document.getElementById('board').addEventListener('drop', e => {
      if (e.target.closest('.stack, .group-expanded, .note')) return;
      e.preventDefault();
      if (dragNoteId && S.notes[dragNoteId]) { removeNoteFromGroup(dragNoteId); render(); }
      dragNoteId = null;
      dragGroupId = null;
    });

    // ---- MUP Functions ----
    mup.registerFunction('addNote', async p => {
      const id = 'n' + S.nextId++;
      const noteColor = p.color || 'yellow';
      S.notes[id] = { text: p.text, color: noteColor, icon: p.icon||'', group: p.group||null };
      if (p.group) { ensureGroup(p.group, noteColor); addNoteToGroup(id, p.group); } else { S.order.push(id); }
      render();
      return { content: [{ type:'text', text: `Added ${id}: "${p.text.slice(0,30)}"` }], isError: false };
    });

    mup.registerFunction('editNote', async p => {
      const n = S.notes[p.id];
      if (!n) return { content:[{type:'text',text:`${p.id} not found`}], isError:true };
      if (p.text!==undefined) n.text=p.text;
      if (p.color) n.color=p.color;
      if (p.icon!==undefined) n.icon=p.icon;
      render();
      return { content:[{type:'text',text:`Updated ${p.id}`}], isError:false };
    });

    mup.registerFunction('removeNote', async p => {
      if (!S.notes[p.id]) return { content:[{type:'text',text:`${p.id} not found`}], isError:true };
      const note = S.notes[p.id];
      if (note.group) { const ge=findGroupEntry(note.group); if(ge) S.groupOrder[ge[0]]=(S.groupOrder[ge[0]]||[]).filter(x=>x!==p.id); }
      S.order = S.order.filter(x=>x!==p.id);
      delete S.notes[p.id];
      cleanGroups(); render();
      return { content:[{type:'text',text:`Removed ${p.id}`}], isError:false };
    });

    mup.registerFunction('setGroup', async p => {
      ensureGroup(p.label, p.color);
      let m=0;
      for (const nid of p.noteIds) { if(S.notes[nid]){ addNoteToGroup(nid,p.label); m++; } }
      cleanGroups(); render();
      return { content:[{type:'text',text:`Grouped ${m} notes into "${p.label}"`}], isError:false };
    });

    mup.registerFunction('renameGroup', async p => {
      const ge = findGroupEntry(p.group);
      if (!ge) return { content:[{type:'text',text:'Group not found'}], isError:true };
      const [gid, group] = ge;
      const oldLabel = group.label;
      group.label = p.newLabel;
      if (p.color) group.color = p.color;
      // Update note references
      for (const n of Object.values(S.notes)) { if (n.group === oldLabel) n.group = p.newLabel; }
      render();
      return { content:[{type:'text',text:`Renamed "${oldLabel}" → "${p.newLabel}"`}], isError:false };
    });

    mup.registerFunction('ungroup', async p => {
      const ge = findGroupEntry(p.group);
      if (!ge) return { content:[{type:'text',text:'Group not found'}], isError:true };
      const nids = [...(S.groupOrder[ge[0]]||[])];
      nids.forEach(nid => removeNoteFromGroup(nid));
      cleanGroups(); render();
      return { content:[{type:'text',text:`Ungrouped ${nids.length} notes`}], isError:false };
    });

    mup.registerFunction('getGroup', async p => {
      const notes = notesInGroup(p.group);
      return { content:[{type:'text',text:`${p.group}: ${notes.length} notes`},{type:'data',data:notes}], isError:false };
    });

    mup.registerFunction('getNotes', async p => {
      const notes = p.group ? notesInGroup(p.group) : Object.entries(S.notes).map(([id,n])=>({id,...n}));
      const groups = Object.values(S.groups).map(g=>g.label);
      return { content:[{type:'text',text:`${notes.length} notes`},{type:'data',data:{notes,groups}}], isError:false };
    });

    mup.registerFunction('setStyle', async p => {
      const c=[];
      if(p.bg){document.documentElement.style.setProperty('--bg',p.bg);document.body.style.background=p.bg;styleLock.bg=true;c.push('bg');}
      if(p.font){document.body.style.fontFamily=p.font;c.push('font');}
      return { content:[{type:'text',text:`Style: ${c.join(', ')}`}], isError:false };
    });

    mup.registerFunction('clearAll', async () => {
      S = { notes:{}, groups:{}, expanded:{}, order:[], groupOrder:{}, nextId:1, nextGroupId:1 };
      render();
      return { content:[{type:'text',text:'All cleared'}], isError:false };
    });

    mup.registerFunction('export', async () => {
      return { content:[{type:'text',text:`${Object.keys(S.notes).length} notes`},{type:'data',data:S}], isError:false };
    });

    // ---- Theme ----
    mup.onReady(({ theme }) => {
      if (theme === 'dark') document.body.classList.add('dark');
      load(); render();
    });
    mup.onThemeChange(theme => {
      if (!styleLock.bg) { document.body.classList.toggle('dark', theme==='dark'); document.body.style.background=''; }
    });
  </script>
</body>
</html>
