<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat</title>

  <script type="application/mup-manifest">
  {
    "name": "Chat",
    "description": "Chat with the LLM. User types messages, LLM responds via sendMessage.",
    "grid": { "minWidth": 2, "minHeight": 2, "preferredWidth": 3, "preferredHeight": 3 },
    "notifications": { "level": "immediate", "overridable": false },
    "functions": [
      {
        "name": "sendMessage",
        "description": "Send a message to display in the chat as the assistant",
        "inputSchema": {
          "type": "object",
          "properties": {
            "text": { "type": "string", "description": "Message text to display" }
          },
          "required": ["text"]
        }
      },
      {
        "name": "getHistory",
        "description": "Get the full chat message history",
        "inputSchema": { "type": "object", "properties": {} }
      }
    ]
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent;
      color: #1d1d1f;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.45;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: #007aff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: rgba(0, 0, 0, 0.06);
      color: #1d1d1f;
      border-bottom-left-radius: 4px;
    }
    .msg .meta {
      font-size: 10px;
      opacity: 0.5;
      margin-top: 4px;
    }
    .msg.user .meta { text-align: right; }
    .empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(0, 0, 0, 0.25);
      font-size: 13px;
    }
    .input-bar {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      background: rgba(0, 0, 0, 0.02);
    }
    .input-bar input {
      flex: 1;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: #fff;
    }
    .input-bar input:focus {
      border-color: #007aff;
    }
    .input-bar button {
      border: none;
      background: #007aff;
      color: #fff;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.12s;
    }
    .input-bar button:hover { opacity: 0.85; }
    .input-bar button:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="messages" id="messages">
    <div class="empty" id="empty">Send a message to start chatting</div>
  </div>
  <div class="input-bar">
    <input type="text" id="input" placeholder="Type a message..." autocomplete="off">
    <button id="send">Send</button>
  </div>

  <script>
    let messages = [];
    const messagesEl = document.getElementById('messages');
    const emptyEl = document.getElementById('empty');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function formatTime(ts) {
      const d = new Date(ts);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function render() {
      emptyEl.style.display = messages.length === 0 ? 'flex' : 'none';
      // Remove old message elements (keep empty)
      messagesEl.querySelectorAll('.msg').forEach(el => el.remove());
      for (const m of messages) {
        const div = document.createElement('div');
        div.className = `msg ${m.role}`;
        div.textContent = m.text;
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = formatTime(m.timestamp);
        div.appendChild(meta);
        messagesEl.appendChild(div);
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function syncState() {
      const last = messages[messages.length - 1];
      const summary = messages.length === 0
        ? 'Chat: empty'
        : `Chat: ${messages.length} messages, last: ${last.role} — ${last.text.slice(0, 60)}`;
      mup.updateState(summary, { messages });
    }

    function sendUserMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      messages.push({ role: 'user', text, timestamp: Date.now() });
      render();
      syncState();
      mup.notifyInteraction('message', text, { text });
    }

    let composing = false;
    inputEl.addEventListener('compositionstart', () => { composing = true; });
    inputEl.addEventListener('compositionend', () => { composing = false; });

    sendBtn.addEventListener('click', sendUserMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !composing && !e.isComposing) {
        e.preventDefault();
        sendUserMessage();
      }
    });

    // LLM calls this to send a reply
    mup.registerFunction('sendMessage', async (params) => {
      messages.push({ role: 'assistant', text: params.text, timestamp: Date.now() });
      render();
      syncState();
      return {
        content: [{ type: 'text', text: `Message sent: ${params.text.slice(0, 100)}` }],
        isError: false,
      };
    });

    mup.registerFunction('getHistory', async () => {
      return {
        content: [
          { type: 'text', text: messages.length === 0 ? 'No messages yet.' : messages.map(m => `[${m.role}] ${m.text}`).join('\n') },
          { type: 'data', data: { messages, count: messages.length } }
        ],
        isError: false,
      };
    });

    mup.onReady((params) => {
      if (params.savedState?.messages) {
        messages = params.savedState.messages;
      }
      render();
      syncState();
    });
  </script>
</body>
</html>
