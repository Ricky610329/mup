<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<script type="application/mup-manifest">
{
  "name": "Snake Engine",
  "description": "Connects Input Controller → Snake logic → Pixel Art. Press WASD to play!",
  "id": "com.mup.snake-engine",
  "grid": { "minWidth": 2, "minHeight": 2 },
  "functions": [
    {
      "name": "setDirection",
      "description": "Receive direction input from Input Controller pipe",
      "inputSchema": {
        "type": "object",
        "properties": {
          "actions": { "type": "array", "items": { "type": "string" } },
          "keys":    { "type": "array", "items": { "type": "string" } }
        }
      }
    },
    {
      "name": "reset",
      "description": "Reset the game to initial state",
      "inputSchema": { "type": "object" }
    },
    {
      "name": "getState",
      "description": "Get current game state (snake, food, score, etc.)",
      "inputSchema": { "type": "object" }
    },
    {
      "name": "setSpeed",
      "description": "Set game tick speed in ms (default 200)",
      "inputSchema": {
        "type": "object",
        "properties": {
          "ms": { "type": "integer" }
        },
        "required": ["ms"]
      }
    }
  ]
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f23;
    color: #ccc;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
    user-select: none;
  }
  h2 { color: #00cc00; font-size: 20px; letter-spacing: 2px; }
  .score-board {
    display: flex; gap: 24px; font-size: 16px;
  }
  .score-board span { color: #fff; font-weight: bold; }
  .status {
    font-size: 14px; color: #888;
    min-height: 20px;
  }
  .game-over {
    color: #e94560; font-size: 22px; font-weight: bold;
    display: none;
    animation: blink 0.8s infinite;
  }
  @keyframes blink {
    50% { opacity: 0.4; }
  }
  button {
    padding: 10px 28px;
    font-size: 15px;
    background: #e94560;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #ff6b81; }
  button:active { transform: scale(0.96); }
  .hint {
    font-size: 12px; color: #555;
    margin-top: 4px;
  }
</style>
</head>
<body>

<h2>SNAKE</h2>
<div class="score-board">
  Score: <span id="score">0</span>
  &nbsp;|&nbsp;
  Best: <span id="best">0</span>
</div>
<div class="status" id="status">Press WASD to start</div>
<div class="game-over" id="gameover">GAME OVER</div>
<button id="resetBtn">Reset</button>
<div class="hint">Input Controller + Pixel Art</div>

<script>
const GRID = 16;
const COLORS = {
  wall:  '#333333',
  bg:    '#ffffff',
  head:  '#00CC00',
  body:  '#00AA00',
  tail:  '#008800',
  food:  '#FF0000',
};

let snake, dir, nextDir, food, score, best = 0;
let gameOver, started, loop, speed = 200;

/* ── Game logic ───────────────────────────────── */

function init() {
  snake   = [{x:8,y:8},{x:7,y:8},{x:6,y:8}];
  dir     = {x:1, y:0};
  nextDir = {x:1, y:0};
  score   = 0;
  gameOver = false;
  started  = false;
  if (loop) clearInterval(loop);
  loop = null;

  placeFood();
  updateUI();
  render();
}

function placeFood() {
  for (let i = 0; i < 300; i++) {
    const x = 1 + Math.floor(Math.random() * 14);
    const y = 1 + Math.floor(Math.random() * 14);
    if (!snake.some(s => s.x === x && s.y === y)) {
      food = {x, y};
      return;
    }
  }
}

function tick() {
  if (gameOver) return;

  dir = {...nextDir};
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall
  if (head.x <= 0 || head.x >= 15 || head.y <= 0 || head.y >= 15) { endGame(); return; }
  // Self
  if (snake.some(s => s.x === head.x && s.y === head.y)) { endGame(); return; }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    if (score > best) best = score;
    placeFood();
    // speed up slightly
    if (speed > 80) {
      speed -= 3;
      clearInterval(loop);
      loop = setInterval(tick, speed);
    }
  } else {
    snake.pop();
  }

  updateUI();
  render();
}

function endGame() {
  gameOver = true;
  started  = false;
  if (loop) clearInterval(loop);
  loop = null;
  document.getElementById('gameover').style.display = 'block';
  document.getElementById('status').textContent = 'Press Reset to retry';
  mup.updateState(`Game Over! Score: ${score}`, { pixels: buildPixels(), score, best, gameOver: true });
}

function setDirection(dx, dy) {
  if (gameOver) return;
  // prevent 180
  if (dir.x + dx === 0 && dir.y + dy === 0) return;
  nextDir = {x: dx, y: dy};

  if (!started) {
    started = true;
    document.getElementById('status').textContent = 'Playing...';
    loop = setInterval(tick, speed);
    tick(); // immediate first move
  }
}

/* ── Rendering ────────────────────────────────── */

function buildPixels() {
  const px = [];

  // Walls
  for (let i = 0; i < GRID; i++) {
    px.push({x:i,y:0,color:COLORS.wall},{x:i,y:15,color:COLORS.wall});
    px.push({x:0,y:i,color:COLORS.wall},{x:15,y:i,color:COLORS.wall});
  }
  // Clear inside
  for (let x = 1; x < 15; x++)
    for (let y = 1; y < 15; y++)
      px.push({x, y, color: COLORS.bg});

  // Food
  px.push({x: food.x, y: food.y, color: COLORS.food});

  // Snake
  snake.forEach((s, i) => {
    const color = i === 0 ? COLORS.head
                : i === snake.length - 1 ? COLORS.tail
                : COLORS.body;
    px.push({x: s.x, y: s.y, color});
  });

  return px;
}

function render() {
  const pixels = buildPixels();
  mup.updateState(`Score: ${score} | Length: ${snake.length}`, { pixels, score, best, gameOver });
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent  = best;
  document.getElementById('gameover').style.display = 'none';
  document.getElementById('status').textContent = started ? 'Playing...' : 'Press WASD to start';
}

/* ── MUP API ──────────────────────────────────── */

mup.registerFunction('setDirection', async (params) => {
  const actions = params.actions || [];
  const keys    = params.keys    || [];

  if      (actions.includes('up')    || keys.includes('w') || keys.includes('ArrowUp'))    setDirection(0, -1);
  else if (actions.includes('down')  || keys.includes('s') || keys.includes('ArrowDown'))  setDirection(0,  1);
  else if (actions.includes('left')  || keys.includes('a') || keys.includes('ArrowLeft'))  setDirection(-1, 0);
  else if (actions.includes('right') || keys.includes('d') || keys.includes('ArrowRight')) setDirection(1,  0);

  return { content: [{ type: 'text', text: `Score: ${score} Dir: ${nextDir.x},${nextDir.y}` }] };
});

mup.registerFunction('reset', async () => {
  speed = 200;
  init();
  return { content: [{ type: 'text', text: 'Game reset!' }] };
});

mup.registerFunction('getState', async () => {
  return {
    content: [
      { type: 'text', text: `Score: ${score} | Best: ${best} | Length: ${snake.length} | Over: ${gameOver}` },
      { type: 'data', data: { snake, food, score, best, gameOver, dir } }
    ]
  };
});

mup.registerFunction('setSpeed', async (params) => {
  speed = Math.max(50, Math.min(1000, params.ms));
  if (loop) { clearInterval(loop); loop = setInterval(tick, speed); }
  return { content: [{ type: 'text', text: `Speed set to ${speed}ms` }] };
});

/* ── UI Reset Button ──────────────────────────── */

document.getElementById('resetBtn').addEventListener('click', () => {
  speed = 200;
  init();
  mup.notifyInteraction('reset', 'Game reset by user');
});

/* ── Backup keyboard (when this MUP has focus) ── */

document.addEventListener('keydown', (e) => {
  switch (e.key.toLowerCase()) {
    case 'w': case 'arrowup':    setDirection(0, -1); break;
    case 's': case 'arrowdown':  setDirection(0,  1); break;
    case 'a': case 'arrowleft':  setDirection(-1, 0); break;
    case 'd': case 'arrowright': setDirection(1,  0); break;
  }
});

/* ── Init ─────────────────────────────────────── */

mup.onReady((params) => {
  if (params.savedState) {
    best = params.savedState.best || 0;
  }
  init();
});
</script>
</body>
</html>
