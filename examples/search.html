<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search</title>

  <script type="application/mup-manifest">
  {
    "name": "Search",
    "description": "A web search panel. The LLM can search the web and display results with clickable links. Users can also type queries directly. Use search() to perform a web search, or showResults() to display custom results.",
    "grid": { "minWidth": 1, "minHeight": 1 },
    "functions": [
      {
        "name": "search",
        "description": "Search the web for a query. Returns real web results with titles, URLs, and descriptions.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "query": { "type": "string", "description": "The search query" }
          },
          "required": ["query"]
        }
      },
      {
        "name": "showResults",
        "description": "Display custom results (not web search). Each result has a title, optional url, and optional description.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "query": { "type": "string" },
            "results": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "title": { "type": "string" },
                  "url": { "type": "string" },
                  "description": { "type": "string" }
                },
                "required": ["title"]
              }
            }
          },
          "required": ["results"]
        }
      },
      {
        "name": "clear",
        "description": "Clear all displayed results",
        "inputSchema": { "type": "object", "properties": {} }
      }
    ]
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    .search-bar {
      display: flex;
      padding: 6px;
      gap: 4px;
      border-bottom: 1px solid rgba(60,60,67,0.1);
      flex-shrink: 0;
    }
    .search-input {
      flex: 1;
      border: 1px solid rgba(60,60,67,0.15);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      background: rgba(255,255,255,0.6);
    }
    .search-input:focus { border-color: rgba(0,122,255,0.5); }
    .search-btn {
      border: none;
      background: rgba(0,122,255,0.1);
      color: #007aff;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .search-btn:hover { background: rgba(0,122,255,0.2); }
    .search-btn:disabled { opacity: 0.4; cursor: default; }

    .results {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }

    .result-item {
      padding: 6px 8px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: rgba(60,60,67,0.04);
      transition: background 0.15s;
      cursor: pointer;
    }
    .result-item:hover { background: rgba(60,60,67,0.08); }

    .result-title {
      font-size: 12px;
      font-weight: 600;
      color: #1a0dab;
      line-height: 1.3;
    }
    .result-url {
      font-size: 10px;
      color: #006621;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result-desc {
      font-size: 11px;
      color: rgba(60,60,67,0.6);
      line-height: 1.3;
      margin-top: 1px;
    }

    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: rgba(60,60,67,0.3);
      font-size: 12px;
    }
    .query-label {
      font-size: 10px;
      color: rgba(60,60,67,0.4);
      padding: 4px 6px 2px;
      font-weight: 500;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: rgba(60,60,67,0.4);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="search-bar">
    <input class="search-input" id="input" type="text" placeholder="Search the web..." />
    <button class="search-btn" id="btn">Go</button>
  </div>
  <div class="results" id="results">
    <div class="empty" id="empty">Search the web or ask the LLM</div>
  </div>

  <script>
    const input = document.getElementById('input');
    const btn = document.getElementById('btn');
    const resultsEl = document.getElementById('results');
    const emptyEl = document.getElementById('empty');

    let currentQuery = '';
    let currentResults = [];

    async function doSearch(query) {
      query = query || input.value.trim();
      if (!query) return;
      currentQuery = query;
      input.value = query;
      btn.disabled = true;
      resultsEl.innerHTML = '<div class="loading">Searching...</div>';
      mup.updateState(`Searching: "${query.slice(0, 30)}"`, { query, searching: true });

      try {
        const response = await mup.system("webSearch", { query });
        const results = response?.results || [];
        renderResults(query, results);
        btn.disabled = false;
        return results;
      } catch (err) {
        resultsEl.innerHTML = '';
        emptyEl.style.display = '';
        emptyEl.textContent = 'Search failed: ' + err.message;
        resultsEl.appendChild(emptyEl);
        btn.disabled = false;
        mup.updateState('Search failed', { query, error: err.message });
        return [];
      }
    }

    btn.addEventListener('click', () => {
      doSearch();
      mup.notifyInteraction('search', `User searched: "${input.value.trim()}"`, { query: input.value.trim() });
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        doSearch();
        mup.notifyInteraction('search', `User searched: "${input.value.trim()}"`, { query: input.value.trim() });
      }
    });

    function renderResults(query, results) {
      currentQuery = query || currentQuery;
      currentResults = results;
      resultsEl.innerHTML = '';

      if (query) {
        const label = document.createElement('div');
        label.className = 'query-label';
        label.textContent = `"${query}" — ${results.length} result(s)`;
        resultsEl.appendChild(label);
      }

      if (results.length === 0) {
        emptyEl.style.display = '';
        emptyEl.textContent = 'No results found';
        resultsEl.appendChild(emptyEl);
        mup.updateState('No results', { query, resultCount: 0 });
        return;
      }

      emptyEl.style.display = 'none';

      for (const r of results) {
        const item = document.createElement('div');
        item.className = 'result-item';

        const title = document.createElement('div');
        title.className = 'result-title';
        title.textContent = r.title;
        item.appendChild(title);

        if (r.url) {
          const url = document.createElement('div');
          url.className = 'result-url';
          url.textContent = r.url;
          item.appendChild(url);
        }

        if (r.description) {
          const desc = document.createElement('div');
          desc.className = 'result-desc';
          desc.textContent = r.description;
          item.appendChild(desc);
        }

        item.addEventListener('click', () => {
          if (r.url) window.open(r.url, '_blank');
          mup.notifyInteraction('click', `User clicked: "${r.title}"`, { title: r.title, url: r.url });
        });

        resultsEl.appendChild(item);
      }

      mup.updateState(
        `${results.length} result(s) for "${(query || '').slice(0, 20)}"`,
        { query, resultCount: results.length, results: results.map(r => ({ title: r.title, url: r.url })) }
      );
    }

    // === MUP Functions ===

    mup.registerFunction('search', async (params) => {
      const results = await doSearch(params.query);
      const summaries = (results || []).map((r, i) => `${i + 1}. ${r.title}${r.url ? ' — ' + r.url : ''}`).join('\n');
      return {
        content: [
          { type: 'text', text: results.length > 0 ? `Found ${results.length} results for "${params.query}":\n${summaries}` : `No results for "${params.query}"` },
          { type: 'data', data: { query: params.query, results } }
        ],
        isError: false
      };
    });

    mup.registerFunction('showResults', async (params) => {
      renderResults(params.query || '', params.results || []);
      return {
        content: [{ type: 'text', text: `Showing ${(params.results || []).length} result(s)` }],
        isError: false
      };
    });

    mup.registerFunction('clear', async () => {
      currentResults = [];
      currentQuery = '';
      resultsEl.innerHTML = '';
      emptyEl.style.display = '';
      emptyEl.textContent = 'Search the web or ask the LLM';
      resultsEl.appendChild(emptyEl);
      mup.updateState('Empty', { query: '', resultCount: 0 });
      return { content: [{ type: 'text', text: 'Results cleared' }], isError: false };
    });

    mup.onReady((params) => {
      if (params.savedState && params.savedState.results) {
        renderResults(params.savedState.query, params.savedState.results);
      } else {
        mup.updateState('Empty', { query: '', resultCount: 0 });
      }
    });
  </script>
</body>
</html>
