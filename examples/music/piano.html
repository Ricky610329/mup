<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Keys</title>
  <script type="application/mup-manifest">
  {
    "name": "Keys",
    "description": "A piano roll step sequencer for keys/piano parts. 16 steps × 2 octaves (C3–B4). Click cells to place notes (polyphonic). Adjustable sound parameters: waveform, attack, decay, sustain, release. Use getPattern to export the pattern to the Mixer.",
    "grid": { "minWidth": 3, "minHeight": 3 },
    "functions": [
      { "name": "setPattern", "description": "Set the full pattern. Each step is an array of note names (e.g. ['C4','E4','G4']) or empty array for rest.", "inputSchema": { "type": "object", "properties": { "steps": { "type": "array", "items": { "type": "array", "items": { "type": "string" } }, "description": "16-element array of note arrays" } }, "required": ["steps"] } },
      { "name": "setParams", "description": "Adjust sound parameters.", "inputSchema": { "type": "object", "properties": { "waveform": { "type": "string", "description": "triangle, sine, square, sawtooth" }, "attack": { "type": "number" }, "decay": { "type": "number" }, "sustain": { "type": "number" }, "release": { "type": "number" } } } },
      { "name": "setBPM", "description": "Set tempo.", "inputSchema": { "type": "object", "properties": { "bpm": { "type": "integer" } }, "required": ["bpm"] } },
      { "name": "play", "description": "Start playback.", "inputSchema": { "type": "object", "properties": {} } },
      { "name": "stop", "description": "Stop playback.", "inputSchema": { "type": "object", "properties": {} } },
      { "name": "clear", "description": "Clear all notes.", "inputSchema": { "type": "object", "properties": {} } },
      { "name": "getPattern", "description": "Get full pattern, sound params, and BPM for export to Mixer.", "inputSchema": { "type": "object", "properties": {} } }
    ]
  }
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,sans-serif;background:#191927;color:#99a;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    .bar{display:flex;align-items:center;gap:4px;padding:4px 8px;background:#13131f;border-bottom:1px solid #252538;flex-shrink:0}
    .bar button{width:28px;height:24px;border:1px solid #2a2a44;border-radius:4px;background:#1c1c30;color:#99a;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;font-family:inherit}
    .bar button:hover{background:#252540}
    .bar button.on{background:#3a3a6a;border-color:#5566aa;color:#ccf}
    .bar input[type=number]{width:40px;padding:2px 4px;border:1px solid #2a2a44;border-radius:3px;background:#1c1c30;color:#99a;font-size:11px;font-family:inherit;text-align:center}
    .bar .sep{width:1px;height:16px;background:#252538}
    .bar .spacer{flex:1}
    .bar .lbl{font-size:9px;color:#556}
    .params{display:none;padding:6px 8px;background:#151522;border-bottom:1px solid#252538;flex-shrink:0;gap:8px;flex-wrap:wrap;align-items:center}
    .params.open{display:flex}
    .params label{font-size:9px;color:#556}
    .params select,.params input[type=range]{height:18px;accent-color:#5566aa}
    .params select{padding:1px 4px;border:1px solid #2a2a44;border-radius:3px;background:#1c1c30;color:#99a;font-size:10px}
    .params input[type=range]{width:48px}
    .roll{flex:1;overflow-y:auto;overflow-x:hidden}
    .grid{display:grid;grid-template-columns:22px repeat(16,1fr);min-height:100%}
    .lbl-cell{display:flex;align-items:center;justify-content:flex-end;padding-right:2px;font-size:8px;color:#445;position:sticky;left:0;background:#191927;z-index:1}
    .lbl-cell.bk{color:#557}
    .cell{border-bottom:1px solid #1e1e30;cursor:pointer;min-height:14px;transition:background .05s}
    .cell.wh{background:#1c1c32}
    .cell.bk{background:#171728}
    .cell.bt{border-left:1px solid #252540}
    .cell.on{background:#4466bb}
    .cell.pl{box-shadow:inset 0 0 0 1px #88aaff}
    .cell:hover{filter:brightness(1.2)}
  </style>
</head>
<body>
  <div class="bar">
    <button id="playBtn" title="Play">&#9654;</button>
    <button id="stopBtn" title="Stop">&#9632;</button>
    <div class="sep"></div>
    <span class="lbl">BPM</span>
    <input type="number" id="bpm" value="120" min="40" max="240">
    <div class="sep"></div>
    <button id="clearBtn" title="Clear">&#10005;</button>
    <div class="spacer"></div>
    <button id="paramBtn" title="Sound params">&#9881;</button>
  </div>
  <div class="params" id="params">
    <label>Wave</label><select id="wave"><option value="triangle">Tri</option><option value="sine">Sin</option><option value="square">Sq</option><option value="sawtooth">Saw</option></select>
    <label>Atk</label><input type="range" id="attack" min="0.01" max="1" step="0.01" value="0.02">
    <label>Dec</label><input type="range" id="decay" min="0.01" max="1" step="0.01" value="0.2">
    <label>Sus</label><input type="range" id="sustain" min="0" max="1" step="0.01" value="0.4">
    <label>Rel</label><input type="range" id="release" min="0.01" max="2" step="0.01" value="0.3">
  </div>
  <div class="roll"><div class="grid" id="grid"></div></div>

  <script>
    const N=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'],BK=new Set([1,3,6,8,10]),ROWS=[],STEPS=16;
    for(let o=4;o>=3;o--)for(let n=11;n>=0;n--)ROWS.push({name:N[n]+o,midi:n+(o+1)*12,bk:BK.has(n)});
    const ctx=new AudioContext(),gridEl=document.getElementById('grid'),cells={};
    let pattern=Array.from({length:STEPS},()=>new Set()),params={waveform:'triangle',attack:.02,decay:.2,sustain:.4,release:.3};
    let bpm=120,playing=false,step=-1,timer=null;
    const freq=m=>440*Math.pow(2,(m-69)/12);

    // Build grid
    ROWS.forEach((r,row)=>{
      const l=document.createElement('div');l.className='lbl-cell'+(r.bk?' bk':'');l.textContent=r.name;gridEl.appendChild(l);
      cells[row]={};
      for(let col=0;col<STEPS;col++){
        const c=document.createElement('div');
        c.className='cell '+(r.bk?'bk':'wh')+(col%4===0?' bt':'');
        c.dataset.r=row;c.dataset.c=col;gridEl.appendChild(c);cells[row][col]=c;
      }
    });

    // Toggle param panel
    document.getElementById('paramBtn').addEventListener('click',()=>{
      const p=document.getElementById('params');p.classList.toggle('open');
      document.getElementById('paramBtn').classList.toggle('on');
    });

    // Click to toggle
    gridEl.addEventListener('pointerdown',e=>{
      const c=e.target.closest('.cell');if(!c)return;
      const row=+c.dataset.r,col=+c.dataset.c,name=ROWS[row].name;
      if(pattern[col].has(name)){pattern[col].delete(name);c.classList.remove('on')}
      else{pattern[col].add(name);c.classList.add('on')}
      broadcastState();
    });

    function renderPattern(){ROWS.forEach((r,row)=>{for(let col=0;col<STEPS;col++)cells[row][col].classList.toggle('on',pattern[col].has(r.name))})}

    function playNote(midi,dur){
      const f=freq(midi),now=ctx.currentTime,{attack:a,decay:d,sustain:s,release:r}=params;
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type=params.waveform;o.frequency.value=f;o.connect(g);g.connect(ctx.destination);
      g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.2,now+a);
      g.gain.linearRampToValueAtTime(.2*s,now+a+d);g.gain.setValueAtTime(.2*s,now+dur);
      g.gain.linearRampToValueAtTime(.001,now+dur+r);o.start(now);o.stop(now+dur+r);
    }

    function startPlay(){if(playing)return;ctx.resume();playing=true;step=-1;document.getElementById('playBtn').classList.add('on');tick()}
    function stopPlay(){playing=false;clearTimeout(timer);document.getElementById('playBtn').classList.remove('on');if(step>=0)ROWS.forEach((_,r)=>cells[r][step].classList.remove('pl'));step=-1}
    function tick(){
      if(!playing)return;
      if(step>=0)ROWS.forEach((_,r)=>cells[r][step].classList.remove('pl'));
      step=(step+1)%STEPS;
      const dur=60/bpm/4;
      ROWS.forEach((r,row)=>{cells[row][step].classList.add('pl');if(pattern[step].has(r.name))playNote(r.midi,dur*.8)});
      timer=setTimeout(tick,dur*1000);
    }

    document.getElementById('playBtn').addEventListener('click',startPlay);
    document.getElementById('stopBtn').addEventListener('click',stopPlay);
    document.getElementById('clearBtn').addEventListener('click',()=>{pattern=Array.from({length:STEPS},()=>new Set());renderPattern();broadcastState()});
    document.getElementById('bpm').addEventListener('change',e=>{bpm=+e.target.value;broadcastState()});
    document.getElementById('wave').addEventListener('change',e=>{params.waveform=e.target.value;broadcastState()});
    ['attack','decay','sustain','release'].forEach(k=>document.getElementById(k).addEventListener('input',e=>{params[k]=+e.target.value}));

    function patternData(){return pattern.map(s=>[...s])}
    function broadcastState(){
      const n=pattern.reduce((a,s)=>a+s.size,0);
      mup.updateState(`Keys: ${n} notes, ${bpm} BPM, ${params.waveform}${playing?', playing':''}`,{pattern:patternData(),params,bpm,playing});
    }

    mup.registerFunction('setPattern',({steps})=>{for(let i=0;i<STEPS;i++)pattern[i]=new Set(steps[i]||[]);renderPattern();broadcastState();return{content:[{type:'text',text:`Pattern set (${pattern.reduce((a,s)=>a+s.size,0)} notes)`}],isError:false}});
    mup.registerFunction('setParams',(p)=>{const c=[];if(p.waveform){params.waveform=p.waveform;document.getElementById('wave').value=p.waveform;c.push('wave:'+p.waveform)}for(const k of['attack','decay','sustain','release'])if(p[k]!==undefined){params[k]=p[k];document.getElementById(k).value=p[k];c.push(k+':'+p[k])}broadcastState();return{content:[{type:'text',text:`Params: ${c.join(', ')}`}],isError:false}});
    mup.registerFunction('setBPM',({bpm:b})=>{bpm=b;document.getElementById('bpm').value=b;broadcastState();return{content:[{type:'text',text:`BPM: ${b}`}],isError:false}});
    mup.registerFunction('play',()=>{startPlay();return{content:[{type:'text',text:'Playing'}],isError:false}});
    mup.registerFunction('stop',()=>{stopPlay();return{content:[{type:'text',text:'Stopped'}],isError:false}});
    mup.registerFunction('clear',()=>{pattern=Array.from({length:STEPS},()=>new Set());renderPattern();broadcastState();return{content:[{type:'text',text:'Cleared'}],isError:false}});
    mup.registerFunction('getPattern',()=>({content:[{type:'text',text:`Keys: ${pattern.reduce((a,s)=>a+s.size,0)} notes, ${bpm} BPM`},{type:'data',data:{track:'keys',pattern:patternData(),params,bpm}}],isError:false}));

    mup.onReady(p=>{
      if(p?.savedState){const s=p.savedState;if(s.pattern){for(let i=0;i<STEPS;i++)pattern[i]=new Set(s.pattern[i]||[]);renderPattern()}if(s.params)Object.assign(params,s.params);if(s.bpm){bpm=s.bpm;document.getElementById('bpm').value=bpm}}
      broadcastState();
    });
  </script>
</body>
</html>
