<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Synth</title>
  <script type="application/mup-manifest">
  {
    "name": "Synth",
    "description": "A lead synth step sequencer. 16 steps, monophonic melody line (C3–B4). Full sound design: waveform, filter, ADSR, detune. Click cells to place notes. Use getPattern to export to the Mixer.",
    "grid": { "minWidth": 3, "minHeight": 3 },
    "functions": [
      { "name": "setPattern", "description": "Set the melody pattern. Each step is a note name ('C3'–'B4') or null for rest.", "inputSchema": { "type": "object", "properties": { "steps": { "type": "array", "items": { "type": ["string","null"] } } }, "required": ["steps"] } },
      { "name": "setParams", "description": "Adjust synth sound design.", "inputSchema": { "type": "object", "properties": { "waveform": { "type": "string" }, "filterFreq": { "type": "number" }, "filterQ": { "type": "number" }, "attack": { "type": "number" }, "decay": { "type": "number" }, "sustain": { "type": "number" }, "release": { "type": "number" }, "detune": { "type": "number" } } } },
      { "name": "setBPM", "description": "Set tempo.", "inputSchema": { "type": "object", "properties": { "bpm": { "type": "integer" } }, "required": ["bpm"] } },
      { "name": "play", "description": "Start playback.", "inputSchema": { "type": "object", "properties": {} } },
      { "name": "stop", "description": "Stop playback.", "inputSchema": { "type": "object", "properties": {} } },
      { "name": "clear", "description": "Clear all steps.", "inputSchema": { "type": "object", "properties": {} } },
      { "name": "getPattern", "description": "Get pattern, params, and BPM for export to Mixer.", "inputSchema": { "type": "object", "properties": {} } }
    ]
  }
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,sans-serif;background:#0a1628;color:#8899bb;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    .bar{display:flex;align-items:center;gap:4px;padding:4px 8px;background:#081020;border-bottom:1px solid#1a2a44;flex-shrink:0}
    .bar button{width:28px;height:24px;border:1px solid#1a2a44;border-radius:4px;background:#0e1e38;color:#8899bb;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;font-family:inherit}
    .bar button:hover{background:#162848} .bar button.on{background:#1a3a6a;border-color:#3366aa;color:#bbddff}
    .bar input[type=number]{width:40px;padding:2px 4px;border:1px solid#1a2a44;border-radius:3px;background:#0e1e38;color:#8899bb;font-size:11px;font-family:inherit;text-align:center}
    .bar .sep{width:1px;height:16px;background:#1a2a44} .bar .spacer{flex:1} .bar .lbl{font-size:9px;color:#446}
    .params{display:none;padding:5px 8px;background:#091222;border-bottom:1px solid#1a2a44;flex-shrink:0;gap:6px;flex-wrap:wrap;align-items:center}
    .params.open{display:flex}
    .params label{font-size:9px;color:#446} .params select{padding:1px 4px;border:1px solid#1a2a44;border-radius:3px;background:#0e1e38;color:#8899bb;font-size:10px}
    .params input[type=range]{width:42px;accent-color:#3366aa;height:18px}
    canvas{flex-shrink:0;width:100%;border-bottom:1px solid#1a2a44}
    .roll{flex:1;overflow-y:auto;overflow-x:hidden}
    .grid{display:grid;grid-template-columns:22px repeat(16,1fr);min-height:100%}
    .lbl-cell{display:flex;align-items:center;justify-content:flex-end;padding-right:2px;font-size:8px;color:#335;position:sticky;left:0;background:#0a1628;z-index:1}
    .lbl-cell.bk{color:#446}
    .cell{border-bottom:1px solid#0e1830;cursor:pointer;min-height:14px;transition:background .05s}
    .cell.wh{background:#0e1e35} .cell.bk{background:#0a1628} .cell.bt{border-left:1px solid#152540}
    .cell.on{background:#2255aa} .cell.pl{box-shadow:inset 0 0 0 1px #55aaff} .cell:hover{filter:brightness(1.2)}
  </style>
</head>
<body>
  <div class="bar">
    <button id="playBtn">&#9654;</button><button id="stopBtn">&#9632;</button><div class="sep"></div>
    <span class="lbl">BPM</span><input type="number" id="bpm" value="120" min="40" max="240"><div class="sep"></div>
    <button id="clearBtn">&#10005;</button><div class="spacer"></div><button id="paramBtn">&#9881;</button>
  </div>
  <div class="params" id="params">
    <label>Wave</label><select id="wave"><option value="sawtooth">Saw</option><option value="square">Sq</option><option value="sine">Sin</option><option value="triangle">Tri</option></select>
    <label>Cut</label><input type="range" id="cutoff" min="200" max="8000" value="3000">
    <label>Q</label><input type="range" id="reso" min="0.1" max="20" step="0.1" value="2">
    <label>A</label><input type="range" id="atk" min="0.01" max="1" step="0.01" value="0.02">
    <label>D</label><input type="range" id="dec" min="0.01" max="1" step="0.01" value="0.15">
    <label>S</label><input type="range" id="sus" min="0" max="1" step="0.01" value="0.5">
    <label>R</label><input type="range" id="rel" min="0.01" max="2" step="0.01" value="0.2">
    <label>Det</label><input type="range" id="detune" min="-50" max="50" value="0">
  </div>
  <canvas id="viz" height="28"></canvas>
  <div class="roll"><div class="grid" id="grid"></div></div>

  <script>
    const N=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'],BK=new Set([1,3,6,8,10]),ROWS=[],STEPS=16;
    for(let o=4;o>=3;o--)for(let n=11;n>=0;n--)ROWS.push({name:N[n]+o,midi:n+(o+1)*12,bk:BK.has(n)});
    const ctx=new AudioContext(),analyser=ctx.createAnalyser();analyser.fftSize=256;analyser.connect(ctx.destination);
    const gridEl=document.getElementById('grid'),cells={};
    let pattern=new Array(STEPS).fill(null),params={waveform:'sawtooth',filterFreq:3000,filterQ:2,attack:.02,decay:.15,sustain:.5,release:.2,detune:0};
    let bpm=120,playing=false,step=-1,timer=null;
    const freq=m=>440*Math.pow(2,(m-69)/12);

    ROWS.forEach((r,row)=>{
      const l=document.createElement('div');l.className='lbl-cell'+(r.bk?' bk':'');l.textContent=r.name;gridEl.appendChild(l);
      cells[row]={};
      for(let col=0;col<STEPS;col++){const c=document.createElement('div');c.className='cell '+(r.bk?'bk':'wh')+(col%4===0?' bt':'');c.dataset.r=row;c.dataset.c=col;gridEl.appendChild(c);cells[row][col]=c}
    });

    document.getElementById('paramBtn').addEventListener('click',()=>{document.getElementById('params').classList.toggle('open');document.getElementById('paramBtn').classList.toggle('on')});

    gridEl.addEventListener('pointerdown',e=>{
      const c=e.target.closest('.cell');if(!c)return;const row=+c.dataset.r,col=+c.dataset.c,note=ROWS[row].name;
      if(pattern[col]===note){pattern[col]=null;c.classList.remove('on')}
      else{ROWS.forEach((_,r)=>cells[r][col].classList.remove('on'));pattern[col]=note;c.classList.add('on')}
      broadcastState();
    });

    function renderPattern(){for(let col=0;col<STEPS;col++)ROWS.forEach((r,row)=>cells[row][col].classList.toggle('on',pattern[col]===r.name))}

    function playSynth(midi,dur){
      const f=freq(midi),now=ctx.currentTime,{attack:a,decay:d,sustain:s,release:r,detune:dt}=params;
      const o1=ctx.createOscillator(),o2=ctx.createOscillator(),fl=ctx.createBiquadFilter(),g=ctx.createGain(),mx=ctx.createGain();
      o1.type=params.waveform;o1.frequency.value=f;o2.type=params.waveform;o2.frequency.value=f;o2.detune.value=dt;
      fl.type='lowpass';fl.frequency.value=params.filterFreq;fl.Q.value=params.filterQ;mx.gain.value=.5;
      o1.connect(fl);o2.connect(mx);mx.connect(fl);fl.connect(g);g.connect(analyser);
      g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.25,now+a);g.gain.linearRampToValueAtTime(.25*s,now+a+d);
      g.gain.setValueAtTime(.25*s,now+dur);g.gain.linearRampToValueAtTime(.001,now+dur+r);
      o1.start(now);o2.start(now);o1.stop(now+dur+r);o2.stop(now+dur+r);
    }

    function startPlay(){if(playing)return;ctx.resume();playing=true;step=-1;document.getElementById('playBtn').classList.add('on');tick()}
    function stopPlay(){playing=false;clearTimeout(timer);document.getElementById('playBtn').classList.remove('on');if(step>=0)ROWS.forEach((_,r)=>cells[r][step].classList.remove('pl'));step=-1}
    function tick(){
      if(!playing)return;if(step>=0)ROWS.forEach((_,r)=>cells[r][step].classList.remove('pl'));
      step=(step+1)%STEPS;ROWS.forEach((_,r)=>cells[r][step].classList.add('pl'));
      const dur=60/bpm/4;if(pattern[step]){const r=ROWS.findIndex(r=>r.name===pattern[step]);if(r>=0)playSynth(ROWS[r].midi,dur*.8)}
      timer=setTimeout(tick,dur*1000);
    }

    // Visualizer
    const canvas=document.getElementById('viz'),cCtx=canvas.getContext('2d'),buf=new Uint8Array(analyser.frequencyBinCount);
    function drawViz(){requestAnimationFrame(drawViz);analyser.getByteTimeDomainData(buf);canvas.width=canvas.clientWidth;cCtx.fillStyle='#0a1628';cCtx.fillRect(0,0,canvas.width,canvas.height);cCtx.lineWidth=1;cCtx.strokeStyle='#3388cc';cCtx.beginPath();const sw=canvas.width/buf.length;for(let i=0;i<buf.length;i++){const y=buf[i]/128*canvas.height/2;i===0?cCtx.moveTo(0,y):cCtx.lineTo(i*sw,y)}cCtx.stroke()}
    drawViz();

    document.getElementById('playBtn').addEventListener('click',startPlay);
    document.getElementById('stopBtn').addEventListener('click',stopPlay);
    document.getElementById('clearBtn').addEventListener('click',()=>{pattern.fill(null);renderPattern();broadcastState()});
    document.getElementById('bpm').addEventListener('change',e=>{bpm=+e.target.value;broadcastState()});
    document.getElementById('wave').addEventListener('change',e=>{params.waveform=e.target.value});
    const PM={cutoff:'filterFreq',reso:'filterQ',atk:'attack',dec:'decay',sus:'sustain',rel:'release',detune:'detune'};
    Object.entries(PM).forEach(([id,k])=>document.getElementById(id).addEventListener('input',e=>{params[k]=+e.target.value}));

    function broadcastState(){const n=pattern.filter(Boolean).length;mup.updateState(`Synth: ${n}/16, ${bpm} BPM, ${params.waveform}${playing?', playing':''}`,{pattern,params,bpm,playing})}

    mup.registerFunction('setPattern',({steps})=>{for(let i=0;i<STEPS;i++)pattern[i]=steps[i]||null;renderPattern();broadcastState();return{content:[{type:'text',text:`Pattern set (${pattern.filter(Boolean).length} notes)`}]}});
    mup.registerFunction('setParams',(p)=>{const c=[];if(p.waveform){params.waveform=p.waveform;document.getElementById('wave').value=p.waveform;c.push('wave:'+p.waveform)}const m={filterFreq:'cutoff',filterQ:'reso',attack:'atk',decay:'dec',sustain:'sus',release:'rel',detune:'detune'};for(const[k,id]of Object.entries(m))if(p[k]!==undefined){params[k]=p[k];document.getElementById(id).value=p[k];c.push(k+':'+p[k])}return{content:[{type:'text',text:`Params: ${c.join(', ')}`}]}});
    mup.registerFunction('setBPM',({bpm:b})=>{bpm=b;document.getElementById('bpm').value=b;broadcastState();return{content:[{type:'text',text:`BPM: ${b}`}]}});
    mup.registerFunction('play',()=>{startPlay();return{content:[{type:'text',text:'Playing'}]}});
    mup.registerFunction('stop',()=>{stopPlay();return{content:[{type:'text',text:'Stopped'}]}});
    mup.registerFunction('clear',()=>{pattern.fill(null);renderPattern();broadcastState();return{content:[{type:'text',text:'Cleared'}]}});
    mup.registerFunction('getPattern',()=>({content:[{type:'text',text:`Synth: ${pattern.filter(Boolean).length}/16, ${bpm} BPM`},{type:'data',data:{track:'synth',pattern,params,bpm}}]}));

    mup.onReady(p=>{if(p?.savedState){const s=p.savedState;if(s.pattern){pattern=s.pattern;renderPattern()}if(s.params)Object.assign(params,s.params);if(s.bpm){bpm=s.bpm;document.getElementById('bpm').value=bpm}}broadcastState()});
  </script>
</body>
</html>
