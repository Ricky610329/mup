<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drum Machine</title>

  <script type="application/mup-manifest">
  {
    "name": "Drum Machine",
    "description": "A 4-track step sequencer (kick, snare, hi-hat, clap) with 16 steps. Users toggle steps by clicking. LLM can set patterns, change tempo, and control playback. Audio plays in the browser via Web Audio API.",
    "grid": { "minWidth": 1, "minHeight": 1 },
    "functions": [
      {
        "name": "setPattern",
        "description": "Set the beat pattern for one instrument. steps is 16 booleans (true = hit).",
        "inputSchema": {
          "type": "object",
          "properties": {
            "instrument": { "type": "string", "enum": ["kick", "snare", "hihat", "clap"] },
            "steps": { "type": "array", "items": { "type": "boolean" }, "minItems": 16, "maxItems": 16 }
          },
          "required": ["instrument", "steps"]
        }
      },
      {
        "name": "setBPM",
        "description": "Set tempo in beats per minute (60-200)",
        "inputSchema": {
          "type": "object",
          "properties": {
            "bpm": { "type": "integer", "minimum": 60, "maximum": 200 }
          },
          "required": ["bpm"]
        }
      },
      {
        "name": "play",
        "description": "Start playback",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "stop",
        "description": "Stop playback",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "clear",
        "description": "Clear all patterns",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "getState",
        "description": "Get current patterns, BPM, and playback status",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "toggleStep",
        "description": "Toggle a single step on or off for an instrument. Easier than setPattern when changing just one or a few steps.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "instrument": { "type": "string", "enum": ["kick", "snare", "hihat", "clap"] },
            "step": { "type": "integer", "minimum": 0, "maximum": 15, "description": "Step index (0-15)" },
            "on": { "type": "boolean", "description": "true = hit, false = silent. Omit to toggle current state." }
          },
          "required": ["instrument", "step"]
        }
      }
    ]
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent;
      color: #1d1d1f;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 8px;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .play-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: none;
      background: rgba(52, 199, 89, 0.1);
      color: #34c759;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      font-family: inherit;
    }
    .play-btn:hover { background: rgba(52, 199, 89, 0.18); }
    .play-btn.playing { background: rgba(255, 59, 48, 0.1); color: #ff3b30; }
    .play-btn.playing:hover { background: rgba(255, 59, 48, 0.18); }

    .bpm-group {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(60,60,67,0.5);
    }
    .bpm-value {
      font-weight: 700;
      color: rgba(0,0,0,0.8);
      min-width: 28px;
      text-align: center;
    }
    .bpm-slider {
      width: 80px;
      accent-color: #1a1a1a;
    }

    .spacer { flex: 1; }

    .clear-btn {
      height: 24px;
      padding: 0 10px;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      background: rgba(0,0,0,0.06);
      color: rgba(60,60,67,0.6);
      transition: background 0.15s;
      font-family: inherit;
    }
    .clear-btn:hover { background: rgba(0,0,0,0.1); }

    .sequencer {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-height: 0;
    }

    .track {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 2px;
      min-height: 0;
    }

    .track-label {
      width: 44px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(60,60,67,0.4);
      flex-shrink: 0;
    }

    .steps {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      gap: 2px;
      height: 100%;
    }

    .step {
      border-radius: 4px;
      cursor: pointer;
      background: rgba(0,0,0,0.04);
      transition: background 0.1s, transform 0.08s;
      min-height: 16px;
    }
    .step:hover { background: rgba(0,0,0,0.08); }
    .step.on[data-inst="kick"]  { background: #ff3b30; }
    .step.on[data-inst="snare"] { background: #ff9500; }
    .step.on[data-inst="hihat"] { background: #34c759; }
    .step.on[data-inst="clap"]  { background: #5856d6; }

    .step.current { box-shadow: inset 0 0 0 2px rgba(0,0,0,0.3); }

    /* Beat grouping visual */
    .step:nth-child(4n+1) { margin-left: 2px; }
  </style>
</head>
<body>
  <div class="controls">
    <button class="play-btn" id="playBtn" title="Play/Stop">&#9654;</button>
    <div class="bpm-group">
      <span>BPM</span>
      <input type="range" class="bpm-slider" id="bpmSlider" min="60" max="200" value="120">
      <span class="bpm-value" id="bpmValue">120</span>
    </div>
    <div class="spacer"></div>
    <button class="clear-btn" id="clearBtn">Clear</button>
  </div>
  <div class="sequencer" id="sequencer"></div>

  <script>
    const INSTRUMENTS = ['kick', 'snare', 'hihat', 'clap'];
    const STEPS = 16;

    // State
    const patterns = {};
    INSTRUMENTS.forEach(i => patterns[i] = new Array(STEPS).fill(false));
    let bpm = 120;
    let playing = false;
    let currentStep = -1;
    let timerId = null;

    // Audio context (created on first play to comply with autoplay policy)
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new AudioContext();
      return audioCtx;
    }

    // Simple synthesis
    function playSound(instrument) {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;

      if (instrument === 'kick') {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(30, now + 0.12);
        gain.gain.setValueAtTime(0.8, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now); osc.stop(now + 0.15);
      }
      else if (instrument === 'snare') {
        const noise = ctx.createBufferSource();
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        noise.buffer = buf;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.5, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        const filter = ctx.createBiquadFilter();
        filter.type = 'highpass'; filter.frequency.value = 1000;
        noise.connect(filter).connect(gain).connect(ctx.destination);
        noise.start(now);
      }
      else if (instrument === 'hihat') {
        const noise = ctx.createBufferSource();
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        noise.buffer = buf;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
        const filter = ctx.createBiquadFilter();
        filter.type = 'highpass'; filter.frequency.value = 5000;
        noise.connect(filter).connect(gain).connect(ctx.destination);
        noise.start(now);
      }
      else if (instrument === 'clap') {
        for (let i = 0; i < 3; i++) {
          const noise = ctx.createBufferSource();
          const buf = ctx.createBuffer(1, ctx.sampleRate * 0.02, ctx.sampleRate);
          const data = buf.getChannelData(0);
          for (let j = 0; j < data.length; j++) data[j] = Math.random() * 2 - 1;
          noise.buffer = buf;
          const gain = ctx.createGain();
          gain.gain.setValueAtTime(0.4, now + i * 0.01);
          gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.01 + 0.04);
          const filter = ctx.createBiquadFilter();
          filter.type = 'bandpass'; filter.frequency.value = 2000;
          noise.connect(filter).connect(gain).connect(ctx.destination);
          noise.start(now + i * 0.01);
        }
      }
    }

    // Build UI
    const seqEl = document.getElementById('sequencer');
    INSTRUMENTS.forEach(inst => {
      const track = document.createElement('div');
      track.className = 'track';

      const label = document.createElement('div');
      label.className = 'track-label';
      label.textContent = inst;
      track.appendChild(label);

      const stepsEl = document.createElement('div');
      stepsEl.className = 'steps';

      for (let s = 0; s < STEPS; s++) {
        const step = document.createElement('div');
        step.className = 'step';
        step.dataset.inst = inst;
        step.dataset.step = s;
        step.addEventListener('click', () => toggleStep(inst, s));
        stepsEl.appendChild(step);
      }

      track.appendChild(stepsEl);
      seqEl.appendChild(track);
    });

    function toggleStep(inst, step) {
      patterns[inst][step] = !patterns[inst][step];
      updateStepUI(inst, step);
      sendState();
      mup.notifyInteraction('toggle',
        `User toggled ${inst} step ${step + 1} ${patterns[inst][step] ? 'ON' : 'OFF'}`,
        { instrument: inst, step, on: patterns[inst][step] }
      );
    }

    function updateStepUI(inst, step) {
      const el = seqEl.querySelector(`.step[data-inst="${inst}"][data-step="${step}"]`);
      if (el) el.classList.toggle('on', patterns[inst][step]);
    }

    function updateAllUI() {
      INSTRUMENTS.forEach(inst => {
        for (let s = 0; s < STEPS; s++) updateStepUI(inst, s);
      });
    }

    // Playback
    function startPlayback() {
      if (playing) return;
      playing = true;
      currentStep = -1;
      document.getElementById('playBtn').classList.add('playing');
      document.getElementById('playBtn').innerHTML = '&#9724;';
      tick();
    }

    function stopPlayback() {
      playing = false;
      clearTimeout(timerId);
      document.querySelectorAll('.step.current').forEach(el => el.classList.remove('current'));
      currentStep = -1;
      document.getElementById('playBtn').classList.remove('playing');
      document.getElementById('playBtn').innerHTML = '&#9654;';
    }

    function tick() {
      if (!playing) return;
      document.querySelectorAll('.step.current').forEach(el => el.classList.remove('current'));
      currentStep = (currentStep + 1) % STEPS;
      document.querySelectorAll(`.step[data-step="${currentStep}"]`).forEach(el => {
        el.classList.add('current');
      });
      INSTRUMENTS.forEach(inst => {
        if (patterns[inst][currentStep]) playSound(inst);
      });
      const interval = (60 / bpm / 4) * 1000; // 16th notes
      timerId = setTimeout(tick, interval);
    }

    function getPatternSummary() {
      const hits = INSTRUMENTS.reduce((sum, i) => sum + patterns[i].filter(Boolean).length, 0);
      return { bpm, playing, totalHits: hits };
    }

    function sendState() {
      const s = getPatternSummary();
      const label = s.playing ? `Playing ${bpm} BPM, ${s.totalHits} hits` : `Stopped ${bpm} BPM, ${s.totalHits} hits`;
      mup.updateState(label, { patterns, bpm, playing });
    }

    // Controls
    document.getElementById('playBtn').addEventListener('click', () => {
      if (playing) {
        stopPlayback();
        sendState();
        mup.notifyInteraction('stop', 'User stopped playback', {});
      } else {
        startPlayback();
        sendState();
        mup.notifyInteraction('play', 'User started playback', { bpm });
      }
    });

    const bpmSlider = document.getElementById('bpmSlider');
    const bpmValueEl = document.getElementById('bpmValue');
    bpmSlider.addEventListener('input', () => {
      bpm = parseInt(bpmSlider.value);
      bpmValueEl.textContent = bpm;
    });
    bpmSlider.addEventListener('change', () => {
      sendState();
      mup.notifyInteraction('bpm_change', `User set BPM to ${bpm}`, { bpm });
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      INSTRUMENTS.forEach(i => patterns[i].fill(false));
      updateAllUI();
      sendState();
      mup.notifyInteraction('clear', 'User cleared all patterns', {});
    });

    // === MUP Functions ===

    mup.registerFunction('setPattern', async (params) => {
      const { instrument, steps } = params;
      if (!patterns[instrument]) return { content: [{ type: 'text', text: 'Unknown instrument: ' + instrument }], isError: true };
      for (let i = 0; i < STEPS; i++) patterns[instrument][i] = !!steps[i];
      updateAllUI();
      sendState();
      const hits = steps.filter(Boolean).length;
      return { content: [{ type: 'text', text: `Set ${instrument}: ${hits} hits` }], isError: false };
    });

    mup.registerFunction('setBPM', async (params) => {
      bpm = Math.max(60, Math.min(200, params.bpm));
      bpmSlider.value = bpm;
      bpmValueEl.textContent = bpm;
      sendState();
      return { content: [{ type: 'text', text: `BPM set to ${bpm}` }], isError: false };
    });

    mup.registerFunction('play', async () => {
      startPlayback();
      sendState();
      return { content: [{ type: 'text', text: 'Playback started' }], isError: false };
    });

    mup.registerFunction('stop', async () => {
      stopPlayback();
      sendState();
      return { content: [{ type: 'text', text: 'Playback stopped' }], isError: false };
    });

    mup.registerFunction('clear', async () => {
      INSTRUMENTS.forEach(i => patterns[i].fill(false));
      updateAllUI();
      sendState();
      return { content: [{ type: 'text', text: 'All patterns cleared' }], isError: false };
    });

    mup.registerFunction('toggleStep', async (params) => {
      const { instrument, step } = params;
      if (!patterns[instrument]) return { content: [{ type: 'text', text: 'Unknown instrument: ' + instrument }], isError: true };
      if (step < 0 || step >= STEPS) return { content: [{ type: 'text', text: 'Step must be 0-15' }], isError: true };
      const newVal = params.on !== undefined ? params.on : !patterns[instrument][step];
      patterns[instrument][step] = newVal;
      updateStepUI(instrument, step);
      sendState();
      return { content: [{ type: 'text', text: `${instrument} step ${step}: ${newVal ? 'ON' : 'OFF'}` }], isError: false };
    });

    mup.registerFunction('getState', async () => {
      return {
        content: [
          { type: 'text', text: `BPM: ${bpm}, Playing: ${playing}` },
          { type: 'data', data: { patterns, bpm, playing } }
        ],
        isError: false
      };
    });

    mup.onReady((params) => {
      if (params.savedState) {
        if (params.savedState.bpm) bpm = params.savedState.bpm;
        if (params.savedState.patterns) {
          for (const inst of INSTRUMENTS) {
            if (params.savedState.patterns[inst]) {
              patterns[inst] = params.savedState.patterns[inst];
            }
          }
        }
        bpmSlider.value = bpm;
        document.getElementById('bpmValue').textContent = bpm;
        updateAllUI();
      }
      const totalHits = Object.values(patterns).flat().filter(Boolean).length;
      mup.updateState(`Stopped ${bpm} BPM, ${totalHits} hits`, { patterns, bpm, playing });
    });
  </script>
</body>
</html>
