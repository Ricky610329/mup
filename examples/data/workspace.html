<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workspace</title>

  <script type="application/mup-manifest">
  {
    "name": "Workspace",
    "description": "A file workspace. User picks a folder, then the LLM can browse, read, write, and download files there. Smart reading: use info() to see file size/preview/columns before reading full content. Use read() with offset/limit for large files. Replaces File Organizer with download capability.",
    "grid": { "minWidth": 1, "minHeight": 1 },
    "permissions": ["file-system-access"],
    "functions": [
      {
        "name": "list",
        "description": "List files and folders in the workspace. Returns name, type, size for each entry.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "path": { "type": "string", "description": "Subfolder path. Empty for root." }
          }
        }
      },
      {
        "name": "info",
        "description": "Get file metadata without reading full content. Returns size, line count, first 5 lines as preview, and CSV column names if applicable. Always call this before read() on unknown files.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "path": { "type": "string" }
          },
          "required": ["path"]
        }
      },
      {
        "name": "read",
        "description": "Read file content with line pagination. Default: first 100 lines. Use offset/limit for large files. Check hasMore in response.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "path": { "type": "string" },
            "offset": { "type": "number", "description": "Start line (0-based). Default: 0" },
            "limit": { "type": "number", "description": "Max lines to return. Default: 100" }
          },
          "required": ["path"]
        }
      },
      {
        "name": "write",
        "description": "Write text content to a file. Creates the file if it doesn't exist. Overwrites if it does.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "path": { "type": "string" },
            "content": { "type": "string" }
          },
          "required": ["path", "content"]
        }
      },
      {
        "name": "download",
        "description": "Download a URL and save to workspace. Use for fetching CSV, JSON, or other data files from the web.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "url": { "type": "string", "description": "URL to download" },
            "savePath": { "type": "string", "description": "Filename to save as. Auto-detected from URL if omitted." }
          },
          "required": ["url"]
        }
      },
      {
        "name": "createFolder",
        "description": "Create a new subfolder in the workspace.",
        "inputSchema": {
          "type": "object",
          "properties": { "path": { "type": "string" } },
          "required": ["path"]
        }
      },
      {
        "name": "delete",
        "description": "Delete a file from workspace.",
        "inputSchema": {
          "type": "object",
          "properties": { "path": { "type": "string" } },
          "required": ["path"]
        }
      }
    ]
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent; height: 100vh;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased; overflow: hidden;
    }
    .header {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 8px; border-bottom: 1px solid rgba(60,60,67,0.1); flex-shrink: 0;
    }
    .header-title { font-size: 11px; font-weight: 600; color: rgba(0,0,0,0.5); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .header-btn {
      border: none; background: none; cursor: pointer;
      color: rgba(60,60,67,0.4); font-size: 12px; padding: 2px 4px;
    }
    .header-btn:hover { color: rgba(60,60,67,0.8); }
    .breadcrumb {
      display: flex; gap: 2px; padding: 2px 8px;
      font-size: 10px; color: rgba(60,60,67,0.4); flex-shrink: 0;
    }
    .breadcrumb span { cursor: pointer; }
    .breadcrumb span:hover { color: #007aff; }
    .file-list { flex: 1; overflow-y: auto; padding: 2px 0; }
    .file-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px; font-size: 12px; cursor: default; transition: background 0.1s;
    }
    .file-item:hover { background: rgba(60,60,67,0.04); }
    .file-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
    .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-size { font-size: 10px; color: rgba(60,60,67,0.4); flex-shrink: 0; }
    .file-item.folder { cursor: pointer; }
    .file-item.folder .file-name { font-weight: 500; }
    .empty {
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px;
      height: 100%; color: rgba(60,60,67,0.3); font-size: 12px;
      text-align: center; padding: 20px;
    }
    .open-btn {
      border: none; background: rgba(0,122,255,0.1); color: #007aff;
      border-radius: 6px; padding: 6px 14px; font-size: 12px;
      cursor: pointer; font-family: inherit;
    }
    .open-btn:hover { background: rgba(0,122,255,0.2); }
    .status {
      padding: 4px 8px; font-size: 10px;
      color: rgba(60,60,67,0.4); border-top: 1px solid rgba(60,60,67,0.08); flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title" id="headerTitle">No folder selected</span>
    <button class="header-btn" id="openBtn" title="Open folder">📂</button>
    <button class="header-btn" id="refreshBtn" title="Refresh">↻</button>
  </div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="file-list" id="fileList">
    <div class="empty" id="empty">
      <div>Select a workspace folder</div>
      <button class="open-btn" id="openBtn2">Open Folder</button>
    </div>
  </div>
  <div class="status" id="status"></div>

  <script>
    const fileListEl = document.getElementById('fileList');
    const emptyEl = document.getElementById('empty');
    const breadcrumbEl = document.getElementById('breadcrumb');
    const statusEl = document.getElementById('status');
    const headerTitle = document.getElementById('headerTitle');

    let rootHandle = null; // FileSystemDirectoryHandle
    let currentPath = []; // array of folder names from root
    let currentFiles = [];

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function fileIcon(name, isDir) {
      if (isDir) return '📁';
      const ext = name.split('.').pop()?.toLowerCase() || '';
      if (['csv', 'tsv'].includes(ext)) return '📊';
      if (['json'].includes(ext)) return '📋';
      if (['txt', 'md', 'log'].includes(ext)) return '📄';
      if (['html', 'xml'].includes(ext)) return '🌐';
      if (['js', 'ts', 'py'].includes(ext)) return '💻';
      if (['jpg', 'jpeg', 'png', 'gif', 'svg'].includes(ext)) return '🖼️';
      return '📄';
    }

    async function openFolder() {
      try {
        rootHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        headerTitle.textContent = rootHandle.name;
        currentPath = [];
        await refresh();
      } catch (e) { /* cancelled */ }
    }

    document.getElementById('openBtn').addEventListener('click', openFolder);
    document.getElementById('openBtn2').addEventListener('click', openFolder);
    document.getElementById('refreshBtn').addEventListener('click', () => refresh());

    async function getDirHandle(pathParts) {
      let handle = rootHandle;
      for (const part of pathParts) {
        handle = await handle.getDirectoryHandle(part);
      }
      return handle;
    }

    async function refresh() {
      if (!rootHandle) return;
      try {
        const dirHandle = await getDirHandle(currentPath);
        currentFiles = [];
        for await (const [name, handle] of dirHandle) {
          const entry = { name, type: handle.kind === 'directory' ? 'folder' : 'file', size: 0 };
          if (handle.kind === 'file') {
            try { const f = await handle.getFile(); entry.size = f.size; } catch {}
          }
          currentFiles.push(entry);
        }
        currentFiles.sort((a, b) => {
          if (a.type !== b.type) return a.type === 'folder' ? -1 : 1;
          return a.name.localeCompare(b.name);
        });
        renderFiles();
        const totalSize = currentFiles.reduce((s, f) => s + f.size, 0);
        statusEl.textContent = `${currentFiles.length} item${currentFiles.length !== 1 ? 's' : ''} · ${formatSize(totalSize)}`;
        mup.updateState(
          `${currentFiles.length} files in ${rootHandle.name}/${currentPath.join('/')}`,
          { folderName: rootHandle.name, path: currentPath.join('/'), fileCount: currentFiles.length }
        );
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
      }
    }

    function renderFiles() {
      fileListEl.innerHTML = '';
      // Breadcrumb
      breadcrumbEl.innerHTML = '';
      const rootSpan = document.createElement('span');
      rootSpan.textContent = rootHandle?.name || '~';
      rootSpan.onclick = () => { currentPath = []; refresh(); };
      breadcrumbEl.appendChild(rootSpan);
      for (let i = 0; i < currentPath.length; i++) {
        breadcrumbEl.appendChild(document.createTextNode(' / '));
        const s = document.createElement('span');
        s.textContent = currentPath[i];
        const navTo = currentPath.slice(0, i + 1);
        s.onclick = () => { currentPath = navTo; refresh(); };
        breadcrumbEl.appendChild(s);
      }

      if (currentFiles.length === 0 && currentPath.length === 0) {
        emptyEl.querySelector('div').textContent = 'Folder is empty';
        emptyEl.querySelector('.open-btn').style.display = 'none';
        emptyEl.style.display = '';
        fileListEl.appendChild(emptyEl);
        return;
      }
      emptyEl.style.display = 'none';

      if (currentPath.length > 0) {
        const back = document.createElement('div');
        back.className = 'file-item folder';
        back.innerHTML = '<span class="file-icon">⬆️</span><span class="file-name">..</span>';
        back.onclick = () => { currentPath.pop(); refresh(); };
        fileListEl.appendChild(back);
      }

      for (const f of currentFiles) {
        const item = document.createElement('div');
        item.className = 'file-item' + (f.type === 'folder' ? ' folder' : '');
        item.innerHTML = `<span class="file-icon">${fileIcon(f.name, f.type === 'folder')}</span><span class="file-name">${f.name}</span><span class="file-size">${f.type === 'folder' ? '' : formatSize(f.size)}</span>`;
        if (f.type === 'folder') {
          item.onclick = () => { currentPath.push(f.name); refresh(); };
        }
        fileListEl.appendChild(item);
      }
    }

    // === Helpers ===

    async function getFileHandle(filePath) {
      const parts = filePath.split('/').filter(Boolean);
      const fileName = parts.pop();
      let dir = rootHandle;
      for (const p of parts) dir = await dir.getDirectoryHandle(p);
      return await dir.getFileHandle(fileName);
    }

    async function readFileText(filePath) {
      const handle = await getFileHandle(filePath);
      const file = await handle.getFile();
      return await file.text();
    }

    async function writeFileText(filePath, content) {
      const parts = filePath.split('/').filter(Boolean);
      const fileName = parts.pop();
      let dir = rootHandle;
      for (const p of parts) dir = await dir.getDirectoryHandle(p, { create: true });
      const handle = await dir.getFileHandle(fileName, { create: true });
      const writable = await handle.createWritable();
      await writable.write(content);
      await writable.close();
    }

    // === MUP Functions ===

    mup.registerFunction('list', async (params) => {
      if (!rootHandle) return { content: [{ type: 'text', text: 'No folder open. Ask user to select a workspace folder.' }], isError: true };
      const parts = (params.path || '').split('/').filter(Boolean);
      const prevPath = [...currentPath];
      currentPath = parts;
      await refresh();
      currentPath = prevPath;
      const files = currentFiles;
      const summary = files.map(f => `${f.type === 'folder' ? '📁' : '📄'} ${f.name}${f.size ? ' (' + formatSize(f.size) + ')' : ''}`).join('\n');
      return {
        content: [
          { type: 'text', text: files.length > 0 ? `${files.length} items:\n${summary}` : 'Empty folder' },
          { type: 'data', data: { files } }
        ],
        isError: false
      };
    });

    mup.registerFunction('info', async (params) => {
      if (!rootHandle) return { content: [{ type: 'text', text: 'No folder open.' }], isError: true };
      try {
        const handle = await getFileHandle(params.path);
        const file = await handle.getFile();
        const ext = params.path.split('.').pop()?.toLowerCase() || '';
        const result = { name: file.name, size: file.size, sizeFormatted: formatSize(file.size), type: file.type, extension: ext };

        const textExts = ['txt', 'csv', 'json', 'md', 'html', 'xml', 'js', 'ts', 'py', 'yaml', 'yml', 'log', 'tsv'];
        if (textExts.includes(ext) && file.size < 2_000_000) {
          const text = await file.text();
          const lines = text.split('\n');
          result.totalLines = lines.length;
          result.preview = lines.slice(0, 5).join('\n');
          if (ext === 'csv' || ext === 'tsv') {
            result.columns = lines[0]?.split(ext === 'csv' ? ',' : '\t').map(c => c.trim());
          }
        }

        let summary = `${params.path}: ${formatSize(file.size)}`;
        if (result.totalLines) summary += `, ${result.totalLines} lines`;
        if (result.columns) summary += `\nColumns: ${result.columns.join(', ')}`;
        if (result.preview) summary += `\nPreview:\n${result.preview}`;

        return { content: [{ type: 'text', text: summary }, { type: 'data', data: result }], isError: false };
      } catch (err) {
        return { content: [{ type: 'text', text: `Error: ${err.message}` }], isError: true };
      }
    });

    mup.registerFunction('read', async (params) => {
      if (!rootHandle) return { content: [{ type: 'text', text: 'No folder open.' }], isError: true };
      try {
        const text = await readFileText(params.path);
        const lines = text.split('\n');
        const offset = params.offset || 0;
        const limit = params.limit || 100;
        const slice = lines.slice(offset, offset + limit);
        const hasMore = offset + limit < lines.length;
        let summary = `${params.path} [lines ${offset}-${offset + slice.length}/${lines.length}]`;
        if (hasMore) summary += ' (has more)';
        return {
          content: [{ type: 'text', text: summary + '\n' + slice.join('\n') }, { type: 'data', data: { totalLines: lines.length, offset, limit, hasMore } }],
          isError: false
        };
      } catch (err) {
        return { content: [{ type: 'text', text: `Error: ${err.message}` }], isError: true };
      }
    });

    mup.registerFunction('write', async (params) => {
      if (!rootHandle) return { content: [{ type: 'text', text: 'No folder open.' }], isError: true };
      try {
        await writeFileText(params.path, params.content);
        refresh();
        return { content: [{ type: 'text', text: `Written to ${params.path}` }], isError: false };
      } catch (err) {
        return { content: [{ type: 'text', text: `Error: ${err.message}` }], isError: true };
      }
    });

    mup.registerFunction('download', async (params) => {
      if (!rootHandle) return { content: [{ type: 'text', text: 'No folder open.' }], isError: true };
      try {
        // Fetch via host (avoids CORS)
        const result = await mup.system('fetchUrl', { url: params.url });
        let fileName = params.savePath;
        if (!fileName) {
          if (result.saved) fileName = result.saved;
          else try { fileName = new URL(params.url).pathname.split('/').pop() || 'download.txt'; } catch { fileName = 'download.txt'; }
        }
        const content = result.content || JSON.stringify(result);
        await writeFileText(fileName, content);
        refresh();
        return { content: [{ type: 'text', text: `Downloaded ${params.url} → ${fileName} (${formatSize(result.size || content.length)})` }], isError: false };
      } catch (err) {
        return { content: [{ type: 'text', text: `Download failed: ${err.message}` }], isError: true };
      }
    });

    mup.registerFunction('createFolder', async (params) => {
      if (!rootHandle) return { content: [{ type: 'text', text: 'No folder open.' }], isError: true };
      try {
        const parts = params.path.split('/').filter(Boolean);
        let dir = rootHandle;
        for (const p of parts) dir = await dir.getDirectoryHandle(p, { create: true });
        refresh();
        return { content: [{ type: 'text', text: `Created folder: ${params.path}` }], isError: false };
      } catch (err) {
        return { content: [{ type: 'text', text: `Error: ${err.message}` }], isError: true };
      }
    });

    mup.registerFunction('delete', async (params) => {
      if (!rootHandle) return { content: [{ type: 'text', text: 'No folder open.' }], isError: true };
      try {
        const parts = params.path.split('/').filter(Boolean);
        const name = parts.pop();
        let dir = rootHandle;
        for (const p of parts) dir = await dir.getDirectoryHandle(p);
        await dir.removeEntry(name, { recursive: true });
        refresh();
        return { content: [{ type: 'text', text: `Deleted: ${params.path}` }], isError: false };
      } catch (err) {
        return { content: [{ type: 'text', text: `Error: ${err.message}` }], isError: true };
      }
    });

    mup.onReady(() => {
      mup.updateState('No folder selected', { folderName: null });
    });
  </script>
</body>
</html>
