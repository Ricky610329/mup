<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slides</title>

  <script type="application/mup-manifest">
  {
    "name": "Slides",
    "description": "A presentation maker. LLM creates slides with titles, markdown content, and different layouts. Users can browse, edit, and export to PDF. Supports title, content, split, and image layouts.",
    "grid": { "minWidth": 2, "minHeight": 2 },
    "functions": [
      {
        "name": "createPresentation",
        "description": "Create a full presentation at once. Each slide has title, content (markdown), and optional layout (title/content/split).",
        "inputSchema": {
          "type": "object",
          "properties": {
            "title": { "type": "string", "description": "Presentation title (shown on first slide)" },
            "slides": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "title": { "type": "string" },
                  "content": { "type": "string", "description": "Markdown content" },
                  "layout": { "type": "string", "enum": ["title", "content", "split"] }
                },
                "required": ["title"]
              }
            }
          },
          "required": ["slides"]
        }
      },
      {
        "name": "addSlide",
        "description": "Add a single slide",
        "inputSchema": {
          "type": "object",
          "properties": {
            "title": { "type": "string" },
            "content": { "type": "string" },
            "layout": { "type": "string", "enum": ["title", "content", "split"] },
            "position": { "type": "number", "description": "Insert at this index (0-based). Appends if omitted." }
          },
          "required": ["title"]
        }
      },
      {
        "name": "updateSlide",
        "description": "Update an existing slide by index (0-based)",
        "inputSchema": {
          "type": "object",
          "properties": {
            "index": { "type": "number" },
            "title": { "type": "string" },
            "content": { "type": "string" },
            "layout": { "type": "string", "enum": ["title", "content", "split"] }
          },
          "required": ["index"]
        }
      },
      {
        "name": "removeSlide",
        "description": "Remove a slide by index (0-based)",
        "inputSchema": {
          "type": "object",
          "properties": { "index": { "type": "number" } },
          "required": ["index"]
        }
      },
      {
        "name": "getSlides",
        "description": "Get all slide data",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "setTheme",
        "description": "Change presentation theme colors",
        "inputSchema": {
          "type": "object",
          "properties": {
            "bg": { "type": "string", "description": "Background color (hex)" },
            "accent": { "type": "string", "description": "Accent color (hex)" },
            "font": { "type": "string", "description": "Font family" }
          }
        }
      }
    ]
  }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #1a1a1a; height: 100vh;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased; overflow: hidden;
    }

    .toolbar {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px; flex-shrink: 0;
      background: #222; color: rgba(255,255,255,0.6);
      font-size: 12px;
    }
    .toolbar-btn {
      border: none; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7);
      border-radius: 4px; padding: 4px 10px; font-size: 11px;
      cursor: pointer; font-family: inherit;
    }
    .toolbar-btn:hover { background: rgba(255,255,255,0.2); }
    .toolbar-spacer { flex: 1; }
    .page-info { font-size: 11px; color: rgba(255,255,255,0.4); }

    .slide-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 12px; min-height: 0;
    }
    .slide {
      width: 100%; max-width: 800px;
      aspect-ratio: 16/9;
      background: var(--slide-bg, #ffffff);
      border-radius: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      overflow: hidden;
      display: flex; flex-direction: column;
      font-family: var(--slide-font, 'Inter', sans-serif);
      position: relative;
    }

    /* Layouts */
    .slide.layout-title {
      align-items: center; justify-content: center; text-align: center; padding: 40px;
    }
    .slide.layout-title .slide-title {
      font-size: 28px; font-weight: 700; color: var(--slide-accent, #007aff);
      margin-bottom: 12px;
    }
    .slide.layout-title .slide-content { font-size: 16px; color: #666; }

    .slide.layout-content { padding: 24px 32px; }
    .slide.layout-content .slide-title {
      font-size: 22px; font-weight: 700; color: var(--slide-accent, #007aff);
      margin-bottom: 14px; padding-bottom: 8px;
      border-bottom: 2px solid var(--slide-accent, #007aff);
    }
    .slide.layout-content .slide-content {
      flex: 1; overflow-y: auto; font-size: 14px; line-height: 1.6; color: #333;
    }

    .slide.layout-split { padding: 24px 32px; }
    .slide.layout-split .slide-title {
      font-size: 20px; font-weight: 700; color: var(--slide-accent, #007aff);
      margin-bottom: 12px;
    }
    .slide.layout-split .slide-content {
      flex: 1; display: flex; gap: 20px; overflow-y: auto; font-size: 13px; line-height: 1.5; color: #333;
    }
    .slide.layout-split .slide-content > * { flex: 1; }

    /* Markdown inside slides */
    .slide-content ul, .slide-content ol { padding-left: 20px; margin: 4px 0; }
    .slide-content li { margin: 3px 0; }
    .slide-content code { background: rgba(0,0,0,0.06); padding: 1px 4px; border-radius: 3px; font-size: 0.9em; }
    .slide-content pre { background: rgba(0,0,0,0.04); padding: 8px 10px; border-radius: 6px; overflow-x: auto; margin: 6px 0; }
    .slide-content pre code { background: none; padding: 0; }
    .slide-content strong { color: var(--slide-accent, #007aff); }
    .slide-content blockquote { border-left: 3px solid var(--slide-accent, #007aff); padding-left: 10px; color: #666; margin: 6px 0; }

    .slide-number {
      position: absolute; bottom: 8px; right: 12px;
      font-size: 10px; color: rgba(0,0,0,0.2);
    }

    /* Thumbnails */
    .thumbs {
      display: flex; gap: 4px; padding: 6px 10px;
      overflow-x: auto; flex-shrink: 0; background: #222;
    }
    .thumb {
      width: 64px; height: 36px; flex-shrink: 0;
      background: #fff; border-radius: 3px; cursor: pointer;
      border: 2px solid transparent;
      overflow: hidden; position: relative;
      font-size: 4px; padding: 2px;
    }
    .thumb.active { border-color: var(--slide-accent, #007aff); }
    .thumb:hover { border-color: rgba(255,255,255,0.3); }
    .thumb-title {
      font-weight: 700; font-size: 4px;
      color: var(--slide-accent, #007aff);
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }

    .empty {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: rgba(255,255,255,0.3); font-size: 13px;
    }

    /* Print */
    @media print {
      body { background: white; }
      .toolbar, .thumbs { display: none !important; }
      .slide-area { padding: 0; }
      .slide {
        max-width: none; width: 100%; height: 100vh;
        border-radius: 0; box-shadow: none;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="toolbar-btn" id="prevBtn">◀</button>
    <span class="page-info" id="pageInfo">0 / 0</span>
    <button class="toolbar-btn" id="nextBtn">▶</button>
    <div class="toolbar-spacer"></div>
    <button class="toolbar-btn" id="exportBtn">Export</button>
  </div>
  <div class="slide-area" id="slideArea">
    <div class="empty">No slides — ask the LLM to create a presentation</div>
  </div>
  <div class="thumbs" id="thumbs"></div>

  <script>
    let slides = [];
    let currentIndex = 0;
    let theme = { bg: '#ffffff', accent: '#007aff', font: 'Inter, sans-serif' };

    const slideArea = document.getElementById('slideArea');
    const thumbsEl = document.getElementById('thumbs');
    const pageInfo = document.getElementById('pageInfo');

    function applyTheme() {
      document.documentElement.style.setProperty('--slide-bg', theme.bg);
      document.documentElement.style.setProperty('--slide-accent', theme.accent);
      document.documentElement.style.setProperty('--slide-font', theme.font);
    }

    function renderSlide(slide, index) {
      const layout = slide.layout || 'content';
      const contentHtml = slide.content ? marked.parse(slide.content) : '';

      let inner = '';
      if (layout === 'title') {
        inner = `<div class="slide-title">${esc(slide.title)}</div><div class="slide-content">${contentHtml}</div>`;
      } else if (layout === 'split') {
        // Split content by --- or first half/second half
        const parts = (slide.content || '').split(/\n---\n/);
        const left = marked.parse(parts[0] || '');
        const right = marked.parse(parts[1] || '');
        inner = `<div class="slide-title">${esc(slide.title)}</div><div class="slide-content"><div>${left}</div><div>${right}</div></div>`;
      } else {
        inner = `<div class="slide-title">${esc(slide.title)}</div><div class="slide-content">${contentHtml}</div>`;
      }
      inner += `<div class="slide-number">${index + 1}</div>`;

      return `<div class="slide layout-${layout}" style="background:${theme.bg}">${inner}</div>`;
    }

    function render() {
      applyTheme();
      if (slides.length === 0) {
        slideArea.innerHTML = '<div class="empty">No slides — ask the LLM to create a presentation</div>';
        thumbsEl.innerHTML = '';
        pageInfo.textContent = '0 / 0';
        return;
      }
      if (currentIndex >= slides.length) currentIndex = slides.length - 1;
      if (currentIndex < 0) currentIndex = 0;

      slideArea.innerHTML = renderSlide(slides[currentIndex], currentIndex);
      pageInfo.textContent = `${currentIndex + 1} / ${slides.length}`;

      // Thumbnails
      thumbsEl.innerHTML = slides.map((s, i) =>
        `<div class="thumb ${i === currentIndex ? 'active' : ''}" data-index="${i}"><div class="thumb-title">${esc(s.title)}</div></div>`
      ).join('');
      thumbsEl.querySelectorAll('.thumb').forEach(t => {
        t.addEventListener('click', () => { currentIndex = parseInt(t.dataset.index); render(); });
      });
    }

    function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // Navigation
    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < slides.length - 1) { currentIndex++; render(); } });

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' && currentIndex > 0) { currentIndex--; render(); }
      if (e.key === 'ArrowRight' && currentIndex < slides.length - 1) { currentIndex++; render(); }
    });

    // Export — generate standalone printable HTML and download
    document.getElementById('exportBtn').addEventListener('click', () => {
      if (slides.length === 0) return;
      const allSlides = slides.map((s, i) => renderSlide(s, i)).join('');
      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Slides</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:${JSON.stringify(theme.font)},sans-serif;background:#fff}
.slide{width:100%;height:100vh;display:flex;flex-direction:column;position:relative;background:${theme.bg};page-break-after:always;overflow:hidden}
.slide.layout-title{align-items:center;justify-content:center;text-align:center;padding:60px}
.slide.layout-title .slide-title{font-size:42px;font-weight:700;color:${theme.accent};margin-bottom:16px}
.slide.layout-title .slide-content{font-size:22px;color:#666}
.slide.layout-content{padding:40px 50px}
.slide.layout-content .slide-title{font-size:32px;font-weight:700;color:${theme.accent};margin-bottom:20px;padding-bottom:10px;border-bottom:3px solid ${theme.accent}}
.slide.layout-content .slide-content{flex:1;font-size:20px;line-height:1.7;color:#333}
.slide.layout-split{padding:40px 50px}
.slide.layout-split .slide-title{font-size:28px;font-weight:700;color:${theme.accent};margin-bottom:16px}
.slide.layout-split .slide-content{flex:1;display:flex;gap:30px;font-size:18px;line-height:1.6;color:#333}
.slide.layout-split .slide-content>*{flex:1}
.slide-content ul,.slide-content ol{padding-left:24px;margin:6px 0}
.slide-content li{margin:4px 0}
.slide-content code{background:rgba(0,0,0,0.06);padding:2px 5px;border-radius:3px;font-size:0.9em}
.slide-content pre{background:rgba(0,0,0,0.04);padding:12px 16px;border-radius:8px;overflow-x:auto;margin:8px 0}
.slide-content pre code{background:none;padding:0}
.slide-content strong{color:${theme.accent}}
.slide-content blockquote{border-left:4px solid ${theme.accent};padding-left:14px;color:#666;margin:8px 0}
.slide-number{position:absolute;bottom:12px;right:16px;font-size:14px;color:rgba(0,0,0,0.2)}
@media print{.slide{height:100vh;page-break-after:always}}
</style></head><body>${allSlides}<script>window.print()<\/script></body></html>`;
      const blob = new Blob([html], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'slides.html';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    function sendState() {
      const title = slides.length > 0 ? slides[0].title : 'Empty';
      mup.updateState(
        `${slides.length} slides: ${title}`,
        { slides, theme, currentIndex }
      );
    }

    // === MUP Functions ===

    mup.registerFunction('createPresentation', async (params) => {
      slides = (params.slides || []).map(s => ({
        title: s.title || '',
        content: s.content || '',
        layout: s.layout || (s === params.slides[0] ? 'title' : 'content'),
      }));
      currentIndex = 0;
      render();
      sendState();
      return { content: [{ type: 'text', text: `Created presentation with ${slides.length} slides` }], isError: false };
    });

    mup.registerFunction('addSlide', async (params) => {
      const slide = { title: params.title || '', content: params.content || '', layout: params.layout || 'content' };
      if (params.position !== undefined) {
        slides.splice(params.position, 0, slide);
        currentIndex = params.position;
      } else {
        slides.push(slide);
        currentIndex = slides.length - 1;
      }
      render();
      sendState();
      return { content: [{ type: 'text', text: `Added slide "${params.title}" (${slides.length} total)` }], isError: false };
    });

    mup.registerFunction('updateSlide', async (params) => {
      if (params.index < 0 || params.index >= slides.length) {
        return { content: [{ type: 'text', text: `Invalid index: ${params.index}` }], isError: true };
      }
      const s = slides[params.index];
      if (params.title !== undefined) s.title = params.title;
      if (params.content !== undefined) s.content = params.content;
      if (params.layout !== undefined) s.layout = params.layout;
      currentIndex = params.index;
      render();
      sendState();
      return { content: [{ type: 'text', text: `Updated slide ${params.index + 1}` }], isError: false };
    });

    mup.registerFunction('removeSlide', async (params) => {
      if (params.index < 0 || params.index >= slides.length) {
        return { content: [{ type: 'text', text: `Invalid index: ${params.index}` }], isError: true };
      }
      const removed = slides.splice(params.index, 1)[0];
      render();
      sendState();
      return { content: [{ type: 'text', text: `Removed "${removed.title}" (${slides.length} remaining)` }], isError: false };
    });

    mup.registerFunction('getSlides', async () => {
      const summary = slides.map((s, i) => `${i}: [${s.layout || 'content'}] ${s.title}`).join('\n');
      return {
        content: [{ type: 'text', text: slides.length > 0 ? summary : 'No slides' }, { type: 'data', data: { slides, theme } }],
        isError: false
      };
    });

    mup.registerFunction('setTheme', async (params) => {
      if (params.bg) theme.bg = params.bg;
      if (params.accent) theme.accent = params.accent;
      if (params.font) theme.font = params.font;
      render();
      sendState();
      return { content: [{ type: 'text', text: `Theme updated` }], isError: false };
    });

    mup.onReady((params) => {
      if (params.savedState) {
        if (params.savedState.slides) slides = params.savedState.slides;
        if (params.savedState.theme) theme = { ...theme, ...params.savedState.theme };
        if (params.savedState.currentIndex) currentIndex = params.savedState.currentIndex;
      }
      render();
      sendState();
    });
  </script>
</body>
</html>
