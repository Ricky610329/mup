<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Markdown</title>

  <script type="application/mup-manifest">
  {
    "name": "Markdown",
    "description": "A markdown renderer. Load a .md file from workspace or have the LLM write markdown content. Supports headings, lists, code blocks, tables, links, and images. Click refresh to reload from source.",
    "grid": { "minWidth": 1, "minHeight": 1 },
    "functions": [
      {
        "name": "render",
        "description": "Render markdown text in the viewer",
        "inputSchema": {
          "type": "object",
          "properties": {
            "markdown": { "type": "string", "description": "Markdown text to render" },
            "title": { "type": "string", "description": "Optional title shown in header" }
          },
          "required": ["markdown"]
        }
      },
      {
        "name": "loadFile",
        "description": "Load and render a markdown file from workspace. User must have a workspace folder open.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "path": { "type": "string", "description": "File path relative to workspace" }
          },
          "required": ["path"]
        }
      },
      {
        "name": "getContent",
        "description": "Get the current raw markdown text",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "clear",
        "description": "Clear the viewer",
        "inputSchema": { "type": "object", "properties": {} }
      }
    ]
  }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent; height: 100vh;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased; overflow: hidden;
    }
    .toolbar {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 8px; border-bottom: 1px solid rgba(60,60,67,0.1);
      flex-shrink: 0; font-size: 11px; color: rgba(60,60,67,0.5);
    }
    .toolbar-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .toolbar-btn {
      border: none; background: rgba(60,60,67,0.06); color: rgba(60,60,67,0.6);
      border-radius: 4px; padding: 3px 8px; font-size: 10px;
      cursor: pointer; font-family: inherit;
    }
    .toolbar-btn:hover { background: rgba(60,60,67,0.12); }
    .viewer {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      font-size: 14px; line-height: 1.6; color: #1a1a1a;
    }
    .viewer h1 { font-size: 22px; font-weight: 700; margin: 16px 0 8px; border-bottom: 1px solid rgba(60,60,67,0.1); padding-bottom: 6px; }
    .viewer h2 { font-size: 18px; font-weight: 600; margin: 14px 0 6px; }
    .viewer h3 { font-size: 15px; font-weight: 600; margin: 12px 0 4px; }
    .viewer p { margin: 6px 0; }
    .viewer ul, .viewer ol { padding-left: 20px; margin: 6px 0; }
    .viewer li { margin: 2px 0; }
    .viewer code {
      background: rgba(60,60,67,0.06); padding: 1px 5px;
      border-radius: 4px; font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }
    .viewer pre {
      background: rgba(60,60,67,0.04); padding: 10px 12px;
      border-radius: 8px; overflow-x: auto; margin: 8px 0;
    }
    .viewer pre code { background: none; padding: 0; font-size: 12px; }
    .viewer blockquote {
      border-left: 3px solid rgba(60,60,67,0.2); padding-left: 12px;
      margin: 8px 0; color: rgba(60,60,67,0.6);
    }
    .viewer table { border-collapse: collapse; margin: 8px 0; width: 100%; font-size: 13px; }
    .viewer th, .viewer td { border: 1px solid rgba(60,60,67,0.12); padding: 5px 8px; text-align: left; }
    .viewer th { background: rgba(60,60,67,0.04); font-weight: 600; }
    .viewer a { color: #007aff; text-decoration: none; }
    .viewer a:hover { text-decoration: underline; }
    .viewer img { max-width: 100%; border-radius: 6px; margin: 6px 0; }
    .viewer hr { border: none; border-top: 1px solid rgba(60,60,67,0.1); margin: 12px 0; }
    .empty {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: rgba(60,60,67,0.3); font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title" id="title">Markdown</span>
    <button class="toolbar-btn" id="refreshBtn">↻ Refresh</button>
    <button class="toolbar-btn" id="pickBtn">Open .md</button>
  </div>
  <div class="viewer" id="viewer">
    <div class="empty">No content — ask the LLM to write markdown or open a file</div>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const titleEl = document.getElementById('title');
    const refreshBtn = document.getElementById('refreshBtn');
    const pickBtn = document.getElementById('pickBtn');

    let currentMarkdown = '';
    let currentTitle = 'Markdown';
    let fileHandle = null; // FileSystemFileHandle for refresh

    function renderMd(md, title) {
      currentMarkdown = md;
      if (title) { currentTitle = title; titleEl.textContent = title; }
      viewer.innerHTML = marked.parse(md);
      // Open links in new tab
      viewer.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
      const lines = md.split('\n').length;
      mup.updateState(
        `${currentTitle}: ${lines} lines`,
        { title: currentTitle, markdown: md, lineCount: lines }
      );
    }

    // Pick a .md file from disk
    pickBtn.addEventListener('click', async () => {
      try {
        const [handle] = await window.showOpenFilePicker({
          types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md', '.markdown', '.txt'] } }],
        });
        fileHandle = handle;
        const file = await handle.getFile();
        const text = await file.text();
        renderMd(text, file.name);
      } catch (e) { /* cancelled */ }
    });

    // Refresh from file
    refreshBtn.addEventListener('click', async () => {
      if (fileHandle) {
        try {
          const file = await fileHandle.getFile();
          const text = await file.text();
          renderMd(text, file.name);
        } catch (e) {
          mup.notifyInteraction('error', 'Failed to refresh: ' + e.message);
        }
      } else {
        mup.notifyInteraction('refresh', 'User clicked refresh (no file loaded)');
      }
    });

    // === MUP Functions ===

    mup.registerFunction('render', async (params) => {
      renderMd(params.markdown, params.title);
      return {
        content: [{ type: 'text', text: `Rendered ${params.markdown.split('\n').length} lines of markdown` }],
        isError: false
      };
    });

    mup.registerFunction('loadFile', async (params) => {
      try {
        const result = await mup.system('workspace.read', { path: params.path, limit: 10000 });
        renderMd(result.content, params.path);
        return {
          content: [{ type: 'text', text: `Loaded ${params.path} (${result.totalLines} lines)` }],
          isError: false
        };
      } catch (err) {
        return { content: [{ type: 'text', text: `Failed to load: ${err.message}` }], isError: true };
      }
    });

    mup.registerFunction('getContent', async () => {
      return {
        content: [
          { type: 'text', text: currentMarkdown || 'No content loaded' },
          { type: 'data', data: { markdown: currentMarkdown, title: currentTitle } }
        ],
        isError: false
      };
    });

    mup.registerFunction('clear', async () => {
      currentMarkdown = '';
      currentTitle = 'Markdown';
      titleEl.textContent = 'Markdown';
      fileHandle = null;
      viewer.innerHTML = '<div class="empty">No content — ask the LLM to write markdown or open a file</div>';
      mup.updateState('Empty', { title: null, markdown: '' });
      return { content: [{ type: 'text', text: 'Cleared' }], isError: false };
    });

    mup.onReady((params) => {
      if (params.savedState && params.savedState.markdown) {
        renderMd(params.savedState.markdown, params.savedState.title);
      } else {
        mup.updateState('Empty', { title: null, markdown: '' });
      }
    });
  </script>
</body>
</html>
