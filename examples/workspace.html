<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workspace</title>

  <script type="application/mup-manifest">
  {
    "name": "Workspace",
    "description": "A file workspace for the AI agent. LLM can save, read, and manage files here. Use workspace for data analysis workflows: download data → save to workspace → read and process → visualize. Files persist across sessions. Reading is smart: use info() first to see file size/preview, then read() with offset/limit for large files.",
    "grid": { "minWidth": 1, "minHeight": 1 },
    "functions": [
      {
        "name": "list",
        "description": "List files in workspace. Returns name, type, size, extension for each entry.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "path": { "type": "string", "description": "Subfolder path. Empty for root." }
          }
        }
      },
      {
        "name": "info",
        "description": "Get file metadata without reading full content. For text/CSV files: returns totalLines, preview (first 5 lines), and column names for CSV. Use this before read() to understand the file.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "path": { "type": "string", "description": "File path relative to workspace" }
          },
          "required": ["path"]
        }
      },
      {
        "name": "read",
        "description": "Read file content with pagination. Default: first 100 lines. Use offset/limit to read specific portions. Check hasMore to know if there is more content.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "path": { "type": "string" },
            "offset": { "type": "number", "description": "Start line (0-based). Default: 0" },
            "limit": { "type": "number", "description": "Number of lines to read. Default: 100" }
          },
          "required": ["path"]
        }
      },
      {
        "name": "write",
        "description": "Write content to a file. Creates parent directories automatically. Overwrites if exists.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "path": { "type": "string" },
            "content": { "type": "string" }
          },
          "required": ["path", "content"]
        }
      },
      {
        "name": "download",
        "description": "Download a URL and save to workspace. Text content is saved as-is, binary files are saved directly.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "url": { "type": "string", "description": "URL to download" },
            "savePath": { "type": "string", "description": "Save as this filename in workspace. Auto-detected from URL if omitted." }
          },
          "required": ["url"]
        }
      },
      {
        "name": "delete",
        "description": "Delete a file or folder from workspace",
        "inputSchema": {
          "type": "object",
          "properties": {
            "path": { "type": "string" }
          },
          "required": ["path"]
        }
      }
    ]
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    .header {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 8px;
      border-bottom: 1px solid rgba(60,60,67,0.1);
      flex-shrink: 0;
    }
    .header-title { font-size: 11px; font-weight: 600; color: rgba(0,0,0,0.5); flex: 1; }
    .refresh-btn {
      border: none; background: none; cursor: pointer;
      color: rgba(60,60,67,0.4); font-size: 14px; padding: 2px 4px;
    }
    .refresh-btn:hover { color: rgba(60,60,67,0.8); }
    .breadcrumb {
      display: flex; gap: 2px; padding: 2px 8px;
      font-size: 10px; color: rgba(60,60,67,0.4);
      flex-shrink: 0;
    }
    .breadcrumb span { cursor: pointer; }
    .breadcrumb span:hover { color: #007aff; }
    .file-list {
      flex: 1; overflow-y: auto; padding: 2px 0;
    }
    .file-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px; font-size: 12px;
      cursor: default; transition: background 0.1s;
    }
    .file-item:hover { background: rgba(60,60,67,0.04); }
    .file-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
    .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-size { font-size: 10px; color: rgba(60,60,67,0.4); flex-shrink: 0; }
    .file-item.folder { cursor: pointer; }
    .file-item.folder .file-name { font-weight: 500; }
    .empty {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: rgba(60,60,67,0.3); font-size: 12px;
      text-align: center; padding: 20px;
    }
    .status {
      padding: 4px 8px; font-size: 10px;
      color: rgba(60,60,67,0.4); border-top: 1px solid rgba(60,60,67,0.08);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">Workspace</span>
    <button class="refresh-btn" id="refreshBtn" title="Refresh">↻</button>
  </div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="file-list" id="fileList">
    <div class="empty" id="empty">Workspace is empty.<br>Ask the LLM to save files here.</div>
  </div>
  <div class="status" id="status"></div>

  <script>
    const fileListEl = document.getElementById('fileList');
    const emptyEl = document.getElementById('empty');
    const breadcrumbEl = document.getElementById('breadcrumb');
    const statusEl = document.getElementById('status');
    let currentPath = '';
    let currentFiles = [];
    let supported = true;

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function fileIcon(entry) {
      if (entry.type === 'folder') return '📁';
      const ext = (entry.extension || '').toLowerCase();
      if (['csv', 'tsv'].includes(ext)) return '📊';
      if (['json'].includes(ext)) return '📋';
      if (['txt', 'md', 'log'].includes(ext)) return '📄';
      if (['html', 'xml'].includes(ext)) return '🌐';
      if (['js', 'ts', 'py'].includes(ext)) return '💻';
      if (['jpg', 'jpeg', 'png', 'gif', 'svg'].includes(ext)) return '🖼️';
      return '📄';
    }

    async function refresh(navPath) {
      if (navPath !== undefined) currentPath = navPath;
      try {
        const result = await mup.system('workspace.list', { path: currentPath || undefined });
        currentFiles = result.files || [];
        renderFiles();
        const total = currentFiles.length;
        const totalSize = currentFiles.reduce((s, f) => s + (f.size || 0), 0);
        statusEl.textContent = `${total} item${total !== 1 ? 's' : ''} · ${formatSize(totalSize)}`;
        mup.updateState(
          currentFiles.length > 0 ? `${currentFiles.length} file(s) in workspace` : 'Workspace empty',
          { fileCount: currentFiles.length, path: currentPath }
        );
      } catch (err) {
        if (err.message?.includes('Unknown system action')) {
          supported = false;
          emptyEl.textContent = 'Workspace not supported by this host.';
          emptyEl.style.display = '';
        } else {
          statusEl.textContent = 'Error: ' + err.message;
        }
      }
    }

    function renderFiles() {
      fileListEl.innerHTML = '';

      // Breadcrumb
      const parts = currentPath ? currentPath.split('/').filter(Boolean) : [];
      breadcrumbEl.innerHTML = '';
      const root = document.createElement('span');
      root.textContent = '~';
      root.onclick = () => refresh('');
      breadcrumbEl.appendChild(root);
      let accumulated = '';
      for (const p of parts) {
        breadcrumbEl.appendChild(document.createTextNode(' / '));
        accumulated += (accumulated ? '/' : '') + p;
        const link = document.createElement('span');
        link.textContent = p;
        const navTo = accumulated;
        link.onclick = () => refresh(navTo);
        breadcrumbEl.appendChild(link);
      }

      if (currentFiles.length === 0) {
        emptyEl.style.display = '';
        emptyEl.textContent = 'Empty folder';
        fileListEl.appendChild(emptyEl);
        return;
      }
      emptyEl.style.display = 'none';

      // Back button if in subfolder
      if (currentPath) {
        const back = document.createElement('div');
        back.className = 'file-item folder';
        back.innerHTML = '<span class="file-icon">⬆️</span><span class="file-name">..</span>';
        back.onclick = () => {
          const parent = currentPath.split('/').slice(0, -1).join('/');
          refresh(parent);
        };
        fileListEl.appendChild(back);
      }

      // Sort: folders first, then files
      const sorted = [...currentFiles].sort((a, b) => {
        if (a.type !== b.type) return a.type === 'folder' ? -1 : 1;
        return a.name.localeCompare(b.name);
      });

      for (const f of sorted) {
        const item = document.createElement('div');
        item.className = 'file-item' + (f.type === 'folder' ? ' folder' : '');
        item.innerHTML = `<span class="file-icon">${fileIcon(f)}</span><span class="file-name">${f.name}</span><span class="file-size">${f.type === 'folder' ? '' : formatSize(f.size)}</span>`;
        if (f.type === 'folder') {
          item.onclick = () => refresh(currentPath ? currentPath + '/' + f.name : f.name);
        }
        fileListEl.appendChild(item);
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', () => refresh());

    // === MUP Functions ===

    mup.registerFunction('list', async (params) => {
      const result = await mup.system('workspace.list', { path: params.path });
      if (params.path === currentPath || !params.path) refresh();
      const files = result.files || [];
      const summary = files.map(f => `${f.type === 'folder' ? '📁' : '📄'} ${f.name}${f.size ? ' (' + formatSize(f.size) + ')' : ''}`).join('\n');
      return {
        content: [
          { type: 'text', text: files.length > 0 ? `Workspace (${files.length} items):\n${summary}` : 'Workspace is empty' },
          { type: 'data', data: result }
        ],
        isError: false
      };
    });

    mup.registerFunction('info', async (params) => {
      const result = await mup.system('workspace.info', { path: params.path });
      if (!result.exists) {
        return { content: [{ type: 'text', text: `Not found: ${params.path}` }], isError: true };
      }
      let summary = `${params.path}: ${result.type}, ${formatSize(result.size)}`;
      if (result.totalLines) summary += `, ${result.totalLines} lines`;
      if (result.columns) summary += `\nColumns: ${result.columns.join(', ')}`;
      if (result.preview) summary += `\nPreview:\n${result.preview}`;
      return {
        content: [{ type: 'text', text: summary }, { type: 'data', data: result }],
        isError: false
      };
    });

    mup.registerFunction('read', async (params) => {
      const result = await mup.system('workspace.read', {
        path: params.path, offset: params.offset, limit: params.limit
      });
      let summary = `${params.path} [lines ${result.offset}-${result.offset + result.limit}/${result.totalLines}]`;
      if (result.hasMore) summary += ' (has more)';
      return {
        content: [{ type: 'text', text: summary + '\n' + result.content }, { type: 'data', data: result }],
        isError: false
      };
    });

    mup.registerFunction('write', async (params) => {
      const result = await mup.system('workspace.write', { path: params.path, content: params.content });
      refresh();
      return {
        content: [{ type: 'text', text: `Written ${formatSize(result.size)} to ${params.path}` }],
        isError: false
      };
    });

    mup.registerFunction('download', async (params) => {
      const result = await mup.system('fetchUrl', { url: params.url });
      let fileName = params.savePath;
      if (!fileName) {
        // Derive from URL or use result
        if (result.saved) {
          fileName = result.saved;
        } else {
          try { fileName = new URL(params.url).pathname.split('/').pop() || 'download.txt'; } catch { fileName = 'download.txt'; }
        }
      }
      if (result.content && !result.workspace) {
        // Text content — save to workspace
        await mup.system('workspace.write', { path: fileName, content: result.content });
      }
      refresh();
      return {
        content: [{ type: 'text', text: `Downloaded ${params.url} → ${fileName} (${formatSize(result.size)})` }],
        isError: false
      };
    });

    mup.registerFunction('delete', async (params) => {
      await mup.system('workspace.delete', { path: params.path });
      refresh();
      return {
        content: [{ type: 'text', text: `Deleted ${params.path}` }],
        isError: false
      };
    });

    mup.onReady((params) => {
      refresh('');
    });
  </script>
</body>
</html>
