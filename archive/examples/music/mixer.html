<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mixer</title>
  <script type="application/mup-manifest">
  {
    "name": "Mixer",
    "description": "A mixing console for the music toolkit. The LLM collects patterns from Keys, Chords, Bass, Synth, and Strings using their getPattern functions, then loads them here with setTrack. Controls: per-track volume, mute, solo. Master BPM and volume. Hit play to hear all tracks together in sync.",
    "grid": { "minWidth": 2, "minHeight": 3 },
    "functions": [
      { "name": "setTrack", "description": "Load a track from another instrument.", "inputSchema": { "type": "object", "properties": { "track": { "type": "string", "description": "keys, chords, bass, synth, strings, drums" }, "data": { "type": "object", "description": "Pattern data from getPattern" } }, "required": ["track", "data"] } },
      { "name": "setTrackVolume", "description": "Set volume for a track.", "inputSchema": { "type": "object", "properties": { "track": { "type": "string" }, "volume": { "type": "number" } }, "required": ["track", "volume"] } },
      { "name": "muteTrack", "description": "Toggle mute.", "inputSchema": { "type": "object", "properties": { "track": { "type": "string" } }, "required": ["track"] } },
      { "name": "soloTrack", "description": "Solo a track.", "inputSchema": { "type": "object", "properties": { "track": { "type": "string" } }, "required": ["track"] } },
      { "name": "setBPM", "description": "Set master BPM.", "inputSchema": { "type": "object", "properties": { "bpm": { "type": "integer" } }, "required": ["bpm"] } },
      { "name": "setMasterVolume", "description": "Set master volume.", "inputSchema": { "type": "object", "properties": { "volume": { "type": "number" } }, "required": ["volume"] } },
      { "name": "play", "description": "Play all tracks in sync.", "inputSchema": { "type": "object", "properties": {} } },
      { "name": "stop", "description": "Stop all.", "inputSchema": { "type": "object", "properties": {} } },
      { "name": "getState", "description": "Get mixer state.", "inputSchema": { "type": "object", "properties": {} } }
    ]
  }
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,sans-serif;background:#111;color:#aaa;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    .bar{display:flex;align-items:center;gap:6px;padding:5px 10px;background:#0a0a0a;border-bottom:1px solid#222;flex-shrink:0}
    .bar button{padding:4px 12px;border:1px solid#333;border-radius:4px;background:#1a1a1a;color:#ccc;cursor:pointer;font-size:12px;font-family:inherit;display:flex;align-items:center;gap:4px}
    .bar button:hover{background:#222} .bar button.on{background:#2a4a2a;border-color:#4a8a4a;color:#8c8}
    .bar .lbl{font-size:10px;color:#666} .bar .sep{width:1px;height:16px;background:#333} .bar .spacer{flex:1}
    .bar input[type=number]{width:44px;padding:2px 4px;border:1px solid#333;border-radius:3px;background:#1a1a1a;color:#ccc;font-size:11px;font-family:inherit;text-align:center}
    .bar input[type=range]{width:60px;accent-color:#5a5;height:16px}
    .tracks{flex:1;overflow-y:auto;padding:4px 6px;display:flex;flex-direction:column;gap:2px}
    .trk{display:flex;align-items:center;gap:5px;padding:5px 6px;border:1px solid#1e1e1e;border-radius:5px;background:#161616;min-height:36px}
    .trk.loaded{border-color:#2a2a2a}
    .trk.muted{opacity:.35}
    .trk .nm{width:48px;font-size:11px;font-weight:600;text-transform:capitalize;flex-shrink:0}
    .trk .viz{flex:1;display:flex;gap:1px;height:20px;align-items:flex-end;min-width:0}
    .trk .viz .b{flex:1;background:#262626;border-radius:1px;transition:height .1s;min-width:1px}
    .trk .viz .b.on{background:#4a4}
    .trk .viz .b.cur{background:#8f8}
    .trk .vol{display:flex;align-items:center;gap:2px;flex-shrink:0}
    .trk .vol input{width:40px;accent-color:#5a5;height:14px}
    .trk .vol span{font-size:9px;color:#555;width:22px;text-align:right}
    .trk .btns{display:flex;gap:2px;flex-shrink:0}
    .trk .sm{width:20px;height:20px;border:1px solid#333;border-radius:3px;background:#1a1a1a;color:#666;cursor:pointer;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:inherit}
    .trk .sm:hover{background:#222}
    .trk .sm.m-on{background:#663333;color:#f88;border-color:#884444}
    .trk .sm.s-on{background:#336633;color:#8f8;border-color:#448844}
  </style>
</head>
<body>
  <div class="bar">
    <button id="playBtn">&#9654; Play</button><button id="stopBtn">&#9632; Stop</button><div class="sep"></div>
    <span class="lbl">BPM</span><input type="number" id="bpm" value="120" min="40" max="240"><div class="sep"></div>
    <span class="lbl">Master</span><input type="range" id="masterVol" min="0" max="1" step="0.01" value="0.8">
  </div>
  <div class="tracks" id="tracks"></div>

  <script>
    const TRK=['keys','chords','bass','synth','strings','drums'];
    const TCOL={keys:'#6688cc',chords:'#cc9944',bass:'#cc4444',synth:'#44aacc',strings:'#8866aa',drums:'#888'};
    const ctx=new AudioContext(),master=ctx.createGain();master.gain.value=.8;master.connect(ctx.destination);
    const N=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const freq=m=>440*Math.pow(2,(m-69)/12);
    function midiOf(name){const m=name.match(/^([A-G]#?)(\d)$/);return m?N.indexOf(m[1])+(parseInt(m[2])+1)*12:-1}
    const CHORDS={'C':[48,52,55,60,64],'Cm':[48,51,55,60,63],'D':[50,54,57,62],'Dm':[50,53,57,62],'E':[40,47,52,56,59,64],'Em':[40,47,52,55,59,64],'F':[41,48,53,57,60],'G':[43,47,50,55,59,67],'A':[45,52,57,61,64],'Am':[45,52,57,60,64],'B':[47,54,59,63,66],'Bm':[47,54,59,62,66],'C7':[48,52,55,58,64],'D7':[50,54,57,60],'E7':[40,47,50,56,59,64],'G7':[43,47,50,55,59,65],'A7':[45,52,55,61,64],'Cmaj':[48,52,55,60],'Dmin':[50,53,57,62],'Emin':[52,55,59,64],'Fmaj':[53,57,60,65],'Gmaj':[55,59,62,67],'Amin':[45,48,52,57],'Bdim':[47,50,53,59],'Cmaj7':[48,52,55,59],'Amin7':[45,48,52,55],'Fmaj7':[53,57,60,64],'Gmaj7':[55,59,62,66],'Dmin7':[50,53,57,60]};

    let tracks={};TRK.forEach(t=>{tracks[t]={data:null,volume:.7,muted:false,solo:false}});
    let bpm=120,playing=false,stepIdx=-1,timer=null;
    const trackEls={},tracksEl=document.getElementById('tracks');

    // Build tracks
    TRK.forEach(t=>{
      const el=document.createElement('div');el.className='trk';
      el.innerHTML=`<div class="nm" style="color:${TCOL[t]}">${t}</div><div class="viz"></div><div class="vol"><input type="range" min="0" max="1" step="0.01" value="0.7"><span>70</span></div><div class="btns"><button class="sm bm">M</button><button class="sm bs">S</button></div>`;
      const vI=el.querySelector('.vol input'),vS=el.querySelector('.vol span');
      vI.addEventListener('input',()=>{tracks[t].volume=+vI.value;vS.textContent=Math.round(vI.value*100)});
      el.querySelector('.bm').addEventListener('click',e=>{tracks[t].muted=!tracks[t].muted;e.target.classList.toggle('m-on',tracks[t].muted);el.classList.toggle('muted',tracks[t].muted);broadcastState()});
      el.querySelector('.bs').addEventListener('click',e=>{tracks[t].solo=!tracks[t].solo;e.target.classList.toggle('s-on',tracks[t].solo);broadcastState()});
      tracksEl.appendChild(el);trackEls[t]=el;
    });

    function renderTrack(t){
      const el=trackEls[t],d=tracks[t].data;
      if(!d){el.classList.remove('loaded');el.querySelector('.viz').innerHTML='';return}
      el.classList.add('loaded');
      const viz=el.querySelector('.viz');viz.innerHTML='';
      let cnt=0;
      if(t==='drums'&&d.pattern&&typeof d.pattern==='object'&&!Array.isArray(d.pattern))cnt=16;
      else if(d.pattern&&Array.isArray(d.pattern))cnt=d.pattern.length;
      else if(d.slots)cnt=d.slots.length;
      else if(d.bars)cnt=d.bars.length;
      for(let i=0;i<cnt;i++){
        const b=document.createElement('div');b.className='b';
        let has=false;
        if(t==='drums')has=d.pattern&&Object.values(d.pattern).some(steps=>Array.isArray(steps)&&steps[i]);
        else if(t==='keys')has=d.pattern[i]&&d.pattern[i].length>0;
        else if(t==='chords')has=d.slots&&d.slots[i]&&d.slots[i].chord;
        else if(t==='strings')has=d.bars&&d.bars[i]&&d.bars[i].chord;
        else has=d.pattern&&d.pattern[i];
        b.style.height=has?'100%':'25%';if(has)b.classList.add('on');
        viz.appendChild(b);
      }
    }

    // Audio engines (same as before but compact)
    function synthNote(type,f,dest,dur,p){const now=ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=f;o.connect(g);g.connect(dest);g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.2,now+(p.attack||.01));g.gain.linearRampToValueAtTime(.2*(p.sustain??.5),now+(p.attack||.01)+(p.decay||.1));g.gain.setValueAtTime(.2*(p.sustain??.5),now+dur);g.gain.linearRampToValueAtTime(.001,now+dur+(p.release||.1));o.start(now);o.stop(now+dur+(p.release||.1))}
    function playDrum(type,dest){const now=ctx.currentTime;if(type==='kick'){const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(150,now);o.frequency.exponentialRampToValueAtTime(40,now+.1);o.connect(g);g.connect(dest);g.gain.setValueAtTime(.8,now);g.gain.exponentialRampToValueAtTime(.001,now+.3);o.start(now);o.stop(now+.3)}else{const n=ctx.createBufferSource(),buf=ctx.createBuffer(1,ctx.sampleRate*(type==='hihat'?.05:.1),ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;n.buffer=buf;const g=ctx.createGain(),f=ctx.createBiquadFilter();f.type=type==='hihat'?'highpass':type==='clap'?'bandpass':'highpass';f.frequency.value=type==='hihat'?5000:type==='clap'?2000:1000;n.connect(f);f.connect(g);g.connect(dest);g.gain.setValueAtTime(type==='snare'?.5:.3,now);g.gain.exponentialRampToValueAtTime(.001,now+(type==='hihat'?.06:.12));n.start(now)}}

    function playStep(tn,sd,dur){
      const t=tracks[tn];if(!t.data||!sd)return;const tg=ctx.createGain();tg.gain.value=t.volume;tg.connect(master);const p=t.data.params||{};
      if(tn==='keys'){if(!sd.length)return;sd.forEach(n=>{const m=midiOf(n);if(m>=0)synthNote(p.waveform||'triangle',freq(m),tg,dur*.8,p)})}
      else if(tn==='bass'){const m=midiOf(sd);if(m>=0){const now=ctx.currentTime,o=ctx.createOscillator(),f=ctx.createBiquadFilter(),g=ctx.createGain();o.type=p.waveform||'sawtooth';o.frequency.value=freq(m);f.type='lowpass';f.frequency.value=p.filterFreq||400;f.Q.value=p.filterQ||4;o.connect(f);f.connect(g);g.connect(tg);g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.3,now+.01);g.gain.exponentialRampToValueAtTime(.001,now+(p.decay||.3));o.start(now);o.stop(now+(p.decay||.3))}}
      else if(tn==='synth'){const m=midiOf(sd);if(m>=0){const now=ctx.currentTime,o1=ctx.createOscillator(),o2=ctx.createOscillator(),fl=ctx.createBiquadFilter(),g=ctx.createGain(),mx=ctx.createGain();o1.type=p.waveform||'sawtooth';o1.frequency.value=freq(m);o2.type=p.waveform||'sawtooth';o2.frequency.value=freq(m);o2.detune.value=p.detune||0;fl.type='lowpass';fl.frequency.value=p.filterFreq||3000;fl.Q.value=p.filterQ||2;mx.gain.value=.5;o1.connect(fl);o2.connect(mx);mx.connect(fl);fl.connect(g);g.connect(tg);g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.2,now+(p.attack||.02));g.gain.linearRampToValueAtTime(.2*(p.sustain??.5),now+(p.attack||.02)+(p.decay||.15));g.gain.setValueAtTime(.2*(p.sustain??.5),now+dur*.8);g.gain.linearRampToValueAtTime(.001,now+dur*.8+(p.release||.2));o1.start(now);o2.start(now);o1.stop(now+dur+(p.release||.2));o2.stop(now+dur+(p.release||.2))}}
      else if(tn==='drums'){for(const[inst,on]of Object.entries(sd))if(on)playDrum(inst,tg)}
    }

    function playChordStep(tn,cn,dur){
      const t=tracks[tn];if(!cn||!t.data)return;const notes=CHORDS[cn];if(!notes)return;const tg=ctx.createGain();tg.gain.value=t.volume;tg.connect(master);const p=t.data.params||{};
      if(tn==='chords'){const now=ctx.currentTime;notes.forEach((midi,j)=>{const delay=j*((p.strumSpeed||30)/1000),o=ctx.createOscillator(),f=ctx.createBiquadFilter(),g=ctx.createGain();o.type='triangle';o.frequency.value=freq(midi);f.type='lowpass';f.frequency.value=p.brightness||2000;f.Q.value=1;o.connect(f);f.connect(g);g.connect(tg);const tt=now+delay;g.gain.setValueAtTime(0,tt);g.gain.linearRampToValueAtTime(.1,tt+.005);g.gain.exponentialRampToValueAtTime(.001,tt+(p.decay||1.2));o.start(tt);o.stop(tt+(p.decay||1.2))})}
      else if(tn==='strings'){const det=p.detune||4,pg=ctx.createGain();pg.gain.setValueAtTime(0,ctx.currentTime);pg.gain.linearRampToValueAtTime(.08,ctx.currentTime+(p.attack||.6));pg.connect(tg);notes.forEach(midi=>{[-det,0,det].forEach(d=>{const o=ctx.createOscillator(),f=ctx.createBiquadFilter();o.type='sawtooth';o.frequency.value=freq(midi);o.detune.value=d;f.type='lowpass';f.frequency.value=p.brightness||1200;f.Q.value=.5;o.connect(f);f.connect(pg);o.start();setTimeout(()=>{try{o.stop()}catch{}},((dur||1)+(p.release||.8))*1000)})});pg.gain.setValueAtTime(.08,ctx.currentTime+(dur||1));pg.gain.linearRampToValueAtTime(.001,ctx.currentTime+(dur||1)+(p.release||.8))}
    }

    function startPlay(){if(playing)return;ctx.resume();playing=true;stepIdx=-1;document.getElementById('playBtn').classList.add('on');tick()}
    function stopPlay(){playing=false;clearTimeout(timer);document.getElementById('playBtn').classList.remove('on');TRK.forEach(t=>{trackEls[t].querySelectorAll('.viz .b').forEach(b=>b.classList.remove('cur'))});stepIdx=-1}
    function tick(){
      if(!playing)return;stepIdx=(stepIdx+1)%16;const dur=60/bpm/4;const hasSolo=TRK.some(t=>tracks[t].solo);
      TRK.forEach(t=>{
        const tr=tracks[t];if(!tr.data)return;if(tr.muted)return;if(hasSolo&&!tr.solo)return;
        const bars=trackEls[t].querySelectorAll('.viz .b');bars.forEach(b=>b.classList.remove('cur'));
        if(t==='keys'||t==='bass'||t==='synth'||t==='drums'){if(bars[stepIdx])bars[stepIdx].classList.add('cur');const p=tr.data.pattern;if(t==='drums'){if(p){const ds={};for(const[inst,steps]of Object.entries(p))if(Array.isArray(steps)&&steps[stepIdx])ds[inst]=true;playStep(t,ds,dur)}}else if(p&&p[stepIdx]){playStep(t,p[stepIdx],dur)}}
        else if(t==='chords'){const slots=tr.data.slots||[];let acc=0,si=-1;for(let s=0;s<slots.length;s++){const b=(slots[s].beats||4)*4;if(stepIdx>=acc&&stepIdx<acc+b){si=s;break}acc+=b}if(si>=0&&bars[si])bars[si].classList.add('cur');if(si>=0&&stepIdx===acc)playChordStep(t,slots[si].chord,dur*(slots[si].beats||4)*4)}
        else if(t==='strings'){const bd=tr.data.bars||[];const spb=Math.floor(16/Math.max(bd.length,1));const bi=Math.floor(stepIdx/spb);if(bi<bd.length&&bars[bi])bars[bi].classList.add('cur');if(bi<bd.length&&stepIdx%spb===0)playChordStep(t,bd[bi].chord,spb*dur)}
      });
      timer=setTimeout(tick,dur*1000);
    }

    document.getElementById('playBtn').addEventListener('click',startPlay);
    document.getElementById('stopBtn').addEventListener('click',stopPlay);
    document.getElementById('bpm').addEventListener('change',e=>{bpm=+e.target.value;broadcastState()});
    document.getElementById('masterVol').addEventListener('input',e=>{master.gain.value=+e.target.value});

    function broadcastState(){const loaded=TRK.filter(t=>tracks[t].data);mup.updateState(`Mixer: ${loaded.length} tracks, ${bpm} BPM${playing?', playing':''}`,{tracks:Object.fromEntries(TRK.map(t=>[t,{loaded:!!tracks[t].data,volume:tracks[t].volume,muted:tracks[t].muted,solo:tracks[t].solo}])),bpm,playing})}

    mup.registerFunction('setTrack',({track,data})=>{if(!tracks[track])return{content:[{type:'text',text:`Unknown: ${track}`}],isError:true};tracks[track].data=data;renderTrack(track);broadcastState();return{content:[{type:'text',text:`Loaded ${track}`}],isError:false}});
    mup.registerFunction('setTrackVolume',({track,volume})=>{if(!tracks[track])return{content:[{type:'text',text:'Unknown'}],isError:true};tracks[track].volume=Math.max(0,Math.min(1,volume));const el=trackEls[track];el.querySelector('.vol input').value=tracks[track].volume;el.querySelector('.vol span').textContent=Math.round(tracks[track].volume*100);return{content:[{type:'text',text:`${track}: ${Math.round(volume*100)}%`}],isError:false}});
    mup.registerFunction('muteTrack',({track})=>{if(!tracks[track])return{content:[{type:'text',text:'Unknown'}],isError:true};tracks[track].muted=!tracks[track].muted;trackEls[track].querySelector('.bm').classList.toggle('m-on',tracks[track].muted);trackEls[track].classList.toggle('muted',tracks[track].muted);broadcastState();return{content:[{type:'text',text:`${track} ${tracks[track].muted?'muted':'unmuted'}`}],isError:false}});
    mup.registerFunction('soloTrack',({track})=>{if(!tracks[track])return{content:[{type:'text',text:'Unknown'}],isError:true};tracks[track].solo=!tracks[track].solo;trackEls[track].querySelector('.bs').classList.toggle('s-on',tracks[track].solo);broadcastState();return{content:[{type:'text',text:`${track} solo ${tracks[track].solo?'on':'off'}`}],isError:false}});
    mup.registerFunction('setBPM',({bpm:b})=>{bpm=b;document.getElementById('bpm').value=b;broadcastState();return{content:[{type:'text',text:`BPM: ${b}`}],isError:false}});
    mup.registerFunction('setMasterVolume',({volume})=>{master.gain.value=Math.max(0,Math.min(1,volume));document.getElementById('masterVol').value=master.gain.value;return{content:[{type:'text',text:`Master: ${Math.round(volume*100)}%`}],isError:false}});
    mup.registerFunction('play',()=>{startPlay();return{content:[{type:'text',text:'Playing'}],isError:false}});
    mup.registerFunction('stop',()=>{stopPlay();return{content:[{type:'text',text:'Stopped'}],isError:false}});
    mup.registerFunction('getState',()=>{const loaded=TRK.filter(t=>tracks[t].data);return{content:[{type:'text',text:`Mixer: ${loaded.join(', ')||'empty'}, ${bpm} BPM`},{type:'data',data:{loadedTracks:loaded,bpm,masterVolume:master.gain.value,tracks:Object.fromEntries(TRK.map(t=>[t,{loaded:!!tracks[t].data,volume:tracks[t].volume,muted:tracks[t].muted,solo:tracks[t].solo}]))}}],isError:false}});

    mup.onReady(p=>{if(p?.savedState?.bpm){bpm=p.savedState.bpm;document.getElementById('bpm').value=bpm}TRK.forEach(renderTrack);broadcastState()});
  </script>
</body>
</html>
