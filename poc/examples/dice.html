<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dice Roller</title>

  <script type="application/mup-manifest">
  {
    "name": "Dice Roller",
    "description": "Roll a six-sided die for games, decisions, or random number generation. Displays the die visually with a roll animation.",
    "grid": { "minWidth": 1, "minHeight": 1 },
    "functions": [
      {
        "name": "roll",
        "description": "Roll the die. Returns the result (1-6).",
        "inputSchema": {
          "type": "object",
          "properties": {}
        }
      },
      {
        "name": "getLastRoll",
        "description": "Get the result of the last roll.",
        "inputSchema": {
          "type": "object",
          "properties": {}
        }
      }
    ]
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent;
      color: #1d1d1f;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      gap: 12px;
      user-select: none;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Responsive: row when wide, column when tall */
    @media (min-aspect-ratio: 1/1) {
      body { flex-direction: row; }
    }
    @media (max-aspect-ratio: 1/1) {
      body { flex-direction: column; }
    }

    /* === D6 face with CSS dots === */
    .die {
      width: min(72px, 40vw);
      height: min(72px, 40vw);
      background: rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      padding: 9px;
      gap: 2px;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.15s;
    }
    .die:hover {
      background: rgba(0, 0, 0, 0.07);
    }
    .die.rolling {
      animation: dieShake 0.4s ease-out;
    }
    @keyframes dieShake {
      0%   { transform: rotate(0deg)   scale(0.85); }
      20%  { transform: rotate(14deg)  scale(1.05); }
      40%  { transform: rotate(-10deg) scale(0.95); }
      60%  { transform: rotate(6deg)   scale(1.02); }
      80%  { transform: rotate(-3deg)  scale(1.0); }
      100% { transform: rotate(0deg)   scale(1.0); }
    }

    /* Dot in d6 grid */
    .dot-cell {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .dot-cell .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #1d1d1f;
    }

    /* Right side info group */
    .info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    /* === Result === */
    .result {
      font-size: 13px;
      color: rgba(60, 60, 67, 0.5);
      font-weight: 600;
      min-height: 16px;
      text-align: center;
      letter-spacing: 0.3px;
    }
    .result .value {
      color: #1d1d1f;
      font-weight: 700;
    }

    /* === Roll button === */
    .roll-btn {
      height: 30px;
      padding: 0 16px;
      border: none;
      border-radius: 15px;
      background: rgba(52, 199, 89, 0.1);
      color: #34c759;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .roll-btn:hover {
      background: rgba(52, 199, 89, 0.18);
    }
    .roll-btn:active {
      transform: scale(0.96);
    }

    /* === History === */
    .history {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .history-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(60, 60, 67, 0.25);
      margin-bottom: 2px;
    }
    .history-entry {
      font-size: 11px;
      color: rgba(60, 60, 67, 0.35);
      line-height: 1.4;
    }
    .history-entry:first-of-type {
      color: rgba(60, 60, 67, 0.55);
    }
  </style>
</head>
<body>

  <div id="diceArea"></div>
  <div class="info">
    <div class="result" id="result"></div>
    <button class="roll-btn" id="rollBtn">Roll</button>
    <div class="history" id="history">
      <div class="history-label">History</div>
    </div>
  </div>

  <script>
    // === State ===
    let lastRoll = null;
    const rollHistory = []; // most recent first, max 5

    // === D6 dot positions (3x3 grid: 0=TL,1=TC,2=TR,3=ML,4=MC,5=MR,6=BL,7=BC,8=BR) ===
    const D6_DOTS = {
      1: [4],
      2: [2, 6],
      3: [2, 4, 6],
      4: [0, 2, 6, 8],
      5: [0, 2, 4, 6, 8],
      6: [0, 2, 3, 5, 6, 8]
    };

    // === Render Functions ===

    function createD6Face(value) {
      const die = document.createElement('div');
      die.className = 'die';

      const dots = D6_DOTS[value] || [];
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'dot-cell';
        if (dots.includes(i)) {
          const dot = document.createElement('div');
          dot.className = 'dot';
          cell.appendChild(dot);
        }
        die.appendChild(cell);
      }

      die.addEventListener('click', () => performRoll());
      return die;
    }

    function renderDie(value) {
      const area = document.getElementById('diceArea');
      area.innerHTML = '';

      const dieEl = createD6Face(value);
      dieEl.classList.add('rolling');
      area.appendChild(dieEl);

      setTimeout(() => {
        dieEl.classList.remove('rolling');
      }, 500);
    }

    function renderResult(value) {
      document.getElementById('result').innerHTML = `<span class="value">${value}</span>`;
    }

    function renderHistory() {
      const container = document.getElementById('history');
      container.querySelectorAll('.history-entry').forEach(el => el.remove());

      rollHistory.slice(0, 5).forEach(value => {
        const div = document.createElement('div');
        div.className = 'history-entry';
        div.textContent = value;
        container.appendChild(div);
      });
    }

    function renderPlaceholder() {
      const area = document.getElementById('diceArea');
      area.innerHTML = '';

      const die = document.createElement('div');
      die.className = 'die';
      die.style.opacity = '0.4';
      for (let j = 0; j < 9; j++) {
        const cell = document.createElement('div');
        cell.className = 'dot-cell';
        die.appendChild(cell);
      }
      die.addEventListener('click', () => performRoll());
      area.appendChild(die);

      document.getElementById('result').innerHTML = '';
    }

    // === Roll logic ===

    function performRoll() {
      const value = Math.floor(Math.random() * 6) + 1;

      lastRoll = value;

      rollHistory.unshift(value);
      if (rollHistory.length > 5) rollHistory.pop();

      renderDie(value);
      renderResult(value);
      renderHistory();

      mup.notifyInteraction('roll', `User rolled a ${value}`, { result: value });
      mup.updateState(`Last roll: ${value}`, { lastRoll: value });

      return value;
    }

    // === Event listeners ===

    document.getElementById('rollBtn').addEventListener('click', () => performRoll());

    // === MUP Functions ===

    mup.registerFunction('roll', async () => {
      const value = performRoll();
      return {
        content: [
          { type: 'text', text: `Rolled a ${value}` },
          { type: 'data', data: { result: value } }
        ],
        isError: false
      };
    });

    mup.registerFunction('getLastRoll', async () => {
      if (lastRoll === null) {
        return {
          content: [{ type: 'text', text: 'No die has been rolled yet.' }],
          isError: false
        };
      }
      return {
        content: [
          { type: 'text', text: `Last roll: ${lastRoll}` },
          { type: 'data', data: { result: lastRoll } }
        ],
        isError: false
      };
    });

    // === Init ===
    mup.onReady((params) => {
      renderPlaceholder();
      mup.updateState('Ready to roll', { lastRoll: null });
    });
  </script>
</body>
</html>
