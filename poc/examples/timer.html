<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Timer</title>

  <script type="application/mup-manifest">
  {
    "name": "Timer",
    "description": "A countdown timer with circular progress ring. The LLM can start, pause, and reset the timer, and receives real-time state updates at every transition (started, paused, reset, completed).",
    "grid": { "minWidth": 1, "minHeight": 1 },
    "functions": [
      {
        "name": "start",
        "description": "Start a countdown timer. If seconds is provided, sets a new countdown. If omitted, resumes from current time. Defaults to 60 seconds if no time was previously set.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "seconds": { "type": "integer", "minimum": 1, "maximum": 3600 }
          }
        }
      },
      {
        "name": "pause",
        "description": "Pause the running timer",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "reset",
        "description": "Reset the timer to its initial state",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "getStatus",
        "description": "Get the current timer state including status, remaining seconds, and total duration",
        "inputSchema": { "type": "object", "properties": {} }
      }
    ]
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent;
      color: #1d1d1f;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    .ring-container {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 120px;
      height: 120px;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: rgba(0, 0, 0, 0.08);
      stroke-width: 4;
    }

    .ring-progress {
      fill: none;
      stroke: #34c759;
      stroke-width: 4;
      stroke-linecap: round;
      transition: stroke 0.3s;
    }

    .ring-progress.done {
      stroke: #34c759;
      animation: flash-ring 0.6s ease-in-out infinite alternate;
    }

    @keyframes flash-ring {
      0%   { stroke: #34c759; opacity: 1; }
      100% { stroke: #34c759; opacity: 0.3; }
    }

    .time-display {
      font-size: 36px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
      line-height: 1;
      z-index: 1;
    }

    .done-text {
      font-size: 20px;
      font-weight: 700;
      color: #34c759;
      z-index: 1;
      animation: pulse-text 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse-text {
      0%   { opacity: 1; }
      100% { opacity: 0.5; }
    }

    .buttons {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      height: 32px;
      padding: 0 18px;
      border: none;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s, opacity 0.12s;
      font-family: inherit;
      letter-spacing: 0.2px;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.95); }

    .btn-start {
      background: rgba(52, 199, 89, 0.1);
      color: #34c759;
    }

    .btn-pause {
      background: rgba(255, 149, 0, 0.1);
      color: #ff9500;
    }

    .btn-reset {
      background: rgba(0, 0, 0, 0.04);
      color: rgba(60, 60, 67, 0.4);
    }
    .btn-reset:hover { background: rgba(0, 0, 0, 0.06); }
  </style>
</head>
<body>
  <div class="ring-container">
    <svg class="ring-svg" viewBox="0 0 120 120">
      <circle class="ring-track" cx="60" cy="60" r="54"></circle>
      <circle class="ring-progress" id="ringProgress" cx="60" cy="60" r="54"></circle>
    </svg>
    <div class="time-display" id="timeDisplay">1:00</div>
  </div>
  <div class="buttons">
    <button class="btn btn-start" id="btnStart">Start</button>
    <button class="btn btn-reset" id="btnReset">Reset</button>
  </div>

  <script>
    // State
    const DEFAULT_SECONDS = 60;
    let totalSeconds = DEFAULT_SECONDS;
    let remaining = DEFAULT_SECONDS;  // in seconds (fractional for smooth ring)
    let status = 'idle';              // idle | running | paused | done
    let intervalId = null;
    let lastTick = null;

    // DOM
    const timeDisplay = document.getElementById('timeDisplay');
    const ringProgress = document.getElementById('ringProgress');
    const btnStart = document.getElementById('btnStart');
    const btnReset = document.getElementById('btnReset');

    // Ring geometry
    const RADIUS = 54;
    const CIRCUMFERENCE = 2 * Math.PI * RADIUS;
    ringProgress.style.strokeDasharray = CIRCUMFERENCE;
    ringProgress.style.strokeDashoffset = '0';

    // --- Display helpers ---

    function formatTime(secs) {
      const s = Math.ceil(secs);
      const m = Math.floor(s / 60);
      const sec = s % 60;
      if (m > 0) {
        return m + ':' + String(sec).padStart(2, '0');
      }
      return String(sec);
    }

    function updateDisplay() {
      const isDone = status === 'done';

      // Time text
      if (isDone) {
        timeDisplay.textContent = 'Done!';
        timeDisplay.className = 'done-text';
      } else {
        timeDisplay.textContent = formatTime(remaining);
        timeDisplay.className = 'time-display';
      }

      // Ring progress
      const fraction = totalSeconds > 0 ? remaining / totalSeconds : 0;
      const offset = CIRCUMFERENCE * (1 - fraction);
      ringProgress.style.strokeDashoffset = offset;
      ringProgress.classList.toggle('done', isDone);

      // Button states
      if (status === 'running') {
        btnStart.textContent = 'Pause';
        btnStart.className = 'btn btn-pause';
      } else {
        btnStart.textContent = 'Start';
        btnStart.className = 'btn btn-start';
      }
    }

    // --- Timer engine ---

    function tick() {
      if (status !== 'running') return;
      const now = performance.now();
      const dt = (now - lastTick) / 1000;
      lastTick = now;
      remaining = Math.max(0, remaining - dt);
      updateDisplay();
      if (remaining <= 0) {
        complete();
      }
    }

    function startTimer(seconds) {
      if (seconds !== undefined && seconds !== null) {
        totalSeconds = seconds;
        remaining = seconds;
      } else if (status === 'idle' || status === 'done') {
        // No time set — use default or keep totalSeconds
        remaining = totalSeconds;
      }
      // If paused, just resume from current remaining
      status = 'running';
      lastTick = performance.now();
      clearInterval(intervalId);
      intervalId = setInterval(tick, 50); // 20fps for smooth ring
      updateDisplay();
      sendState('Timer running: ' + Math.ceil(remaining) + 's remaining');
    }

    function pauseTimer() {
      if (status !== 'running') return;
      clearInterval(intervalId);
      intervalId = null;
      status = 'paused';
      updateDisplay();
      sendState('Timer paused at ' + Math.ceil(remaining) + 's');
    }

    function resetTimer() {
      clearInterval(intervalId);
      intervalId = null;
      status = 'idle';
      remaining = totalSeconds;
      updateDisplay();
      sendState('Timer reset to ' + totalSeconds + 's');
    }

    function complete() {
      clearInterval(intervalId);
      intervalId = null;
      remaining = 0;
      status = 'done';
      updateDisplay();
      sendState('Timer completed!');
    }

    function sendState(summary) {
      mup.updateState(summary, {
        status,
        remainingSeconds: Math.ceil(remaining),
        totalSeconds
      });
    }

    // --- User interaction ---

    btnStart.addEventListener('click', () => {
      if (status === 'running') {
        pauseTimer();
        mup.notifyInteraction('pause', 'User paused the timer', {
          remainingSeconds: Math.ceil(remaining)
        });
      } else {
        startTimer();
        mup.notifyInteraction('start', 'User started the timer', {
          totalSeconds,
          remainingSeconds: Math.ceil(remaining)
        });
      }
    });

    btnReset.addEventListener('click', () => {
      resetTimer();
      mup.notifyInteraction('reset', 'User reset the timer', {
        totalSeconds
      });
    });

    // --- MUP functions (LLM-callable) ---

    mup.registerFunction('start', async (params) => {
      const seconds = params.seconds;
      if (seconds !== undefined && (seconds < 1 || seconds > 3600)) {
        return {
          content: [{ type: 'text', text: 'Seconds must be between 1 and 3600' }],
          isError: true,
        };
      }
      startTimer(seconds);
      return {
        content: [{ type: 'text', text: `Timer started: ${Math.ceil(remaining)}s countdown` }],
        isError: false,
      };
    });

    mup.registerFunction('pause', async () => {
      if (status !== 'running') {
        return {
          content: [{ type: 'text', text: 'Timer is not running (status: ' + status + ')' }],
          isError: true,
        };
      }
      pauseTimer();
      return {
        content: [{ type: 'text', text: `Timer paused at ${Math.ceil(remaining)}s` }],
        isError: false,
      };
    });

    mup.registerFunction('reset', async () => {
      resetTimer();
      return {
        content: [{ type: 'text', text: `Timer reset to ${totalSeconds}s` }],
        isError: false,
      };
    });

    mup.registerFunction('getStatus', async () => {
      return {
        content: [
          { type: 'text', text: `Status: ${status}, Remaining: ${Math.ceil(remaining)}s / ${totalSeconds}s` },
          { type: 'data', data: { status, remainingSeconds: Math.ceil(remaining), totalSeconds } }
        ],
        isError: false,
      };
    });

    // --- Init ---
    mup.onReady((params) => {
      updateDisplay();
      sendState('Timer idle: ' + totalSeconds + 's');
    });
  </script>
</body>
</html>
