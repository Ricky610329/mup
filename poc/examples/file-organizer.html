<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>File Organizer</title>

  <script type="application/mup-manifest">
  {
    "name": "File Organizer",
    "description": "Browse and organize local files. User selects a folder, then the LLM can list, move, rename files and create folders. All operations happen locally in the browser via File System Access API.",
    "grid": { "minWidth": 2, "minHeight": 2 },
    "permissions": ["file-system-access"],
    "functions": [
      {
        "name": "getStatus",
        "description": "Get the current folder status — whether a folder is open and its name.",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "listFiles",
        "description": "List all files and subfolders. Returns name, type, size, lastModified.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "path": { "type": "string", "description": "Relative subfolder path. Empty for root." }
          }
        }
      },
      {
        "name": "createFolder",
        "description": "Create a new subfolder.",
        "inputSchema": {
          "type": "object",
          "properties": { "path": { "type": "string" } },
          "required": ["path"]
        }
      },
      {
        "name": "moveFile",
        "description": "Move a file to another location within the folder.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "from": { "type": "string", "description": "Current relative path" },
            "to": { "type": "string", "description": "Target relative path" }
          },
          "required": ["from", "to"]
        }
      },
      {
        "name": "readFileText",
        "description": "Read text content of a file (max 1MB).",
        "inputSchema": {
          "type": "object",
          "properties": { "path": { "type": "string" } },
          "required": ["path"]
        }
      }
    ]
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: rgba(0, 0, 0, 0.85);
      height: 100vh;
      overflow: auto;
      -webkit-font-smoothing: antialiased;
    }
    .landing {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 14px; padding: 24px;
    }
    .landing-icon { font-size: 36px; }
    .landing-title { font-size: 16px; font-weight: 600; }
    .landing-desc {
      font-size: 12px; color: rgba(60,60,67,0.35);
      text-align: center; max-width: 240px; line-height: 1.5;
    }
    .btn {
      background: #007aff; color: white; border: none;
      padding: 10px 22px; border-radius: 10px;
      font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: transform 0.12s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-sm {
      background: rgba(0,0,0,0.04); color: rgba(60,60,67,0.5);
      padding: 4px 10px; border-radius: 6px; font-size: 11px;
      border: none; font-family: inherit; cursor: pointer;
    }

    .browser { display: none; height: 100%; flex-direction: column; }
    .browser.active { display: flex; }

    .browser-header {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 14px; border-bottom: 1px solid rgba(0,0,0,0.04);
      font-size: 12px;
    }
    .breadcrumb { display: flex; align-items: center; gap: 4px; flex: 1; overflow: hidden; }
    .crumb { color: rgba(60,60,67,0.4); font-size: 11px; cursor: pointer; white-space: nowrap; }
    .crumb:hover { color: #007aff; }
    .crumb.current { color: rgba(0,0,0,0.8); cursor: default; }
    .sep { color: rgba(60,60,67,0.15); font-size: 10px; }

    .file-list { flex: 1; overflow-y: auto; padding: 2px 0; }
    .file-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px; font-size: 12px;
      transition: background 0.1s; cursor: default;
    }
    .file-item:hover { background: rgba(0,0,0,0.02); }
    .file-item.dir { cursor: pointer; }
    .file-item.dir:hover { background: rgba(0,122,255,0.06); }
    .file-icon {
      width: 24px; height: 24px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
    }
    .file-icon.d { background: rgba(0,122,255,0.1); }
    .file-icon.f { background: rgba(0,0,0,0.03); }
    .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-size { font-size: 10px; color: rgba(60,60,67,0.2); }

    .status {
      padding: 7px 14px; font-size: 10px;
      color: rgba(60,60,67,0.2); border-top: 1px solid rgba(0,0,0,0.03);
    }
    .empty { display: flex; align-items: center; justify-content: center; flex: 1; color: rgba(60,60,67,0.15); font-size: 12px; }
  </style>
</head>
<body>
  <div class="landing" id="landing">
    <div class="landing-icon">📁</div>
    <div class="landing-title">File Organizer</div>
    <div class="landing-desc">Select a folder to let the AI browse and organize your files. Everything stays local.</div>
    <button class="btn" id="openBtn">Choose Folder</button>
  </div>

  <div class="browser" id="browser">
    <div class="browser-header">
      <div class="breadcrumb" id="breadcrumb"></div>
      <button class="btn-sm" id="changeBtn">Change</button>
    </div>
    <div class="file-list" id="fileList"></div>
    <div class="status" id="status"></div>
  </div>

  <script>
    let rootHandle = null;
    let currentPath = [];

    document.getElementById('openBtn').addEventListener('click', doOpen);
    document.getElementById('changeBtn').addEventListener('click', doOpen);

    async function doOpen() {
      try {
        rootHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        currentPath = [];
        document.getElementById('landing').style.display = 'none';
        document.getElementById('browser').classList.add('active');
        await refresh();
        mup.updateState('Folder opened: ' + rootHandle.name, { folder: rootHandle.name });
        mup.notifyInteraction('folder_opened', 'User opened folder: "' + rootHandle.name + '"', { folder: rootHandle.name });
      } catch (e) { if (e.name !== 'AbortError') console.error(e); }
    }

    async function getDirHandle(parts) {
      let h = rootHandle;
      for (const p of parts) h = await h.getDirectoryHandle(p);
      return h;
    }

    async function listDir(parts) {
      const dir = await getDirHandle(parts);
      const entries = [];
      for await (const [name, handle] of dir.entries()) {
        const e = { name, kind: handle.kind };
        if (handle.kind === 'file') {
          try { const f = await handle.getFile(); e.size = f.size; e.lastModified = f.lastModified; } catch {}
        }
        entries.push(e);
      }
      entries.sort((a, b) => a.kind !== b.kind ? (a.kind === 'directory' ? -1 : 1) : a.name.localeCompare(b.name));
      return entries;
    }

    async function navigateTo(parts) { currentPath = parts; await refresh(); }

    async function refresh() {
      const entries = await listDir(currentPath);

      // Breadcrumb
      const bc = document.getElementById('breadcrumb');
      bc.innerHTML = '';
      const root = document.createElement('span');
      root.className = 'crumb' + (currentPath.length === 0 ? ' current' : '');
      root.textContent = rootHandle.name;
      root.onclick = () => navigateTo([]);
      bc.appendChild(root);
      for (let i = 0; i < currentPath.length; i++) {
        bc.appendChild(Object.assign(document.createElement('span'), { className: 'sep', textContent: '›' }));
        const c = document.createElement('span');
        c.className = 'crumb' + (i === currentPath.length - 1 ? ' current' : '');
        c.textContent = currentPath[i];
        const path = currentPath.slice(0, i + 1);
        c.onclick = () => navigateTo(path);
        bc.appendChild(c);
      }

      // Files
      const list = document.getElementById('fileList');
      list.innerHTML = '';
      if (currentPath.length > 0) {
        const up = mkItem({ name: '..', kind: 'directory' }, true);
        up.addEventListener('click', () => navigateTo(currentPath.slice(0, -1)));
        list.appendChild(up);
      }
      if (entries.length === 0) { list.innerHTML = '<div class="empty">Empty folder</div>'; }
      for (const e of entries) {
        const item = mkItem(e, false);
        if (e.kind === 'directory') item.addEventListener('click', () => navigateTo([...currentPath, e.name]));
        list.appendChild(item);
      }
      document.getElementById('status').textContent = entries.length + ' items';
    }

    function mkItem(e, isUp) {
      const el = document.createElement('div');
      el.className = 'file-item' + (e.kind === 'directory' ? ' dir' : '');
      const icon = document.createElement('div');
      icon.className = 'file-icon ' + (e.kind === 'directory' ? 'd' : 'f');
      icon.textContent = e.kind === 'directory' ? (isUp ? '↩' : '📁') : fileIcon(e.name);
      const name = document.createElement('div');
      name.className = 'file-name';
      name.textContent = e.name;
      el.appendChild(icon);
      el.appendChild(name);
      if (e.size !== undefined) {
        const sz = document.createElement('div');
        sz.className = 'file-size';
        sz.textContent = fmtSize(e.size);
        el.appendChild(sz);
      }
      return el;
    }

    function fileIcon(n) {
      const ext = n.split('.').pop().toLowerCase();
      const m = { pdf:'📄',doc:'📝',docx:'📝',txt:'📝',md:'📝',jpg:'🖼',jpeg:'🖼',png:'🖼',gif:'🖼',svg:'🖼',mp4:'🎬',mp3:'🎵',zip:'📦',rar:'📦',js:'⚡',ts:'⚡',py:'🐍',html:'🌐',css:'🎨',json:'{}' };
      return m[ext] || '📄';
    }

    function fmtSize(b) {
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
      return (b / 1048576).toFixed(1) + ' MB';
    }

    // ---- MUP Functions ----

    mup.registerFunction('getStatus', async () => {
      if (rootHandle) return { content: [{ type: 'text', text: 'Folder open: "' + rootHandle.name + '"' }, { type: 'data', data: { open: true, folder: rootHandle.name } }], isError: false };
      return { content: [{ type: 'text', text: 'No folder open. User needs to click "Choose Folder".' }, { type: 'data', data: { open: false, folder: null } }], isError: false };
    });

    mup.registerFunction('listFiles', async (params) => {
      if (!rootHandle) return { content: [{ type: 'text', text: 'No folder open.' }], isError: true };
      try {
        const parts = (params?.path || '').split('/').filter(Boolean);
        const target = [...currentPath, ...parts];
        const entries = await listDir(target);
        if (parts.length > 0) await navigateTo(target);
        const result = entries.map(e => ({ name: e.name, type: e.kind, size: e.size, lastModified: e.lastModified ? new Date(e.lastModified).toISOString() : undefined }));
        return { content: [{ type: 'text', text: `Found ${entries.length} items in "${target.join('/') || rootHandle.name}"` }, { type: 'data', data: result }], isError: false };
      } catch (e) { return { content: [{ type: 'text', text: 'Error: ' + e.message }], isError: true }; }
    });

    mup.registerFunction('createFolder', async (params) => {
      if (!rootHandle) return { content: [{ type: 'text', text: 'No folder open.' }], isError: true };
      try {
        const parts = params.path.split('/').filter(Boolean);
        let h = rootHandle;
        for (const p of parts) h = await h.getDirectoryHandle(p, { create: true });
        await refresh();
        return { content: [{ type: 'text', text: 'Created: ' + params.path }], isError: false };
      } catch (e) { return { content: [{ type: 'text', text: 'Error: ' + e.message }], isError: true }; }
    });

    mup.registerFunction('moveFile', async (params) => {
      if (!rootHandle) return { content: [{ type: 'text', text: 'No folder open.' }], isError: true };
      try {
        const fromParts = params.from.split('/').filter(Boolean);
        const toParts = params.to.split('/').filter(Boolean);
        let srcDir = rootHandle;
        for (const p of fromParts.slice(0, -1)) srcDir = await srcDir.getDirectoryHandle(p);
        const srcFile = await srcDir.getFileHandle(fromParts.at(-1));
        const file = await srcFile.getFile();
        let destDir = rootHandle;
        for (const p of toParts.slice(0, -1)) destDir = await destDir.getDirectoryHandle(p, { create: true });
        const destFile = await destDir.getFileHandle(toParts.at(-1), { create: true });
        const w = await destFile.createWritable();
        await w.write(await file.arrayBuffer());
        await w.close();
        await srcDir.removeEntry(fromParts.at(-1));
        await refresh();
        return { content: [{ type: 'text', text: 'Moved: ' + params.from + ' → ' + params.to }], isError: false };
      } catch (e) { return { content: [{ type: 'text', text: 'Error: ' + e.message }], isError: true }; }
    });

    mup.registerFunction('readFileText', async (params) => {
      if (!rootHandle) return { content: [{ type: 'text', text: 'No folder open.' }], isError: true };
      try {
        const parts = params.path.split('/').filter(Boolean);
        let dir = rootHandle;
        for (const p of parts.slice(0, -1)) dir = await dir.getDirectoryHandle(p);
        const fh = await dir.getFileHandle(parts.at(-1));
        const file = await fh.getFile();
        if (file.size > 1048576) return { content: [{ type: 'text', text: 'File too large (max 1MB). Size: ' + fmtSize(file.size) }], isError: true };
        const text = await file.text();
        return { content: [{ type: 'text', text: text.slice(0, 5000) + (text.length > 5000 ? '\n...(truncated)' : '') }], isError: false };
      } catch (e) { return { content: [{ type: 'text', text: 'Error: ' + e.message }], isError: true }; }
    });

    mup.onReady((params) => {
      mup.updateState('No folder open', { open: false, folder: null });
    });
  </script>
</body>
</html>
