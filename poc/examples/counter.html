<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Counter</title>

  <!-- This is all the host needs to recognize this as a MUP -->
  <script type="application/mup-manifest">
  {
    "name": "Counter",
    "description": "A simple counter. The user can click +/- buttons, and the LLM can set or get the count.",
    "grid": { "minWidth": 1, "minHeight": 1 },
    "functions": [
      {
        "name": "setCount",
        "description": "Set the counter to a specific value",
        "inputSchema": {
          "type": "object",
          "properties": { "value": { "type": "number" } },
          "required": ["value"]
        }
      },
      {
        "name": "getCount",
        "description": "Get the current counter value",
        "inputSchema": { "type": "object", "properties": {} }
      }
    ]
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent;
      color: #1d1d1f;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      -webkit-font-smoothing: antialiased;
    }
    .count {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
    }
    .buttons {
      display: flex;
      gap: 12px;
    }
    button {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      font-size: 22px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s, opacity 0.12s;
      font-family: inherit;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.92); }
    .btn-minus {
      background: rgba(255, 59, 48, 0.1);
      color: #ff3b30;
    }
    .btn-plus {
      background: rgba(52, 199, 89, 0.1);
      color: #34c759;
    }
    .btn-reset {
      background: rgba(0, 0, 0, 0.04);
      color: rgba(60, 60, 67, 0.4);
      font-size: 13px;
      width: auto;
      border-radius: 10px;
      padding: 8px 16px;
    }
  </style>
</head>
<body>
  <div class="count" id="count">0</div>
  <div class="buttons">
    <button class="btn-minus" id="btnMinus">-</button>
    <button class="btn-plus" id="btnPlus">+</button>
  </div>
  <button class="btn-reset" id="btnReset">Reset</button>

  <script>
    // `mup` is automatically injected by the MUP host — no import needed!
    let count = 0;
    const countEl = document.getElementById('count');

    function updateDisplay() {
      countEl.textContent = count;
      mup.updateState(`Counter: ${count}`, { count });
    }

    function adjust(delta) {
      count += delta;
      updateDisplay();
      mup.notifyInteraction(
        delta > 0 ? 'increment' : 'decrement',
        `Counter is now ${count}`,
        { count }
      );
    }

    function resetCount() {
      count = 0;
      updateDisplay();
      mup.notifyInteraction('reset', 'Counter reset to 0', { count: 0 });
    }

    document.getElementById('btnMinus').addEventListener('click', () => adjust(-1));
    document.getElementById('btnPlus').addEventListener('click', () => adjust(+1));
    document.getElementById('btnReset').addEventListener('click', () => resetCount());

    // LLM can call these functions
    mup.registerFunction('setCount', async (params) => {
      count = params.value;
      updateDisplay();
      return {
        content: [{ type: 'text', text: `Counter set to ${count}` }],
        isError: false,
      };
    });

    mup.registerFunction('getCount', async () => {
      return {
        content: [
          { type: 'text', text: `Counter is at ${count}` },
          { type: 'data', data: { count } }
        ],
        isError: false,
      };
    });

    mup.onReady((params) => {
      mup.updateState('Counter: 0', { count: 0 });
    });
  </script>
</body>
</html>
