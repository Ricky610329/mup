<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chart</title>

  <script type="application/mup-manifest">
  {
    "name": "Chart",
    "description": "A data visualization MUP that renders bar, line, and pie charts on a canvas. The LLM generates data and the MUP renders it visually. Users can switch chart types. Supports multiple datasets with automatic scaling and color assignment.",
    "grid": { "minWidth": 2, "minHeight": 2 },
    "functions": [
      {
        "name": "renderChart",
        "description": "Render a chart with the given type, title, labels, and datasets. Each dataset has a label, data array, and optional color.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "type": { "type": "string", "enum": ["bar", "line", "pie"] },
            "title": { "type": "string" },
            "labels": {
              "type": "array",
              "items": { "type": "string" }
            },
            "datasets": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "label": { "type": "string" },
                  "data": { "type": "array", "items": { "type": "number" } },
                  "color": { "type": "string" }
                },
                "required": ["label", "data"]
              }
            }
          },
          "required": ["type", "labels", "datasets"]
        }
      },
      {
        "name": "clear",
        "description": "Clear the chart and reset to empty state",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "getData",
        "description": "Get the current chart data including type, title, labels, and datasets",
        "inputSchema": { "type": "object", "properties": {} }
      }
    ]
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent;
      color: #1d1d1f;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 8px;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(0,0,0,0.85);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .type-group {
      display: flex;
      gap: 2px;
      background: rgba(0,0,0,0.04);
      border-radius: 6px;
      padding: 2px;
      flex-shrink: 0;
    }

    .type-btn {
      height: 22px;
      padding: 0 10px;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: rgba(60,60,67,0.45);
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
    }
    .type-btn:hover { color: rgba(60,60,67,0.7); }
    .type-btn.active {
      background: rgba(0,0,0,0.06);
      color: rgba(0,0,0,0.85);
    }

    .canvas-wrapper {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: rgba(60,60,67,0.25);
      letter-spacing: 0.2px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title" id="chartTitle"></div>
    <div class="type-group" id="typeGroup">
      <button class="type-btn active" data-type="bar">Bar</button>
      <button class="type-btn" data-type="line">Line</button>
      <button class="type-btn" data-type="pie">Pie</button>
    </div>
  </div>
  <div class="canvas-wrapper" id="canvasWrapper">
    <canvas id="chart"></canvas>
    <div class="hint" id="hint">Waiting for data&hellip;</div>
  </div>

  <script>
    const COLORS = [
      '#007aff', '#ff3b30', '#34c759', '#ff9500',
      '#5856d6', '#ff2d55', '#5ac8fa'
    ];

    // State
    let chartData = null; // { type, title, labels, datasets }

    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    const hintEl = document.getElementById('hint');
    const titleEl = document.getElementById('chartTitle');
    const typeGroup = document.getElementById('typeGroup');
    const wrapper = document.getElementById('canvasWrapper');

    // Type selector buttons
    typeGroup.querySelectorAll('.type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!chartData) return;
        const newType = btn.dataset.type;
        if (newType === chartData.type) return;
        chartData.type = newType;
        updateTypeButtons();
        draw();
        sendChartState();
        mup.notifyInteraction('type_change', `User switched chart type to ${newType}`, { type: newType });
      });
    });

    function updateTypeButtons() {
      typeGroup.querySelectorAll('.type-btn').forEach(b => {
        b.classList.toggle('active', chartData && b.dataset.type === chartData.type);
      });
    }

    // Resize handling
    const ro = new ResizeObserver(() => {
      resizeCanvas();
      draw();
    });
    ro.observe(wrapper);

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = wrapper.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    // Drawing
    function draw() {
      const rect = wrapper.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      ctx.clearRect(0, 0, w, h);

      if (!chartData || !chartData.datasets.length) {
        hintEl.style.display = 'flex';
        titleEl.textContent = '';
        return;
      }

      hintEl.style.display = 'none';
      titleEl.textContent = chartData.title || '';

      switch (chartData.type) {
        case 'bar': drawBar(w, h); break;
        case 'line': drawLine(w, h); break;
        case 'pie': drawPie(w, h); break;
      }
    }

    function getColor(idx, dataset) {
      if (dataset && dataset.color) return dataset.color;
      return COLORS[idx % COLORS.length];
    }

    function computeMaxValue() {
      let max = 0;
      for (const ds of chartData.datasets) {
        for (const v of ds.data) {
          if (v > max) max = v;
        }
      }
      return max || 1;
    }

    // Bar chart
    function drawBar(w, h) {
      const pad = { top: 12, right: 16, bottom: 32, left: 44 };
      const plotW = w - pad.left - pad.right;
      const plotH = h - pad.top - pad.bottom;
      if (plotW <= 0 || plotH <= 0) return;

      const maxVal = computeMaxValue();
      const labels = chartData.labels;
      const dsCount = chartData.datasets.length;
      const groupCount = labels.length;
      const groupW = plotW / groupCount;
      const barW = Math.min(groupW * 0.7 / dsCount, 40);
      const totalBarsW = barW * dsCount;

      // Grid lines
      const gridLines = 5;
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      ctx.lineWidth = 1;
      ctx.font = '10px Inter, -apple-system, sans-serif';
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      for (let i = 0; i <= gridLines; i++) {
        const y = pad.top + plotH - (i / gridLines) * plotH;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(pad.left + plotW, y);
        ctx.stroke();
        const val = (maxVal * i / gridLines);
        ctx.fillText(formatNumber(val), pad.left - 6, y);
      }

      // Bars
      for (let g = 0; g < groupCount; g++) {
        const groupX = pad.left + g * groupW + (groupW - totalBarsW) / 2;

        for (let d = 0; d < dsCount; d++) {
          const ds = chartData.datasets[d];
          const val = ds.data[g] || 0;
          const barH = (val / maxVal) * plotH;
          const x = groupX + d * barW;
          const y = pad.top + plotH - barH;

          ctx.fillStyle = getColor(d, ds);
          ctx.beginPath();
          roundedRect(ctx, x + 1, y, barW - 2, barH, Math.min(3, barW / 4));
          ctx.fill();
        }

        // Label
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.font = '10px Inter, -apple-system, sans-serif';
        const labelX = pad.left + g * groupW + groupW / 2;
        ctx.fillText(truncateLabel(labels[g], groupW - 4), labelX, pad.top + plotH + 8);
      }

      drawLegend(w, h, pad);
    }

    // Line chart
    function drawLine(w, h) {
      const pad = { top: 12, right: 16, bottom: 32, left: 44 };
      const plotW = w - pad.left - pad.right;
      const plotH = h - pad.top - pad.bottom;
      if (plotW <= 0 || plotH <= 0) return;

      const maxVal = computeMaxValue();
      const labels = chartData.labels;
      const pointCount = labels.length;
      const stepX = pointCount > 1 ? plotW / (pointCount - 1) : plotW / 2;

      // Grid lines
      const gridLines = 5;
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      ctx.lineWidth = 1;
      ctx.font = '10px Inter, -apple-system, sans-serif';
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      for (let i = 0; i <= gridLines; i++) {
        const y = pad.top + plotH - (i / gridLines) * plotH;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(pad.left + plotW, y);
        ctx.stroke();
        const val = (maxVal * i / gridLines);
        ctx.fillText(formatNumber(val), pad.left - 6, y);
      }

      // X-axis labels
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.font = '10px Inter, -apple-system, sans-serif';
      const maxLabels = Math.floor(plotW / 40) || 1;
      const labelStep = Math.ceil(pointCount / maxLabels);
      for (let i = 0; i < pointCount; i++) {
        if (i % labelStep !== 0 && i !== pointCount - 1) continue;
        const x = pad.left + (pointCount > 1 ? i * stepX : plotW / 2);
        ctx.fillText(truncateLabel(labels[i], 38), x, pad.top + plotH + 8);
      }

      // Lines
      for (let d = 0; d < chartData.datasets.length; d++) {
        const ds = chartData.datasets[d];
        const color = getColor(d, ds);

        // Area fill
        ctx.beginPath();
        for (let i = 0; i < ds.data.length; i++) {
          const x = pad.left + (pointCount > 1 ? i * stepX : plotW / 2);
          const y = pad.top + plotH - ((ds.data[i] || 0) / maxVal) * plotH;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        const lastX = pad.left + (pointCount > 1 ? (ds.data.length - 1) * stepX : plotW / 2);
        ctx.lineTo(lastX, pad.top + plotH);
        ctx.lineTo(pad.left + (pointCount > 1 ? 0 : plotW / 2), pad.top + plotH);
        ctx.closePath();
        ctx.fillStyle = hexToRgba(color, 0.08);
        ctx.fill();

        // Line stroke
        ctx.beginPath();
        for (let i = 0; i < ds.data.length; i++) {
          const x = pad.left + (pointCount > 1 ? i * stepX : plotW / 2);
          const y = pad.top + plotH - ((ds.data[i] || 0) / maxVal) * plotH;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.stroke();

        // Dots
        for (let i = 0; i < ds.data.length; i++) {
          const x = pad.left + (pointCount > 1 ? i * stepX : plotW / 2);
          const y = pad.top + plotH - ((ds.data[i] || 0) / maxVal) * plotH;
          ctx.beginPath();
          ctx.arc(x, y, 3, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(x, y, 1.5, 0, Math.PI * 2);
          ctx.fillStyle = '#ffffff';
          ctx.fill();
        }
      }

      drawLegend(w, h, pad);
    }

    // Pie chart
    function drawPie(w, h) {
      const pad = 20;
      const centerX = w / 2;
      const centerY = h / 2;
      const radius = Math.min(w - pad * 2, h - pad * 2) / 2;
      if (radius <= 0) return;

      // Sum all first dataset values (pie uses first dataset only)
      const ds = chartData.datasets[0];
      const values = ds.data.map(v => Math.max(0, v || 0));
      const total = values.reduce((a, b) => a + b, 0);
      if (total === 0) return;

      let startAngle = -Math.PI / 2;

      for (let i = 0; i < values.length; i++) {
        const sliceAngle = (values[i] / total) * Math.PI * 2;
        const color = getSegmentColor(i);

        // Segment
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();

        // Separator
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
        ctx.closePath();
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Label
        if (sliceAngle > 0.15) {
          const midAngle = startAngle + sliceAngle / 2;
          const labelR = radius * 0.65;
          const lx = centerX + Math.cos(midAngle) * labelR;
          const ly = centerY + Math.sin(midAngle) * labelR;
          const pct = Math.round((values[i] / total) * 100);

          ctx.font = '600 11px Inter, -apple-system, sans-serif';
          ctx.fillStyle = 'rgba(255,255,255,0.95)';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(`${pct}%`, lx, ly);

          // External label if enough room
          if (sliceAngle > 0.4 && chartData.labels[i]) {
            const extR = radius + 14;
            const ex = centerX + Math.cos(midAngle) * extR;
            const ey = centerY + Math.sin(midAngle) * extR;
            ctx.font = '10px Inter, -apple-system, sans-serif';
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.textAlign = midAngle > Math.PI / 2 && midAngle < Math.PI * 1.5 ? 'right' : 'left';
            if (Math.abs(midAngle + Math.PI / 2) < 0.3 || Math.abs(midAngle - Math.PI / 2) < 0.3) ctx.textAlign = 'center';
            ctx.fillText(truncateLabel(chartData.labels[i], 60), ex, ey);
          }
        }

        startAngle += sliceAngle;
      }

      // Inner circle for donut effect
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fill();

      // Total in center
      ctx.font = '600 13px Inter, -apple-system, sans-serif';
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(formatNumber(total), centerX, centerY);
    }

    function getSegmentColor(idx) {
      return COLORS[idx % COLORS.length];
    }

    // Legend (for bar/line)
    function drawLegend(w, h, pad) {
      if (chartData.datasets.length <= 1) return;
      ctx.font = '10px Inter, -apple-system, sans-serif';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';

      let x = pad.left;
      const y = h - 4;

      for (let d = 0; d < chartData.datasets.length; d++) {
        const ds = chartData.datasets[d];
        const color = getColor(d, ds);

        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x + 4, y, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        const label = ds.label || `Dataset ${d + 1}`;
        ctx.fillText(label, x + 11, y);
        x += ctx.measureText(label).width + 22;

        if (x > w - pad.right) break;
      }
    }

    // Utility
    function roundedRect(ctx, x, y, w, h, r) {
      if (h <= 0) return;
      r = Math.min(r, h / 2, w / 2);
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h);
      ctx.lineTo(x, y + h);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
    }

    function truncateLabel(str, maxW) {
      if (!str) return '';
      if (str.length <= 6) return str;
      ctx.save();
      let t = str;
      while (ctx.measureText(t).width > maxW && t.length > 3) {
        t = t.slice(0, -1);
      }
      ctx.restore();
      return t.length < str.length ? t + '\u2026' : t;
    }

    function formatNumber(n) {
      if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      if (Number.isInteger(n)) return n.toString();
      return n.toFixed(1);
    }

    function hexToRgba(hex, alpha) {
      let c = hex.replace('#', '');
      if (c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
      const r = parseInt(c.substring(0,2), 16);
      const g = parseInt(c.substring(2,4), 16);
      const b = parseInt(c.substring(4,6), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function clearChart() {
      chartData = null;
      const rect = wrapper.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
      hintEl.style.display = 'flex';
      titleEl.textContent = '';
      typeGroup.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      typeGroup.querySelector('[data-type="bar"]').classList.add('active');
    }

    function setChartData(params) {
      chartData = {
        type: params.type || 'bar',
        title: params.title || '',
        labels: params.labels || [],
        datasets: (params.datasets || []).map((ds, i) => ({
          label: ds.label || `Dataset ${i + 1}`,
          data: ds.data || [],
          color: ds.color || null
        }))
      };
      updateTypeButtons();
      draw();
    }

    // Init canvas
    resizeCanvas();
    draw();

    function sendChartState() {
      if (!chartData) {
        mup.updateState('No chart data', { hasData: false });
      } else {
        const dsInfo = chartData.datasets.map(ds => ds.label).join(', ');
        mup.updateState(
          `${chartData.type} chart: ${dsInfo}`,
          { type: chartData.type, title: chartData.title, datasetCount: chartData.datasets.length, labelCount: chartData.labels.length }
        );
      }
    }

    // === MUP Functions ===

    mup.registerFunction('renderChart', async (params) => {
      setChartData(params);
      sendChartState();
      const dsInfo = chartData.datasets.map(ds => `${ds.label} (${ds.data.length} pts)`).join(', ');
      return {
        content: [{ type: 'text', text: `Rendered ${chartData.type} chart: ${dsInfo}` }],
        isError: false
      };
    });

    mup.registerFunction('clear', async () => {
      clearChart();
      sendChartState();
      return {
        content: [{ type: 'text', text: 'Chart cleared' }],
        isError: false
      };
    });

    mup.registerFunction('getData', async () => {
      if (!chartData) {
        return {
          content: [{ type: 'text', text: 'No chart data. Use renderChart to display data.' }],
          isError: false
        };
      }
      return {
        content: [
          { type: 'text', text: `${chartData.type} chart "${chartData.title || '(untitled)'}" with ${chartData.datasets.length} dataset(s) and ${chartData.labels.length} labels` },
          { type: 'data', data: chartData }
        ],
        isError: false
      };
    });

    mup.onReady((params) => {
      sendChartState();
    });
  </script>
</body>
</html>
