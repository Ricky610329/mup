<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Camera</title>

  <script type="application/mup-manifest">
  {
    "name": "Camera",
    "description": "Live camera feed. The user can take a snapshot, and the LLM receives it as a base64 image to analyze. Use capturePhoto to see what the camera is pointing at.",
    "grid": { "minWidth": 2, "minHeight": 2 },
    "permissions": ["camera"],
    "functions": [
      {
        "name": "capturePhoto",
        "description": "Take a photo from the camera and return it as a base64 JPEG image. Use this when the user asks you to look at something, see what's in front of them, or analyze what the camera sees.",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "startCamera",
        "description": "Start the camera feed. The user must grant permission.",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "stopCamera",
        "description": "Stop the camera feed.",
        "inputSchema": { "type": "object", "properties": {} }
      }
    ]
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1d1d1f;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .camera-view {
      flex: 1;
      position: relative;
      background: #f2f2f7;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    video.active { display: block; }
    canvas { display: none; }

    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 24px;
    }
    .landing-icon { font-size: 32px; opacity: 0.5; }
    .landing-text { font-size: 13px; color: rgba(60,60,67,0.3); text-align: center; max-width: 200px; line-height: 1.5; }

    .start-btn {
      background: #1d1d1f;
      color: #ffffff;
      border: none;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .start-btn:hover { opacity: 0.8; }

    .controls {
      display: none;
      padding: 12px;
      gap: 8px;
      justify-content: center;
      align-items: center;
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    .controls.active { display: flex; }

    .capture-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 3px solid rgba(0,0,0,0.15);
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: transform 0.12s;
    }
    .capture-btn::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: #1d1d1f;
      transition: transform 0.12s;
    }
    .capture-btn:hover { transform: scale(1.05); }
    .capture-btn:active::after { transform: scale(0.85); }
    .capture-btn.flash::after {
      animation: flash 0.2s ease-out;
    }
    @keyframes flash {
      0% { background: rgba(0,0,0,0.1); transform: scale(1.1); }
      100% { background: transparent; transform: scale(1); }
    }

    .stop-btn {
      background: rgba(0,0,0,0.05);
      border: 1px solid rgba(0,0,0,0.08);
      color: rgba(60,60,67,0.5);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
    }
    .spacer { flex: 1; }

    .status {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(60,60,67,0.5);
      background: rgba(255,255,255,0.7);
      padding: 4px 10px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #34c759;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="camera-view" id="cameraView">
    <div class="landing" id="landing">
      <div class="landing-icon">📷</div>
      <div class="landing-text">Start the camera so the AI can see what you see</div>
      <button class="start-btn" id="startBtn">Start Camera</button>
    </div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="status" id="status" style="display:none;">
      <div class="status-dot"></div>
      <span>LIVE</span>
    </div>
  </div>
  <div class="controls" id="controls">
    <button class="stop-btn" id="stopBtn">Stop</button>
    <button class="capture-btn" id="captureBtn" title="Take Photo"></button>
    <div class="spacer"></div>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let stream = null;

    document.getElementById('startBtn').addEventListener('click', () => doStartCamera());
    document.getElementById('captureBtn').addEventListener('click', () => {
      doCapture();
      // Visual feedback
      document.getElementById('captureBtn').classList.add('flash');
      setTimeout(() => document.getElementById('captureBtn').classList.remove('flash'), 300);
    });
    document.getElementById('stopBtn').addEventListener('click', () => doStopCamera());

    async function doStartCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = stream;
        video.classList.add('active');
        document.getElementById('landing').style.display = 'none';
        document.getElementById('controls').classList.add('active');
        document.getElementById('status').style.display = 'flex';

        mup.updateState('Camera started', { active: true });
        mup.notifyInteraction('camera_started', 'User started the camera', {});
      } catch (e) {
        mup.updateState('Camera access denied: ' + e.message, { active: false });
      }
    }

    function doStopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      video.classList.remove('active');
      video.srcObject = null;
      document.getElementById('landing').style.display = 'flex';
      document.getElementById('controls').classList.remove('active');
      document.getElementById('status').style.display = 'none';

      mup.updateState('Camera stopped', { active: false });
    }

    function doCapture() {
      if (!stream) return null;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      const base64 = dataUrl.split(',')[1];

      mup.notifyInteraction('photo_captured', 'User took a photo from the camera', {});
      return base64;
    }

    // MUP functions
    mup.registerFunction('startCamera', async () => {
      await doStartCamera();
      return {
        content: [{ type: 'text', text: stream ? 'Camera started. Use capturePhoto to take a picture.' : 'Failed to start camera.' }],
        isError: !stream
      };
    });

    mup.registerFunction('stopCamera', async () => {
      doStopCamera();
      return {
        content: [{ type: 'text', text: 'Camera stopped.' }],
        isError: false
      };
    });

    mup.registerFunction('capturePhoto', async () => {
      if (!stream) {
        await doStartCamera();
        if (!stream) {
          return { content: [{ type: 'text', text: 'Camera not available. Ask the user to click Start Camera.' }], isError: true };
        }
        // Wait a moment for camera to warm up
        await new Promise(r => setTimeout(r, 500));
      }

      const base64 = doCapture();
      if (!base64) {
        return { content: [{ type: 'text', text: 'Failed to capture photo.' }], isError: true };
      }

      return {
        content: [
          { type: 'text', text: 'Photo captured from camera.' },
          { type: 'image', data: base64, mimeType: 'image/jpeg' }
        ],
        isError: false
      };
    });

    mup.onReady((params) => {
      mup.updateState('Camera stopped', { active: false });
    });
  </script>
</body>
</html>
