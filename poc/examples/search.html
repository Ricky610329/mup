<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search</title>

  <script type="application/mup-manifest">
  {
    "name": "Search",
    "description": "A search and display panel. Users can type queries and the LLM can show search results or any structured information. Use showResults to display findings, or the user types a query which is sent as an interaction for the LLM to handle.",
    "grid": { "minWidth": 1, "minHeight": 1 },
    "functions": [
      {
        "name": "showResults",
        "description": "Display search results or information. Each result has a title and optional description.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "query": { "type": "string", "description": "The query or topic these results are for" },
            "results": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "title": { "type": "string" },
                  "description": { "type": "string" }
                },
                "required": ["title"]
              }
            }
          },
          "required": ["results"]
        }
      },
      {
        "name": "clear",
        "description": "Clear all displayed results",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "getQuery",
        "description": "Get the current query text in the search box",
        "inputSchema": { "type": "object", "properties": {} }
      }
    ]
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    .search-bar {
      display: flex;
      padding: 6px;
      gap: 4px;
      border-bottom: 1px solid rgba(60,60,67,0.1);
      flex-shrink: 0;
    }

    .search-input {
      flex: 1;
      border: 1px solid rgba(60,60,67,0.15);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      background: rgba(255,255,255,0.6);
    }
    .search-input:focus { border-color: rgba(0,122,255,0.5); }

    .search-btn {
      border: none;
      background: rgba(0,122,255,0.1);
      color: #007aff;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .search-btn:hover { background: rgba(0,122,255,0.2); }

    .results {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }

    .result-item {
      padding: 6px 8px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: rgba(60,60,67,0.04);
      transition: background 0.15s;
    }
    .result-item:hover { background: rgba(60,60,67,0.08); }

    .result-title {
      font-size: 12px;
      font-weight: 600;
      color: rgba(0,0,0,0.8);
      line-height: 1.3;
    }

    .result-desc {
      font-size: 11px;
      color: rgba(60,60,67,0.5);
      line-height: 1.3;
      margin-top: 2px;
    }

    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: rgba(60,60,67,0.3);
      font-size: 12px;
    }

    .query-label {
      font-size: 10px;
      color: rgba(60,60,67,0.4);
      padding: 4px 6px 2px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="search-bar">
    <input class="search-input" id="input" type="text" placeholder="Search..." />
    <button class="search-btn" id="btn">Go</button>
  </div>
  <div class="results" id="results">
    <div class="empty" id="empty">Type a query or ask the LLM</div>
  </div>

  <script>
    const input = document.getElementById('input');
    const btn = document.getElementById('btn');
    const resultsEl = document.getElementById('results');
    const emptyEl = document.getElementById('empty');

    let currentQuery = '';
    let currentResults = [];

    function doSearch() {
      const query = input.value.trim();
      if (!query) return;
      currentQuery = query;
      mup.notifyInteraction('search', `User searched: "${query}"`, { query });
      mup.updateState(`Searching: "${query.slice(0, 30)}"`, { query });
    }

    btn.addEventListener('click', doSearch);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doSearch();
    });

    function renderResults(query, results) {
      currentQuery = query || currentQuery;
      currentResults = results;
      resultsEl.innerHTML = '';

      if (query) {
        const label = document.createElement('div');
        label.className = 'query-label';
        label.textContent = query;
        resultsEl.appendChild(label);
      }

      if (results.length === 0) {
        emptyEl.style.display = '';
        emptyEl.textContent = 'No results';
        resultsEl.appendChild(emptyEl);
        return;
      }

      emptyEl.style.display = 'none';

      for (const r of results) {
        const item = document.createElement('div');
        item.className = 'result-item';

        const title = document.createElement('div');
        title.className = 'result-title';
        title.textContent = r.title;
        item.appendChild(title);

        if (r.description) {
          const desc = document.createElement('div');
          desc.className = 'result-desc';
          desc.textContent = r.description;
          item.appendChild(desc);
        }

        item.addEventListener('click', () => {
          mup.notifyInteraction('click', `User clicked: "${r.title}"`, { title: r.title, description: r.description });
        });

        resultsEl.appendChild(item);
      }
    }

    // === MUP Functions ===

    mup.registerFunction('showResults', async (params) => {
      const results = params.results || [];
      renderResults(params.query || '', results);
      mup.updateState(`${results.length} result(s)${params.query ? ': "' + params.query.slice(0, 20) + '"' : ''}`, { query: params.query, resultCount: results.length });
      return {
        content: [{ type: 'text', text: `Showing ${results.length} result(s)` }],
        isError: false
      };
    });

    mup.registerFunction('clear', async () => {
      currentResults = [];
      currentQuery = '';
      resultsEl.innerHTML = '';
      emptyEl.style.display = '';
      emptyEl.textContent = 'Type a query or ask the LLM';
      resultsEl.appendChild(emptyEl);
      mup.updateState('Empty', { query: '', resultCount: 0 });
      return { content: [{ type: 'text', text: 'Results cleared' }], isError: false };
    });

    mup.registerFunction('getQuery', async () => {
      return {
        content: [
          { type: 'text', text: currentQuery || 'No query' },
          { type: 'data', data: { query: currentQuery } }
        ],
        isError: false
      };
    });

    mup.onReady(() => {
      mup.updateState('Empty', { query: '', resultCount: 0 });
    });
  </script>
</body>
</html>
