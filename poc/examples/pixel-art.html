<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pixel Art</title>

  <script type="application/mup-manifest">
  {
    "name": "Pixel Art",
    "description": "A 16×16 pixel art display. The LLM can set pixels, draw shapes, or clear the canvas. The user sees the result visually.",
    "grid": { "minWidth": 2, "minHeight": 2 },
    "functions": [
      {
        "name": "setPixels",
        "description": "Set one or more pixels. Each pixel has x (0-15), y (0-15), and a CSS color string.",
        "inputSchema": {
          "type": "object",
          "properties": {
            "pixels": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "x": { "type": "integer", "minimum": 0, "maximum": 15 },
                  "y": { "type": "integer", "minimum": 0, "maximum": 15 },
                  "color": { "type": "string" }
                },
                "required": ["x", "y", "color"]
              }
            }
          },
          "required": ["pixels"]
        }
      },
      {
        "name": "clear",
        "description": "Clear the entire canvas to white",
        "inputSchema": { "type": "object", "properties": {} }
      },
      {
        "name": "getGrid",
        "description": "Get the current 16×16 grid as a 2D array of hex color strings. Row-major: grid[y][x].",
        "inputSchema": { "type": "object", "properties": {} }
      }
    ]
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #ffffff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    canvas {
      image-rendering: pixelated;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    const SIZE = 16;
    const grid = [];
    for (let y = 0; y < SIZE; y++) {
      grid[y] = [];
      for (let x = 0; x < SIZE; x++) grid[y][x] = '#ffffff';
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function render() {
      const body = document.body;
      const sz = Math.min(body.clientWidth, body.clientHeight) - 24;
      if (sz <= 0) return;
      canvas.width = sz;
      canvas.height = sz;
      canvas.style.width = sz + 'px';
      canvas.style.height = sz + 'px';

      const cell = sz / SIZE;
      // Draw pixels
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          ctx.fillStyle = grid[y][x];
          ctx.fillRect(x * cell, y * cell, cell, cell);
        }
      }
      // Draw grid lines
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.lineWidth = 1;
      for (let i = 1; i < SIZE; i++) {
        const p = Math.floor(i * cell) + 0.5;
        ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, sz); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(sz, p); ctx.stroke();
      }
    }

    // Initial render + resize
    render();
    new ResizeObserver(render).observe(document.body);

    function setPixel(x, y, color) {
      if (x < 0 || x >= SIZE || y < 0 || y >= SIZE) return;
      grid[y][x] = color;
    }

    function clearAll() {
      for (let y = 0; y < SIZE; y++)
        for (let x = 0; x < SIZE; x++) grid[y][x] = '#ffffff';
      render();
    }

    function countColored() {
      let c = 0;
      for (let y = 0; y < SIZE; y++)
        for (let x = 0; x < SIZE; x++)
          if (grid[y][x] !== '#ffffff') c++;
      return c;
    }

    function describeGrid() {
      let colored = 0;
      const colors = new Set();
      for (let y = 0; y < SIZE; y++)
        for (let x = 0; x < SIZE; x++)
          if (grid[y][x] !== '#ffffff') { colored++; colors.add(grid[y][x]); }
      return `Canvas has ${colored} colored pixel${colored !== 1 ? 's' : ''} using ${colors.size} color${colors.size !== 1 ? 's' : ''}`;
    }

    // === MUP Functions ===

    mup.registerFunction('setPixels', async (params) => {
      const pixels = params.pixels || [];
      for (const p of pixels) setPixel(p.x, p.y, p.color);
      render();
      mup.updateState(describeGrid(), { coloredPixels: countColored() });
      return {
        content: [{ type: 'text', text: `Set ${pixels.length} pixel(s)` }],
        isError: false
      };
    });

    mup.registerFunction('clear', async () => {
      clearAll();
      mup.updateState('Canvas cleared', { coloredPixels: 0 });
      return {
        content: [{ type: 'text', text: 'Canvas cleared' }],
        isError: false
      };
    });

    mup.registerFunction('getGrid', async () => {
      return {
        content: [
          { type: 'text', text: describeGrid() },
          { type: 'data', data: grid }
        ],
        isError: false
      };
    });

    mup.onReady((params) => {
      render();
      mup.updateState('Canvas has 0 colored pixels using 0 colors', { coloredPixels: 0 });
    });
  </script>
</body>
</html>
